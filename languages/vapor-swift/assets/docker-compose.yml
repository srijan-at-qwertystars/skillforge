# ══════════════════════════════════════════════════════
# Vapor + PostgreSQL + Redis Development Stack
# Usage: docker compose up -d
# ══════════════════════════════════════════════════════

version: "3.8"

services:
  # ── Vapor Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=vapor
      - DB_PASS=vapor
      - DB_NAME=vapor_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - vapor-network

  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vapor
      POSTGRES_PASSWORD: vapor
      POSTGRES_DB: vapor_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vapor -d vapor_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - vapor-network

  # ── Test Database (separate instance) ──
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vapor_test
      POSTGRES_PASSWORD: vapor_test
      POSTGRES_DB: vapor_test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vapor_test -d vapor_test_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - testing
    networks:
      - vapor-network

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - vapor-network

  # ── Adminer (DB admin UI, optional) ──
  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - db
    profiles:
      - tools
    networks:
      - vapor-network

  # ── Redis Commander (Redis UI, optional) ──
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis
    profiles:
      - tools
    networks:
      - vapor-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  vapor-network:
    driver: bridge
