# =============================================================================
# PostgreSQL Tuning Configuration Template
# =============================================================================
# Optimized postgresql.conf for different workload sizes.
# Copy relevant settings to your postgresql.conf and adjust as needed.
#
# Profiles: Small (4-8GB RAM), Medium (16-32GB RAM), Large (64-128GB RAM)
# Workload: Mixed OLTP/OLAP (adjust noted parameters for pure OLTP or OLAP)
#
# After changes, verify with: SELECT name, setting, unit FROM pg_settings;
# Reload without restart: SELECT pg_reload_conf();
# Parameters marked [RESTART] require PostgreSQL restart.
# =============================================================================

# =============================================================================
# MEMORY CONFIGURATION
# =============================================================================

# shared_buffers — Main PostgreSQL buffer cache [RESTART]
# Rule: ~25% of system RAM, rarely above 16GB (OS cache handles the rest)
# Small:  1GB    | Medium: 4-8GB  | Large: 16GB
shared_buffers = 4GB

# work_mem — Per-sort/hash operation memory (NOT per-connection)
# A complex query may use work_mem multiple times (one per sort node)
# Rule: (Available RAM - shared_buffers) / (max_connections * 3)
# Small:  4MB    | Medium: 16MB   | Large: 32MB
# Increase per-session for analytics: SET work_mem = '256MB';
work_mem = 16MB

# maintenance_work_mem — Memory for VACUUM, CREATE INDEX, ALTER TABLE
# Rule: 512MB - 2GB (only one per autovacuum worker)
# Total maintenance memory = this * autovacuum_max_workers
# Small:  256MB  | Medium: 512MB  | Large: 1-2GB
maintenance_work_mem = 1GB

# effective_cache_size — Planner hint (NOT an allocation)
# Tells planner how much OS + PG cache is available
# Rule: 50-75% of total system RAM
# Small:  3GB    | Medium: 24GB   | Large: 96GB
effective_cache_size = 24GB

# wal_buffers — WAL write buffer [RESTART]
# Auto-tuned to 1/32 of shared_buffers (max 64MB)
# -1 = auto-tune (recommended)
wal_buffers = -1

# temp_buffers — Per-session temp table buffer
# Increase if heavy temp table usage
# Default: 8MB
temp_buffers = 16MB

# =============================================================================
# CONNECTION SETTINGS
# =============================================================================

# max_connections — Use PgBouncer and keep this low [RESTART]
# Each connection uses ~5-10MB base memory + work_mem per sort
# With PgBouncer: 100-200 | Without: 200-500
max_connections = 200

# superuser_reserved_connections — Always keep some for admin access
superuser_reserved_connections = 5

# =============================================================================
# WAL CONFIGURATION
# =============================================================================

# wal_level — Required level for your replication needs [RESTART]
# minimal: no replication | replica: streaming | logical: logical replication
wal_level = replica

# max_wal_senders — Concurrent replication connections [RESTART]
max_wal_senders = 10

# max_replication_slots [RESTART]
max_replication_slots = 10

# WAL size limits (controls checkpoint frequency)
# Larger = fewer checkpoints but longer crash recovery
# Small:  1GB    | Medium: 4GB    | Large: 8-16GB
max_wal_size = 4GB
min_wal_size = 1GB

# wal_compression — Reduce WAL I/O at CPU cost (PG15+: lz4, zstd)
wal_compression = on

# synchronous_commit — Trade durability for write performance
# on: full durability | off: ~3x faster writes, up to ~600ms data loss on crash
# OLTP: on | Logging/analytics: off
synchronous_commit = on

# full_page_writes — NEVER disable (data corruption risk)
full_page_writes = on

# wal_keep_size — Minimum WAL to retain for standby catch-up
wal_keep_size = 2GB

# =============================================================================
# CHECKPOINT TUNING
# =============================================================================

# checkpoint_timeout — Max time between checkpoints
# Longer = fewer checkpoints but more WAL and longer recovery
# Default: 5min | Recommended: 10-15min
checkpoint_timeout = 15min

# checkpoint_completion_target — Spread I/O over this fraction of interval
# Higher = smoother I/O, less impact on queries
# Default: 0.9
checkpoint_completion_target = 0.9

# checkpoint_warning — Log warning if checkpoints happen too frequently
checkpoint_warning = 60s

# =============================================================================
# QUERY PLANNER
# =============================================================================

# random_page_cost — Cost of non-sequential page fetch
# HDD: 4.0 (default) | SSD: 1.1-1.5 | NVMe: 1.0-1.1
random_page_cost = 1.1

# seq_page_cost — Cost of sequential page fetch (baseline)
seq_page_cost = 1.0

# effective_io_concurrency — Concurrent I/O requests for bitmap scans
# HDD: 2-4 | SSD: 200 | NVMe: 200
effective_io_concurrency = 200

# maintenance_io_concurrency — I/O concurrency for maintenance (PG13+)
maintenance_io_concurrency = 200

# default_statistics_target — Rows sampled by ANALYZE
# Higher = better estimates, slower ANALYZE
# OLTP: 100 | Complex queries: 200-500
default_statistics_target = 200

# =============================================================================
# PARALLEL QUERY
# =============================================================================

# max_parallel_workers_per_gather — Workers per parallel operation
# Rule: number of CPU cores / 4 (leave room for other queries)
# Small: 2 | Medium: 4 | Large: 4-8
max_parallel_workers_per_gather = 4

# max_parallel_workers — Total parallel workers system-wide [RESTART]
max_parallel_workers = 8

# max_parallel_maintenance_workers — For CREATE INDEX, VACUUM (PG11+)
max_parallel_maintenance_workers = 4

# max_worker_processes — Total background worker processes [RESTART]
max_worker_processes = 16

# Minimum table/index size for parallel scan consideration
min_parallel_table_scan_size = 8MB
min_parallel_index_scan_size = 512kB

# =============================================================================
# AUTOVACUUM
# =============================================================================

# Never disable autovacuum globally
autovacuum = on

# autovacuum_max_workers — Concurrent vacuum workers [RESTART]
# Rule: 1 per 50-100 frequently-updated tables
# Small: 3 | Medium: 4-6 | Large: 6-8
autovacuum_max_workers = 6

# autovacuum_naptime — How often to check for work
autovacuum_naptime = 30s

# Vacuum thresholds: trigger = threshold + scale_factor * n_live_tup
# Lower scale_factor for large tables (default 0.2 = 20% dead rows)
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.1

# Analyze thresholds
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.05

# I/O throttling — increase for fast storage
# cost_delay: pause between I/O bursts | cost_limit: I/O budget per burst
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 800

# =============================================================================
# LOGGING
# =============================================================================

# Log slow queries (set to 0 to log all, -1 to disable)
log_min_duration_statement = 1000  # log queries > 1 second

# Log checkpoints (always enable)
log_checkpoints = on

# Log lock waits
log_lock_waits = on
deadlock_timeout = 1s

# Log connections/disconnections (useful for debugging, noisy in production)
# log_connections = on
# log_disconnections = on

# Log autovacuum activity
log_autovacuum_min_duration = 0    # log all autovacuum runs

# Log temp files (detect work_mem issues)
log_temp_files = 0                 # log all temp file usage

# =============================================================================
# EXTENSIONS [RESTART]
# =============================================================================

# Essential extensions — load at startup
shared_preload_libraries = 'pg_stat_statements,auto_explain'

# pg_stat_statements configuration
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = on
pg_stat_statements.track_planning = on

# auto_explain configuration (log plans for slow queries)
auto_explain.log_min_duration = '3s'
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_timing = on
auto_explain.log_nested_statements = on
auto_explain.log_verbose = off

# =============================================================================
# TIMEOUTS & SAFETY
# =============================================================================

# Prevent runaway idle-in-transaction sessions
idle_in_transaction_session_timeout = 300000   # 5 minutes (ms)

# Statement timeout (set per-session for web apps, not globally)
# statement_timeout = 60000                    # 60 seconds (ms)

# Lock timeout (how long to wait for a lock before giving up)
lock_timeout = 10000                           # 10 seconds (ms)

# =============================================================================
# HUGE PAGES [RESTART]
# =============================================================================

# Enable for shared_buffers > 8GB
# Requires OS configuration: vm.nr_hugepages in /etc/sysctl.conf
# 'try' = use if available, 'on' = require (fails if unavailable)
huge_pages = try

# =============================================================================
# TRACK I/O TIMING
# =============================================================================

# Enable I/O timing in EXPLAIN ANALYZE (small overhead)
track_io_timing = on

# Track function call timing
track_functions = all

# Activity tracking
track_activity_query_size = 4096               # default: 1024
