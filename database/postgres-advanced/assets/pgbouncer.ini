; =============================================================================
; PgBouncer Configuration Template — Transaction Pooling
; =============================================================================
; Install: apt install pgbouncer  |  yum install pgbouncer
; Start:   pgbouncer /etc/pgbouncer/pgbouncer.ini
; Reload:  pgbouncer -R /etc/pgbouncer/pgbouncer.ini
;
; Auth file: /etc/pgbouncer/userlist.txt
;   Format: "username" "password"  (or md5/scram hash)
;   Generate: psql -Atc "SELECT '\"' || rolname || '\" \"' || rolpassword || '\"' FROM pg_authid WHERE rolcanlogin;"
; =============================================================================

[databases]
; database = connection_string
; Multiple database entries for read/write splitting or multi-tenant setups.

; Primary (read-write)
myapp = host=127.0.0.1 port=5432 dbname=myapp

; Read replica (read-only)
myapp_ro = host=replica.internal port=5432 dbname=myapp

; Connection with specific user mapping
; analytics = host=analytics-db.internal port=5432 dbname=analytics auth_user=analytics_user

; Wildcard: forward any database name to the server
; * = host=127.0.0.1 port=5432

[pgbouncer]

; =============================================================================
; LISTEN SETTINGS
; =============================================================================

; Address to listen on (0.0.0.0 for all interfaces, 127.0.0.1 for local only)
listen_addr = 127.0.0.1
listen_port = 6432

; Unix socket directory (set to empty to disable)
unix_socket_dir = /var/run/pgbouncer

; =============================================================================
; AUTHENTICATION
; =============================================================================

; Authentication method: trust, md5, scram-sha-256, cert, hba, pam
auth_type = scram-sha-256

; File containing user/password pairs
auth_file = /etc/pgbouncer/userlist.txt

; Query to fetch password from database (alternative to auth_file)
; auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; =============================================================================
; POOL MODE — Most important setting
; =============================================================================

; Pool modes:
;   session     — connection held for entire client session (safest)
;   transaction — connection returned after each transaction (recommended)
;   statement   — connection returned after each statement (most restrictive)
;
; Transaction mode restrictions:
;   ✗ Prepared statements (unless max_prepared_statements > 0, PgBouncer 1.21+)
;   ✗ Session-level SET commands
;   ✗ Advisory locks
;   ✗ LISTEN/NOTIFY
;   ✗ Temporary tables (ON COMMIT DROP only)
;   ✗ LOAD
pool_mode = transaction

; =============================================================================
; POOL SIZING
; =============================================================================

; Maximum number of client connections PgBouncer will accept
; Set high — PgBouncer handles many clients efficiently
max_client_conn = 1000

; Server connections per user/database pair
; Total PG connections ≈ default_pool_size × number_of_user_db_pairs
; Keep: default_pool_size × pools ≤ max_connections - superuser_reserved
default_pool_size = 25

; Extra connections for burst handling
; These are used when all pool connections are in use and clients are waiting
reserve_pool_size = 5

; Seconds to wait before using reserve pool connections
reserve_pool_timeout = 3

; Minimum server connections to keep open per pool (even when idle)
min_pool_size = 5

; =============================================================================
; TIMEOUTS
; =============================================================================

; Close server connection if it has been idle this long (seconds)
; Frees database connections when load decreases
server_idle_timeout = 300

; Close client connection if idle for this long (0 = disabled)
; Useful for catching leaked connections
client_idle_timeout = 0

; Cancel query if it runs longer than this (0 = disabled)
; Better to set statement_timeout in PostgreSQL itself
query_timeout = 0

; Timeout for client connection setup
client_login_timeout = 60

; How long to wait for server connection (0 = disabled)
server_connect_timeout = 15

; Maximum age of server connection before recycling
; Helps balance load after adding new database servers
server_lifetime = 3600

; Wait for server response this long before considering it dead
server_check_delay = 30

; Query to verify server connection is alive
server_check_query = SELECT 1

; =============================================================================
; CONNECTION RESET
; =============================================================================

; Reset query run on server when returning connection to pool
; DISCARD ALL resets everything: prepared statements, temp tables, session vars
; For transaction mode, this is essential
server_reset_query = DISCARD ALL

; For session mode, you might not need a reset:
; server_reset_query =

; =============================================================================
; PREPARED STATEMENTS (PgBouncer 1.21+)
; =============================================================================

; Enable prepared statement forwarding in transaction mode
; Set to max number of prepared statements to cache per connection
; 0 = disabled (default)
max_prepared_statements = 0

; =============================================================================
; LOGGING
; =============================================================================

; Log file location (syslog if empty)
logfile = /var/log/pgbouncer/pgbouncer.log

; Syslog settings
; syslog = 0
; syslog_ident = pgbouncer
; syslog_facility = daemon

; Log connections and disconnections
log_connections = 1
log_disconnections = 1

; Log pool errors
log_pooler_errors = 1

; Statistics reporting interval (seconds)
stats_period = 60

; Verbose logging for debugging (0=off, 1=on, 2=very verbose)
verbose = 0

; =============================================================================
; TLS / SSL
; =============================================================================

; Client-side TLS (connections from application to PgBouncer)
; client_tls_sslmode = prefer
; client_tls_key_file = /etc/pgbouncer/server.key
; client_tls_cert_file = /etc/pgbouncer/server.crt
; client_tls_ca_file = /etc/pgbouncer/ca.crt

; Server-side TLS (connections from PgBouncer to PostgreSQL)
; server_tls_sslmode = prefer
; server_tls_ca_file = /etc/pgbouncer/ca.crt

; =============================================================================
; ADMIN CONSOLE
; =============================================================================

; Users allowed to connect to pgbouncer admin database
admin_users = pgbouncer_admin

; Users allowed to run read-only SHOW commands
stats_users = pgbouncer_stats, monitoring

; Admin console commands:
;   SHOW POOLS;     — pool statistics
;   SHOW STATS;     — query/connection stats
;   SHOW CLIENTS;   — connected clients
;   SHOW SERVERS;   — backend connections
;   SHOW CONFIG;    — current config
;   RELOAD;         — reload config
;   PAUSE db;       — pause a database
;   RESUME db;      — resume a database

; =============================================================================
; RESOURCE LIMITS
; =============================================================================

; Maximum number of client connections per database (0 = unlimited)
max_db_connections = 0

; Maximum number of client connections per user (0 = unlimited)
max_user_connections = 0

; Per-user pool size override (0 = use default_pool_size)
; default_pool_size applies per user/database combination
