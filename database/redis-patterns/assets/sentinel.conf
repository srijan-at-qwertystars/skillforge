# =============================================================================
# Redis Sentinel Configuration Template — High Availability
# =============================================================================
# Deploy 3+ Sentinel instances on separate hosts/VMs for HA.
# Each Sentinel monitors the same master and coordinates failover.
#
# Usage:
#   redis-sentinel /etc/redis/sentinel.conf
#   # or
#   redis-server /etc/redis/sentinel.conf --sentinel
#
# Typical deployment: 3 Sentinels on 3 separate machines.
# =============================================================================

# Sentinel port (default: 26379)
port 26379

# Bind to specific interfaces
# bind 127.0.0.1 10.0.0.1

# Protected mode
protected-mode no

# Sentinel working directory
dir /var/lib/redis-sentinel

# Log file
logfile /var/log/redis/sentinel.log

# Run as daemon
daemonize no

# PID file
pidfile /var/run/redis/redis-sentinel.pid

################################# MONITORING ##################################

# [REQUIRED] Monitor a master instance
# sentinel monitor <master-name> <ip> <port> <quorum>
# quorum = number of Sentinels that must agree the master is down
sentinel monitor mymaster 10.0.0.1 6379 2

# [REQUIRED] Master password (if requirepass is set)
# sentinel auth-pass mymaster YOUR_MASTER_PASSWORD

# Master username (Redis 6+ ACL)
# sentinel auth-user mymaster default

################################# FAILOVER ####################################

# Time (ms) before marking master as subjectively down (SDOWN)
sentinel down-after-milliseconds mymaster 5000

# Timeout (ms) for the entire failover process
sentinel failover-timeout mymaster 60000

# Number of replicas to reconfigure simultaneously during failover
# Lower = less impact, but slower failover
sentinel parallel-syncs mymaster 1

################################# NOTIFICATIONS ###############################

# Script called on any Sentinel event (for alerting)
# sentinel notification-script mymaster /opt/redis/scripts/notify.sh

# Script called after failover completes (for DNS/LB updates)
# sentinel client-reconfig-script mymaster /opt/redis/scripts/reconfig.sh

################################# ACL #########################################

# Sentinel password (protect Sentinel API)
# requirepass YOUR_SENTINEL_PASSWORD

# Sentinel ACL
# sentinel sentinel-user sentinel-admin
# sentinel sentinel-pass sentinel-admin-password

################################# ADVANCED ####################################

# Deny scripts to be rewritten by Sentinel (security)
sentinel deny-scripts-reconfig yes

# Resolve hostnames (useful for DNS-based discovery)
sentinel resolve-hostnames no

# Announce IP/port (for NAT/Docker environments)
# sentinel announce-ip 10.0.0.5
# sentinel announce-port 26379

# Rename dangerous commands on monitored instances
# sentinel rename-command mymaster CONFIG CONFIG_SECRET

################################# NOTES #######################################
#
# Quorum Sizing:
#   - 3 Sentinels: quorum 2 (tolerates 1 failure)
#   - 5 Sentinels: quorum 3 (tolerates 2 failures)
#
# Client Connection:
#   Clients should connect via Sentinel-aware drivers:
#
#   Python:
#     from redis.sentinel import Sentinel
#     sentinel = Sentinel([
#         ('sentinel-1', 26379),
#         ('sentinel-2', 26379),
#         ('sentinel-3', 26379),
#     ], socket_timeout=0.5)
#     master = sentinel.master_for('mymaster', socket_timeout=0.5)
#     replica = sentinel.slave_for('mymaster', socket_timeout=0.5)
#
#   Node.js (ioredis):
#     const redis = new Redis({
#       sentinels: [
#         { host: 'sentinel-1', port: 26379 },
#         { host: 'sentinel-2', port: 26379 },
#         { host: 'sentinel-3', port: 26379 },
#       ],
#       name: 'mymaster',
#     });
#
# Testing Failover:
#   redis-cli -p 26379 SENTINEL failover mymaster
#   redis-cli -p 26379 SENTINEL get-master-addr-by-name mymaster
#   redis-cli -p 26379 SENTINEL masters
#   redis-cli -p 26379 SENTINEL replicas mymaster
#
# Monitoring:
#   redis-cli -p 26379 SENTINEL ckquorum mymaster
#   redis-cli -p 26379 INFO sentinel
#
###############################################################################
