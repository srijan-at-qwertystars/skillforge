# =============================================================================
# Redis Production Configuration Template
# =============================================================================
# Copy and customize for your environment. Sections marked [REQUIRED] need
# review before deployment. Values shown are production-recommended defaults.
#
# Redis version: 7.x+
# =============================================================================

################################## NETWORK ####################################

# [REQUIRED] Bind to specific interfaces — never expose to public internet
bind 127.0.0.1 -::1
# For internal network access: bind 127.0.0.1 10.0.0.1

# Protected mode — extra safety layer if bind/password not set
protected-mode yes

# Port (0 = disable TCP, use Unix socket only)
port 6379

# Unix socket (faster for local connections)
# unixsocket /var/run/redis/redis.sock
# unixsocketperm 770

# TCP backlog — increase for high connection rates
tcp-backlog 511

# Close idle connections after N seconds (0 = disabled)
timeout 300

# TCP keepalive — detect dead peers
tcp-keepalive 60

################################## TLS/SSL ####################################

# [OPTIONAL] Enable TLS for encrypted connections
# tls-port 6380
# tls-cert-file /etc/redis/tls/redis.crt
# tls-key-file /etc/redis/tls/redis.key
# tls-ca-cert-file /etc/redis/tls/ca.crt
# tls-auth-clients optional
# tls-protocols "TLSv1.2 TLSv1.3"

################################## GENERAL ####################################

# Run as daemon
daemonize no

# PID file
pidfile /var/run/redis/redis-server.pid

# Log level: debug, verbose, notice, warning
loglevel notice

# Log file (empty = stdout)
logfile /var/log/redis/redis-server.log

# Number of databases
databases 16

# Show Redis logo on startup
always-show-logo no

################################## SECURITY ###################################

# [REQUIRED] Set a strong password — use ACLs for fine-grained control (Redis 6+)
# requirepass YOUR_STRONG_PASSWORD_HERE

# ACL file for user management
# aclfile /etc/redis/users.acl

# ACL example (inline):
# user default on >password ~* &* +@all
# user app-readonly on >readonlypass ~cache:* &* +@read -@dangerous
# user admin on >adminpass ~* &* +@all

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command DEBUG ""
# rename-command CONFIG "CONFIG_b840fc02d524045429941cc15f59e41cb7be6c52"

################################ SNAPSHOTTING ##################################

# RDB save points: save <seconds> <changes>
# Disable: save ""
save 3600 1
save 300 100
save 60 10000

# Stop writes on RDB save error
stop-writes-on-bgsave-error yes

# Compress RDB with LZF
rdbcompression yes

# RDB checksum
rdbchecksum yes

# Sanitize dump payload on restore
sanitize-dump-payload no

# RDB filename and directory
dbfilename dump.rdb
dir /var/lib/redis

################################# REPLICATION #################################

# [OPTIONAL] Replica configuration
# replicaof <masterip> <masterport>
# masterauth <master-password>
# masteruser <master-username>

# Serve stale data if master link is down
replica-serve-stale-data yes

# Replicas are read-only
replica-read-only yes

# Diskless replication (faster for slow disks)
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-diskless-sync-period 0

# Replication backlog (buffer for partial resync)
repl-backlog-size 256mb
repl-backlog-ttl 3600

# Replica priority (lower = preferred for Sentinel promotion, 0 = never promote)
replica-priority 100

# Minimum replicas for master to accept writes
# min-replicas-to-write 1
# min-replicas-max-lag 10

################################### CLIENTS ###################################

# Max simultaneous clients
maxclients 10000

############################## MEMORY MANAGEMENT ##############################

# [REQUIRED] Set memory limit
maxmemory 4gb

# Eviction policy
# allkeys-lru    — general-purpose cache (recommended default)
# volatile-lru   — evict only keys with TTL
# allkeys-lfu    — frequency-based (Redis 4+)
# noeviction     — return errors (primary database)
maxmemory-policy allkeys-lru

# Eviction sampling accuracy (higher = more accurate, slightly more CPU)
maxmemory-samples 10

# LFU tuning
# lfu-log-factor 10
# lfu-decay-time 1

# Lazy freeing (async deletion)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

# Active defragmentation
activedefrag yes
active-defrag-enabled yes
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25
active-defrag-max-scan-fields 1000

############################# APPEND ONLY MODE ################################

# Enable AOF persistence
appendonly yes

# AOF filename
appendfilename "appendonly.aof"
appenddirname "appendonlydir"

# fsync policy:
#   always    — fsync every write (safest, slowest)
#   everysec  — fsync every second (recommended)
#   no        — let OS decide (fastest, least durable)
appendfsync everysec

# Don't fsync during rewrite (reduces latency spikes)
no-appendfsync-on-rewrite yes

# Auto-rewrite triggers
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Load truncated AOF on startup
aof-load-truncated yes

# Hybrid AOF: RDB preamble + AOF tail (faster recovery)
aof-use-rdb-preamble yes

# AOF timestamp for point-in-time recovery
aof-timestamp-enabled no

############################### ENCODING ######################################

# Compact encoding thresholds (tune for memory efficiency)
hash-max-listpack-entries 128
hash-max-listpack-value 64

list-max-listpack-size -2
list-compress-depth 0

set-max-intset-entries 512
set-max-listpack-entries 128

zset-max-listpack-entries 128
zset-max-listpack-value 64

hll-sparse-max-bytes 3000

stream-node-max-bytes 4096
stream-node-max-entries 100

################################### THREADS ###################################

# I/O threads (Redis 6+) — set > 1 for high-concurrency workloads
# io-threads 4
# io-threads-do-reads yes

################################## SLOW LOG ###################################

# Log commands slower than N microseconds (10000 = 10ms)
slowlog-log-slower-than 10000

# Max slow log entries
slowlog-max-len 256

################################ LATENCY MONITOR ##############################

# Track events exceeding N milliseconds (0 = disabled)
latency-monitor-threshold 5

############################# EVENT NOTIFICATION ##############################

# Keyspace notifications (disabled by default, enable selectively)
# K = keyspace events, E = keyevent events
# g = generic, $ = string, l = list, s = set, h = hash, z = sorted set
# x = expired, e = evicted, A = all
notify-keyspace-events ""

############################### ADVANCED CONFIG ###############################

# Active expire effort (1-10, default 1, higher = more CPU for expiration)
active-expire-effort 1

# Close connection on write errors
close-on-oom no

# Jemalloc background thread for memory management
jemalloc-bg-thread yes

# Disable RESP2 to RESP3 migration warnings
# hide-user-data-from-log yes
