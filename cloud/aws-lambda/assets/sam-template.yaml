# AWS SAM Template - Production-Ready Serverless Application
# Deploys: API Gateway + Lambda + DynamoDB + SQS with dead-letter queue
# Usage: sam deploy --parameter-overrides Environment=dev

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Production-ready serverless API with DynamoDB storage,
  SQS async processing, structured logging, and monitoring.

# ---------------------------------------------------------------------------
# Parameters - configure per environment
# ---------------------------------------------------------------------------
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment
  LogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 180, 365]
    Description: CloudWatch log retention in days

# ---------------------------------------------------------------------------
# Globals - shared defaults for all Lambda functions
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: nodejs20.x
    Architectures: [arm64]
    Timeout: 15
    MemorySize: 256
    Tracing: Active                       # X-Ray tracing
    LoggingConfig:
      LogFormat: JSON                     # Structured JSON logging
      ApplicationLogLevel: INFO
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        TABLE_NAME: !Ref ItemsTable
        QUEUE_URL: !GetAtt ProcessingQueue.QueueUrl
        POWERTOOLS_SERVICE_NAME: my-service
  Api:
    OpenApiVersion: '3.0.1'

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # --- Shared Lambda Layer for common dependencies ---
  SharedDepsLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub '${AWS::StackName}-shared-deps'
      Description: Shared utilities and SDK clients
      ContentUri: layers/shared-deps/
      CompatibleRuntimes: [nodejs20.x]
      CompatibleArchitectures: [arm64]
      RetentionPolicy: Retain
    Metadata:
      BuildMethod: nodejs20.x

  # --- Primary API Lambda Function ---
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-api'
      Description: Handles HTTP API requests
      CodeUri: src/api/
      Handler: index.handler
      Layers:
        - !Ref SharedDepsLayer
      Events:
        # Catch-all route on HTTP API (API Gateway v2)
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY
      Policies:
        # Scoped IAM: read/write only to our table
        - DynamoDBCrudPolicy:
            TableName: !Ref ItemsTable
        # Scoped IAM: send messages only to our queue
        - SQSSendMessagePolicy:
            QueueName: !GetAtt ProcessingQueue.QueueName

  # --- API Gateway v2 (HTTP API) with CORS ---
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      Description: HTTP API with CORS enabled
      CorsConfiguration:
        AllowOrigins:
          - 'https://example.com'
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Request-Id
        MaxAge: 3600

  # --- DynamoDB Table with on-demand billing ---
  ItemsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${AWS::StackName}-items'
      BillingMode: PAY_PER_REQUEST          # On-demand capacity
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      # GSI for access patterns that reverse the key structure
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

  # --- SQS Dead-Letter Queue ---
  ProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-processing-dlq'
      MessageRetentionPeriod: 1209600       # 14 days

  # --- SQS Queue for async processing ---
  ProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${AWS::StackName}-processing'
      VisibilityTimeout: 90                 # 6x the consumer Lambda timeout
      MessageRetentionPeriod: 345600        # 4 days
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ProcessingDLQ.Arn
        maxReceiveCount: 3                  # Retry 3 times before sending to DLQ

  # --- SQS Consumer Lambda ---
  QueueProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${AWS::StackName}-queue-processor'
      Description: Processes messages from SQS queue
      CodeUri: src/queue-processor/
      Handler: index.handler
      Timeout: 15
      Layers:
        - !Ref SharedDepsLayer
      Events:
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt ProcessingQueue.Arn
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 5
            # Partial batch failure reporting - only retry failed messages
            FunctionResponseTypes:
              - ReportBatchItemFailures
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ItemsTable

  # --- CloudWatch Log Groups with retention ---
  ApiFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${ApiFunction}'
      RetentionInDays: !Ref LogRetentionDays

  QueueProcessorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${QueueProcessorFunction}'
      RetentionInDays: !Ref LogRetentionDays

  # --- CloudWatch Alarm: alert on Lambda errors ---
  ApiFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${AWS::StackName}-api-errors'
      AlarmDescription: Triggers when the API function has errors
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 300                           # 5-minute window
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

# ---------------------------------------------------------------------------
# Outputs - values available after deployment
# ---------------------------------------------------------------------------
Outputs:
  ApiUrl:
    Description: HTTP API endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/'
  ApiFunctionArn:
    Description: API Lambda function ARN
    Value: !GetAtt ApiFunction.Arn
  QueueProcessorFunctionArn:
    Description: Queue processor Lambda function ARN
    Value: !GetAtt QueueProcessorFunction.Arn
  ItemsTableName:
    Description: DynamoDB table name
    Value: !Ref ItemsTable
  ProcessingQueueUrl:
    Description: SQS queue URL
    Value: !GetAtt ProcessingQueue.QueueUrl
