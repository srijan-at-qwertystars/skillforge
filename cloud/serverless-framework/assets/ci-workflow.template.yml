# =============================================================================
# ci-workflow.template.yml — GitHub Actions for multi-stage Serverless deployment
# =============================================================================
#
# Usage: Copy to .github/workflows/deploy.yml in your repository.
#
# Features:
#   - Multi-stage deployment (dev → staging → prod)
#   - OIDC authentication (no long-lived AWS credentials)
#   - Automated testing before deployment
#   - Manual approval for production
#   - Deployment notifications
#   - Rollback support
#
# Required GitHub Secrets/Variables:
#   Secrets:
#     SERVERLESS_ACCESS_KEY        — Serverless Dashboard access key
#   Variables (per environment):
#     AWS_ROLE_ARN                 — IAM role ARN for OIDC
#     AWS_REGION                   — Target AWS region
# =============================================================================

name: Deploy Serverless

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  id-token: write    # Required for OIDC
  contents: read
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:

  # --- Lint, typecheck, and test ---
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run typecheck --if-present

      - name: Unit tests
        run: npm test -- --ci --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 5

  # --- Package (validate serverless.yml compiles) ---
  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Package
        run: npx serverless package --stage dev
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

      - name: Check package sizes
        run: |
          echo "## Package Sizes" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lhS .serverless/*.zip 2>/dev/null || echo "No zip files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # --- Deploy to Dev (on develop branch push) ---
  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    needs: [test, package]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to dev
        run: npx serverless deploy --stage dev --region ${{ vars.AWS_REGION }}
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

      - name: Show endpoints
        run: npx serverless info --stage dev --region ${{ vars.AWS_REGION }}
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

      - name: Smoke test
        run: |
          API_URL=$(npx serverless info --stage dev --region ${{ vars.AWS_REGION }} 2>/dev/null | grep -oP 'https://[^ ]+' | head -1)
          if [ -n "$API_URL" ]; then
            echo "Testing: ${API_URL}/health"
            curl -sf "${API_URL}/health" || echo "Health check not available"
          fi
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

  # --- Deploy to Staging (on main branch push) ---
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [test, package]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to staging
        run: npx serverless deploy --stage staging --region ${{ vars.AWS_REGION }}
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

      - name: Integration tests
        run: |
          echo "Running integration tests against staging..."
          npm run test:integration --if-present

  # --- Deploy to Production (manual approval) ---
  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production    # Requires manual approval in GitHub settings
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to production
        run: npx serverless deploy --stage prod --region ${{ vars.AWS_REGION }}
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

      - name: Verify deployment
        run: |
          npx serverless info --stage prod --region ${{ vars.AWS_REGION }}
          API_URL=$(npx serverless info --stage prod --region ${{ vars.AWS_REGION }} 2>/dev/null | grep -oP 'https://[^ ]+' | head -1)
          if [ -n "$API_URL" ]; then
            echo "Production health check: ${API_URL}/health"
            curl -sf "${API_URL}/health" || echo "⚠️ Health check endpoint not responding"
          fi
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}

      - name: Deployment summary
        run: |
          echo "## 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region:** ${{ vars.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY

  # --- Rollback workflow (manual trigger) ---
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: List deployments
        run: npx serverless deploy list --stage prod
        env:
          SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
