# =============================================================================
# serverless.template.yml — Production-grade Serverless Framework v4 template
# =============================================================================
# Features: REST API + HTTP API, Lambda authorizer, Cognito auth, API keys,
#           DynamoDB (single-table), SQS with DLQ, scheduled tasks, monitoring.
#
# Usage: Copy this file to serverless.yml in your project and customize.
# =============================================================================

service: my-service
frameworkVersion: '4'
# org: my-org                            # Uncomment for Serverless Dashboard
# app: my-app

provider:
  name: aws
  runtime: nodejs20.x
  architecture: arm64
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 512
  timeout: 10

  environment:
    STAGE: ${sls:stage}
    TABLE_NAME: ${param:tableName}
    QUEUE_URL: !Ref EventQueue
    LOG_LEVEL: ${param:logLevel}

  tags:
    project: ${self:service}
    environment: ${sls:stage}
    managed-by: serverless-framework

  deploymentBucket:
    name: ${self:service}-deploys-${aws:accountId}-${aws:region}
    serverSideEncryption: AES256
    blockPublicAccess: true
    maxPreviousDeploymentArtifacts: 5

  logRetentionInDays: 14

  tracing:
    lambda: true
    apiGateway: true

  # HTTP API (v2) configuration
  httpApi:
    cors:
      allowedOrigins:
        - https://${param:domainName}
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowCredentials: true
    authorizers:
      jwtAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: !Sub https://cognito-idp.${aws:region}.amazonaws.com/${UserPool}
        audience:
          - !Ref UserPoolClient

  # REST API (v1) configuration — for endpoints needing API keys
  apiGateway:
    apiKeys:
      - standard:
          - name: ${self:service}-${sls:stage}-standard-key
      - premium:
          - name: ${self:service}-${sls:stage}-premium-key
    usagePlan:
      - standard:
          quota: { limit: 10000, period: MONTH }
          throttle: { burstLimit: 50, rateLimit: 25 }
      - premium:
          quota: { limit: 1000000, period: MONTH }
          throttle: { burstLimit: 500, rateLimit: 200 }
    metrics: true

  iam:
    role:
      statements:
        # DynamoDB access
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
          Resource:
            - !GetAtt MainTable.Arn
            - !Sub '${MainTable.Arn}/index/*'
        # SQS access
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            - !GetAtt EventQueue.Arn
        # X-Ray tracing
      managedPolicies:
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess

build:
  esbuild:
    bundle: true
    minify: true
    sourcemap:
      type: linked
      setNodeOptions: true
    external:
      - '@aws-sdk/*'

stages:
  default:
    params:
      tableName: ${self:service}-${sls:stage}
      logLevel: info
      domainName: ${sls:stage}.api.example.com
  dev:
    params:
      logLevel: debug
  staging:
    params:
      logLevel: info
  prod:
    params:
      logLevel: warn
      domainName: api.example.com

# ---------------------------------------------------------------------------
# Functions
# ---------------------------------------------------------------------------
functions:

  # --- Public API (HTTP API v2 with JWT auth) ---
  createItem:
    handler: src/handlers/items.create
    events:
      - httpApi:
          path: /items
          method: POST
          authorizer:
            name: jwtAuthorizer

  getItem:
    handler: src/handlers/items.get
    events:
      - httpApi:
          path: /items/{id}
          method: GET
          authorizer:
            name: jwtAuthorizer

  listItems:
    handler: src/handlers/items.list
    events:
      - httpApi:
          path: /items
          method: GET
          authorizer:
            name: jwtAuthorizer

  updateItem:
    handler: src/handlers/items.update
    events:
      - httpApi:
          path: /items/{id}
          method: PUT
          authorizer:
            name: jwtAuthorizer

  deleteItem:
    handler: src/handlers/items.remove
    events:
      - httpApi:
          path: /items/{id}
          method: DELETE
          authorizer:
            name: jwtAuthorizer

  # --- Health check (no auth) ---
  health:
    handler: src/handlers/health.handler
    events:
      - httpApi:
          path: /health
          method: GET

  # --- Metered API (REST API v1 with API key) ---
  meteredEndpoint:
    handler: src/handlers/metered.handler
    events:
      - http:
          path: /v1/metered
          method: GET
          cors: true
          private: true

  # --- Event processing (SQS consumer) ---
  processEvent:
    handler: src/handlers/events.process
    timeout: 30
    memorySize: 256
    reservedConcurrency: 10
    events:
      - sqs:
          arn: !GetAtt EventQueue.Arn
          batchSize: 10
          maximumBatchingWindow: 5
          functionResponseType: ReportBatchItemFailures

  # --- DLQ processor (alert and store failed events) ---
  processDLQ:
    handler: src/handlers/events.processDLQ
    events:
      - sqs:
          arn: !GetAtt EventDLQ.Arn
          batchSize: 1

  # --- Scheduled tasks ---
  dailyCleanup:
    handler: src/handlers/scheduled.cleanup
    timeout: 300
    events:
      - schedule:
          rate: cron(0 3 * * ? *)
          enabled: true
          input:
            action: cleanup

  # --- DynamoDB Stream processor ---
  onTableChange:
    handler: src/handlers/streams.onChange
    timeout: 30
    events:
      - stream:
          type: dynamodb
          arn: !GetAtt MainTable.StreamArn
          batchSize: 25
          startingPosition: LATEST
          maximumRetryAttempts: 3
          bisectBatchOnFunctionError: true
          functionResponseType: ReportBatchItemFailures
          filterPatterns:
            - eventName: [INSERT, MODIFY]

plugins:
  - serverless-offline

package:
  individually: true
  patterns:
    - '!./**'
    - 'src/**'
    - '!src/**/*.test.*'
    - '!src/**/*.spec.*'

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
resources:
  Conditions:
    IsProd:
      !Equals [${sls:stage}, prod]

  Resources:
    # --- DynamoDB (single-table design) ---
    MainTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${param:tableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - { AttributeName: pk, AttributeType: S }
          - { AttributeName: sk, AttributeType: S }
          - { AttributeName: GSI1PK, AttributeType: S }
          - { AttributeName: GSI1SK, AttributeType: S }
        KeySchema:
          - { AttributeName: pk, KeyType: HASH }
          - { AttributeName: sk, KeyType: RANGE }
        GlobalSecondaryIndexes:
          - IndexName: GSI1
            KeySchema:
              - { AttributeName: GSI1PK, KeyType: HASH }
              - { AttributeName: GSI1SK, KeyType: RANGE }
            Projection: { ProjectionType: ALL }
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        Tags:
          - { Key: project, Value: '${self:service}' }

    # --- SQS Queue with DLQ ---
    EventQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${sls:stage}-events
        VisibilityTimeout: 180
        MessageRetentionPeriod: 1209600
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt EventDLQ.Arn
          maxReceiveCount: 3

    EventDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${sls:stage}-events-dlq
        MessageRetentionPeriod: 1209600

    # --- Cognito User Pool ---
    UserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: ${self:service}-${sls:stage}
        AutoVerifiedAttributes: [email]
        UsernameAttributes: [email]
        Policies:
          PasswordPolicy:
            MinimumLength: 12
            RequireUppercase: true
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: true
        Schema:
          - Name: email
            Required: true
            Mutable: true
        AccountRecoverySetting:
          RecoveryMechanisms:
            - Name: verified_email
              Priority: 1

    UserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: ${self:service}-${sls:stage}-client
        UserPoolId: !Ref UserPool
        ExplicitAuthFlows:
          - ALLOW_USER_SRP_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        GenerateSecret: false
        PreventUserExistenceErrors: ENABLED
        AccessTokenValidity: 1
        IdTokenValidity: 1
        RefreshTokenValidity: 30
        TokenValidityUnits:
          AccessToken: hours
          IdToken: hours
          RefreshToken: days

    # --- CloudWatch Alarms (prod only) ---
    LambdaErrorAlarm:
      Type: AWS::CloudWatch::Alarm
      Condition: IsProd
      Properties:
        AlarmName: ${self:service}-${sls:stage}-lambda-errors
        AlarmDescription: Lambda function errors detected
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value: !Ref ProcessEventLambdaFunction
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 5
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching

    DLQDepthAlarm:
      Type: AWS::CloudWatch::Alarm
      Condition: IsProd
      Properties:
        AlarmName: ${self:service}-${sls:stage}-dlq-depth
        AlarmDescription: Messages in DLQ
        Namespace: AWS/SQS
        MetricName: ApproximateNumberOfMessagesVisible
        Dimensions:
          - Name: QueueName
            Value: !GetAtt EventDLQ.QueueName
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold

  Outputs:
    ApiUrl:
      Description: HTTP API URL
      Value: !Sub 'https://${HttpApi}.execute-api.${aws:region}.amazonaws.com'
    RestApiUrl:
      Description: REST API URL
      Value: !Sub 'https://${ApiGatewayRestApi}.execute-api.${aws:region}.amazonaws.com/${sls:stage}'
    TableName:
      Description: DynamoDB table name
      Value: !Ref MainTable
    TableArn:
      Description: DynamoDB table ARN
      Value: !GetAtt MainTable.Arn
    QueueUrl:
      Description: SQS queue URL
      Value: !Ref EventQueue
    QueueArn:
      Description: SQS queue ARN
      Value: !GetAtt EventQueue.Arn
    UserPoolId:
      Description: Cognito User Pool ID
      Value: !Ref UserPool
    UserPoolClientId:
      Description: Cognito User Pool Client ID
      Value: !Ref UserPoolClient
