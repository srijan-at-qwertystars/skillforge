# nginx-rate-limit.conf — Nginx rate limiting configuration
#
# Features:
#   - Per-IP rate limiting with burst support
#   - Per-API-key rate limiting
#   - Different limits for different endpoints
#   - Proper 429 status codes (not default 503)
#   - Rate limit response headers
#   - Allowlisting for internal/monitoring IPs
#
# Usage:
#   Include in your nginx.conf http{} block or use as a template.
#   Test config: nginx -t
#   Reload: nginx -s reload

# --- Rate Limit Zones ---

# Zone 1: General API — 10 requests/second per IP
# 10m shared memory ≈ ~160,000 unique IPs tracked
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;

# Zone 2: Auth endpoints — 5 requests/minute per IP (strict)
limit_req_zone $binary_remote_addr zone=auth_per_ip:5m rate=5r/m;

# Zone 3: Per API key — 100 requests/second
# Uses $http_x_api_key header as the key
map $http_x_api_key $api_key_or_ip {
    default     $binary_remote_addr;
    "~.+"       $http_x_api_key;
}
limit_req_zone $api_key_or_ip zone=api_per_key:10m rate=100r/s;

# Zone 4: Expensive endpoints (search, export) — 2 requests/second per IP
limit_req_zone $binary_remote_addr zone=expensive_per_ip:5m rate=2r/s;

# --- Global Settings ---

# Return 429 (not default 503) when rate limited
limit_req_status 429;

# Log rate-limited requests at warn level
limit_req_log_level warn;

# --- Allowlist ---
# Skip rate limiting for internal/monitoring IPs
geo $rate_limit_exempt {
    default         0;
    127.0.0.1/32    1;
    10.0.0.0/8      1;  # Internal network
    # Add monitoring IPs, CI/CD, etc.
}

map $rate_limit_exempt $limit_key {
    0   $binary_remote_addr;
    1   "";  # Empty key = no rate limiting
}

# --- Server Configuration ---

server {
    listen 443 ssl http2;
    server_name api.example.com;

    # --- Rate Limit Headers ---
    # Add rate limit info headers to all responses
    # Note: Nginx doesn't natively expose remaining/reset — use lua-nginx-module
    # or add static headers as documentation hints
    add_header X-RateLimit-Limit "600" always;

    # --- General API Endpoints ---
    location /api/ {
        # Allow burst of 20 requests without delay
        limit_req zone=api_per_ip burst=20 nodelay;

        # Per-key limiting layered on top
        limit_req zone=api_per_key burst=200 nodelay;

        proxy_pass http://backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Auth Endpoints (strict limiting) ---
    location /api/auth/ {
        # Very strict: 5/min with burst of 3
        limit_req zone=auth_per_ip burst=3 nodelay;

        proxy_pass http://backend;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Expensive Endpoints ---
    location ~ ^/api/(search|export|reports) {
        # 2/sec with burst of 5, delay after 2 (queue remaining)
        limit_req zone=expensive_per_ip burst=5 delay=2;

        proxy_pass http://backend;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Custom 429 Error Page ---
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        add_header Retry-After 60 always;
        add_header RateLimit-Remaining 0 always;
        return 429 '{"error":"rate_limit_exceeded","message":"Too many requests. Please retry later.","retry_after":60}';
    }

    # --- Health Check (no rate limiting) ---
    location /health {
        limit_req off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}

# --- Backend Upstream ---
upstream backend {
    server 127.0.0.1:3000;
    server 127.0.0.1:3001;
    keepalive 32;
}
