# Production Vault Helm Chart Values
# Reference: https://developer.hashicorp.com/vault/docs/platform/k8s/helm/configuration
#
# Usage:
#   helm install vault hashicorp/vault -f vault-helm-values.yaml -n vault --create-namespace
#
# Prerequisites:
#   - Kubernetes 1.26+
#   - Helm 3.x
#   - TLS certificates provisioned (or use cert-manager)
#   - KMS key for auto-unseal (AWS KMS example below)
#   - StorageClass available for persistent volumes

global:
  enabled: true
  tlsDisable: false

server:
  enabled: true

  image:
    repository: hashicorp/vault
    tag: "1.18.3"
    pullPolicy: IfNotPresent

  # Enterprise license (uncomment for Enterprise)
  # enterpriseLicense:
  #   secretName: vault-license
  #   secretKey: license

  updateStrategyType: RollingUpdate

  resources:
    requests:
      memory: 512Mi
      cpu: 500m
    limits:
      memory: 1Gi
      cpu: 2000m

  # Readiness and liveness probes
  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"
  livenessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true"
    initialDelaySeconds: 60

  # Extra environment variables
  extraEnvironmentVars:
    VAULT_CACERT: /vault/tls/ca.crt
    # AWS region for KMS auto-unseal
    AWS_REGION: us-east-1

  # Mount TLS certificates from a Kubernetes secret
  volumes:
  - name: vault-tls
    secret:
      secretName: vault-tls-cert

  volumeMounts:
  - name: vault-tls
    mountPath: /vault/tls
    readOnly: true

  # Tolerations for dedicated nodes
  tolerations:
  - key: "vault"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

  # Node affinity for dedicated nodes
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/name: vault
            component: server
        topologyKey: kubernetes.io/hostname

  # Service account with IAM role annotation (for AWS KMS)
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/vault-kms-unseal"

  # HA configuration with Raft storage
  ha:
    enabled: true
    replicas: 3

    raft:
      enabled: true
      setNodeId: true

      config: |
        ui = true

        listener "tcp" {
          address         = "[::]:8200"
          cluster_address = "[::]:8201"
          tls_cert_file   = "/vault/tls/tls.crt"
          tls_key_file    = "/vault/tls/tls.key"
          tls_client_ca_file = "/vault/tls/ca.crt"

          telemetry {
            unauthenticated_metrics_access = true
          }
        }

        storage "raft" {
          path = "/vault/data"

          retry_join {
            leader_api_addr   = "https://vault-0.vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
            leader_client_cert_file = "/vault/tls/tls.crt"
            leader_client_key_file  = "/vault/tls/tls.key"
          }
          retry_join {
            leader_api_addr   = "https://vault-1.vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
            leader_client_cert_file = "/vault/tls/tls.crt"
            leader_client_key_file  = "/vault/tls/tls.key"
          }
          retry_join {
            leader_api_addr   = "https://vault-2.vault-internal:8200"
            leader_ca_cert_file = "/vault/tls/ca.crt"
            leader_client_cert_file = "/vault/tls/tls.crt"
            leader_client_key_file  = "/vault/tls/tls.key"
          }

          autopilot {
            cleanup_dead_servers         = "true"
            last_contact_threshold       = "200ms"
            last_log_index_threshold     = 0
            max_trailing_logs            = 250
            min_quorum                   = 2
            server_stabilization_time    = "10s"
          }
        }

        seal "awskms" {
          region     = "us-east-1"
          kms_key_id = "alias/vault-unseal-key"
        }

        telemetry {
          prometheus_retention_time = "24h"
          disable_hostname         = true
        }

        service_registration "kubernetes" {}

  # Data storage
  dataStorage:
    enabled: true
    size: 20Gi
    storageClass: gp3-encrypted
    accessMode: ReadWriteOnce

  # Audit log storage
  auditStorage:
    enabled: true
    size: 50Gi
    storageClass: gp3-encrypted
    accessMode: ReadWriteOnce

  # Standalone mode (disabled for HA)
  standalone:
    enabled: false

  # Ingress
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
      nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    hosts:
    - host: vault.example.com
    tls:
    - hosts:
      - vault.example.com
      secretName: vault-ingress-tls

  # Network policy
  networkPolicy:
    enabled: true
    egress: []

# --- Vault Agent Injector ---
injector:
  enabled: true
  replicas: 2

  image:
    repository: hashicorp/vault-k8s
    tag: "1.4.3"

  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 128Mi
      cpu: 250m

  agentDefaults:
    cpuLimit: "250m"
    cpuRequest: "50m"
    memLimit: "128Mi"
    memRequest: "64Mi"
    template: "map"
    templateConfig:
      exitOnRetryFailure: true
      staticSecretRenderInterval: "30s"

  # Webhook failure policy: Ignore means pods still start if injector is down
  failurePolicy: Ignore

  # Metrics
  metrics:
    enabled: true

# --- CSI Provider ---
csi:
  enabled: true

  image:
    repository: hashicorp/vault-csi-provider
    tag: "1.4.3"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

# --- UI ---
ui:
  enabled: true
  serviceType: ClusterIP

# --- Server Test (helm test) ---
serverTelemetry:
  serviceMonitor:
    enabled: true
    selectors:
      release: prometheus
    interval: 30s
    scrapeTimeout: 10s
