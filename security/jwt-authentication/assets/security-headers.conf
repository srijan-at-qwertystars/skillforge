# ==========================================================================
# Nginx Configuration – Security Headers & Rate Limiting for Auth Endpoints
#
# Drop this file into /etc/nginx/conf.d/ or include it from your server
# block:  include /etc/nginx/snippets/security-headers.conf;
#
# Adjust upstream, domain, and rate-limit values to match your environment.
# ==========================================================================


# --------------------------------------------------------------------------
# Rate Limiting Zones
#
# Define shared-memory zones that track request rates per client IP.
# The "zone" size determines how many unique IPs can be tracked
# (1 MB ≈ 16 000 IPs for binary_remote_addr).
# --------------------------------------------------------------------------

# Login endpoint: 5 requests/minute per IP – protects against brute-force.
limit_req_zone $binary_remote_addr zone=auth_login:10m rate=5r/m;

# Token refresh: 10 requests/minute per IP – slightly more generous than login.
limit_req_zone $binary_remote_addr zone=auth_refresh:10m rate=10r/m;

# General API: 60 requests/minute per IP – adjust to your traffic profile.
limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;


# --------------------------------------------------------------------------
# Upstream – auth / API backend
# --------------------------------------------------------------------------
upstream auth_backend {
    server 127.0.0.1:3000;

    # Keep-alive connections to the backend for better performance.
    keepalive 32;
}


server {
    listen 443 ssl http2;
    server_name auth.example.com;

    # ------------------------------------------------------------------
    # TLS (provide your own cert paths)
    # ------------------------------------------------------------------
    ssl_certificate     /etc/ssl/certs/auth.example.com.crt;
    ssl_certificate_key /etc/ssl/private/auth.example.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ------------------------------------------------------------------
    # Global Security Headers
    #
    # Applied to every response from this server block.
    # ------------------------------------------------------------------

    # Prevent browsers from MIME-type sniffing the response.
    add_header X-Content-Type-Options "nosniff" always;

    # Enable HTTP Strict Transport Security (HSTS).
    # max-age=31536000 = 1 year; includeSubDomains covers all sub-domains.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Prevent the page from being embedded in frames (click-jacking defense).
    add_header X-Frame-Options "DENY" always;

    # Restrict browser features the page can use.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Referrer-Policy: send origin only on same-origin requests.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content-Security-Policy: restrictive default for API-only services.
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # ------------------------------------------------------------------
    # CORS Configuration for Auth Endpoints
    #
    # Allow the frontend origin to make credentialed requests to the
    # auth API.  Adjust $cors_origin to your front-end domain(s).
    # ------------------------------------------------------------------

    # Map to determine allowed origins. Add additional origins as needed.
    set $cors_origin "";
    if ($http_origin ~* "^https://(app\.example\.com|admin\.example\.com)$") {
        set $cors_origin $http_origin;
    }

    # ------------------------------------------------------------------
    # Auth Endpoints
    # ------------------------------------------------------------------

    # --- Login ----------------------------------------------------------
    location /auth/login {
        # Rate limit: 5 req/min with a small burst allowance.
        limit_req zone=auth_login burst=3 nodelay;
        limit_req_status 429;

        # CORS headers
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Max-Age       "3600" always;

        # Handle preflight requests.
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Only allow POST.
        limit_except POST {
            deny all;
        }

        proxy_pass http://auth_backend;
        include    /etc/nginx/snippets/proxy-params.conf;
    }

    # --- Token refresh --------------------------------------------------
    location /auth/refresh {
        # Rate limit: 10 req/min with burst.
        limit_req zone=auth_refresh burst=5 nodelay;
        limit_req_status 429;

        # CORS headers
        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Max-Age       "3600" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        limit_except POST {
            deny all;
        }

        proxy_pass http://auth_backend;
        include    /etc/nginx/snippets/proxy-params.conf;
    }

    # --- Logout ---------------------------------------------------------
    location /auth/logout {
        limit_req zone=auth_refresh burst=5 nodelay;
        limit_req_status 429;

        add_header Access-Control-Allow-Origin  $cors_origin always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Access-Control-Max-Age       "3600" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        limit_except POST {
            deny all;
        }

        proxy_pass http://auth_backend;
        include    /etc/nginx/snippets/proxy-params.conf;
    }

    # ------------------------------------------------------------------
    # Protected API Endpoints
    # ------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        # CORS headers
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods      "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers      "Content-Type, Authorization" always;
        add_header Access-Control-Allow-Credentials  "true" always;
        add_header Access-Control-Max-Age            "3600" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://auth_backend;
        include    /etc/nginx/snippets/proxy-params.conf;
    }

    # ------------------------------------------------------------------
    # JWKS Endpoint (public, cacheable)
    # ------------------------------------------------------------------
    location /.well-known/jwks.json {
        # No rate limiting – this should be aggressively cached instead.
        proxy_pass http://auth_backend;
        include    /etc/nginx/snippets/proxy-params.conf;

        # Override backend cache headers with a longer TTL at the edge.
        proxy_cache_valid 200 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ------------------------------------------------------------------
    # Default – deny everything else
    # ------------------------------------------------------------------
    location / {
        return 404;
    }
}


# --------------------------------------------------------------------------
# HTTP → HTTPS redirect
# --------------------------------------------------------------------------
server {
    listen 80;
    server_name auth.example.com;
    return 301 https://$host$request_uri;
}
