# Nginx HTTPS configuration for local WebAuthn development.
#
# Prerequisites:
#   1. Generate certificates with mkcert:
#      mkcert -install && mkcert localhost 127.0.0.1 ::1
#   2. Update ssl_certificate and ssl_certificate_key paths below.
#   3. Test config: nginx -t
#   4. Reload: nginx -s reload
#
# For production, replace certificate paths and add security headers.

# Upstream: your application server
upstream webauthn_app {
    server 127.0.0.1:3001;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name localhost;

    # --- TLS Configuration ---
    # Development: mkcert certificates
    ssl_certificate     /path/to/localhost+2.pem;
    ssl_certificate_key /path/to/localhost+2-key.pem;

    # TLS protocol versions
    ssl_protocols TLSv1.2 TLSv1.3;

    # Cipher suites — prefer modern, high-security ciphers
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # TLS session caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (production only — mkcert certs don't support OCSP)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /path/to/chain.pem;

    # --- Security Headers ---
    # HSTS: tell browsers to always use HTTPS (production only)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy — restrict access to sensitive APIs
    add_header Permissions-Policy "publickey-credentials-create=(self), publickey-credentials-get=(self)" always;

    # Content Security Policy
    # Adjust script-src and style-src based on your application
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # --- Logging ---
    access_log /var/log/nginx/webauthn-access.log;
    error_log  /var/log/nginx/webauthn-error.log;

    # --- Root and Index ---
    root /var/www/html;
    index index.html;

    # --- Proxy to Application ---
    location /api/ {
        proxy_pass http://webauthn_app;

        # Pass original client info
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket support (if needed for real-time features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts — WebAuthn ceremonies can take up to 5 minutes
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    310s;  # > 300s WebAuthn timeout

        # Buffer settings
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # --- WebAuthn Well-Known Files ---
    # Apple App Site Association (for iOS passkey integration)
    location /.well-known/apple-app-site-association {
        default_type application/json;
        # Serve directly or proxy to app
        # Example static file:
        # alias /var/www/html/.well-known/apple-app-site-association;
    }

    # Android Asset Links (for Android passkey integration)
    location /.well-known/assetlinks.json {
        default_type application/json;
    }

    # WebAuthn Related Origins (Level 3 draft feature)
    location /.well-known/webauthn {
        default_type application/json;
    }

    # --- Static Files ---
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # --- Deny access to hidden files ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
