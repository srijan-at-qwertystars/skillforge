# nginx-oauth2-proxy.conf — Nginx configuration with oauth2-proxy integration
#
# This config sets up Nginx as a reverse proxy that delegates authentication
# to oauth2-proxy (https://oauth2-proxy.github.io/oauth2-proxy/).
#
# Architecture:
#   Client → Nginx (port 443) → auth_request to oauth2-proxy (port 4180)
#                               → upstream app (port 3000) if authenticated
#                               → oauth2-proxy login if not authenticated
#
# Setup:
#   1. Install oauth2-proxy: https://oauth2-proxy.github.io/oauth2-proxy/installation
#   2. Configure oauth2-proxy with your OAuth2 provider
#   3. Place this file in /etc/nginx/conf.d/ or include in nginx.conf
#   4. Adjust upstream, server_name, and SSL paths
#
# oauth2-proxy example command:
#   oauth2-proxy \
#     --provider=google \
#     --client-id=CLIENT_ID \
#     --client-secret=CLIENT_SECRET \
#     --cookie-secret=$(openssl rand -base64 32) \
#     --email-domain=example.com \
#     --upstream=http://127.0.0.1:3000 \
#     --http-address=127.0.0.1:4180 \
#     --cookie-secure=true \
#     --cookie-httponly=true \
#     --cookie-samesite=lax \
#     --set-xauthrequest=true \
#     --pass-access-token=true

# Upstream: your application server
upstream app_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# Upstream: oauth2-proxy
upstream oauth2_proxy {
    server 127.0.0.1:4180;
    keepalive 16;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name app.example.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name app.example.com;

    # --- SSL Configuration ---
    ssl_certificate     /etc/nginx/ssl/app.example.com.crt;
    ssl_certificate_key /etc/nginx/ssl/app.example.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # --- Security Headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

    # --- oauth2-proxy endpoints ---

    # oauth2-proxy handles /oauth2/ paths directly
    location /oauth2/ {
        proxy_pass http://oauth2_proxy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }

    # Internal auth check endpoint — used by auth_request
    location = /oauth2/auth {
        internal;
        proxy_pass http://oauth2_proxy;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }

    # Error handler: redirect to oauth2-proxy sign-in
    location @oauth2_signin {
        return 302 /oauth2/start?rd=$request_uri;
    }

    # --- Protected Application ---

    location / {
        # Authenticate via oauth2-proxy
        auth_request /oauth2/auth;

        # On auth failure, redirect to sign-in
        error_page 401 = @oauth2_signin;

        # Pass authenticated user info to upstream
        auth_request_set $auth_user   $upstream_http_x_auth_request_user;
        auth_request_set $auth_email  $upstream_http_x_auth_request_email;
        auth_request_set $auth_token  $upstream_http_x_auth_request_access_token;
        auth_request_set $auth_groups $upstream_http_x_auth_request_groups;

        proxy_set_header X-Auth-User   $auth_user;
        proxy_set_header X-Auth-Email  $auth_email;
        proxy_set_header X-Auth-Groups $auth_groups;
        # Optionally pass the access token to upstream:
        # proxy_set_header Authorization "Bearer $auth_token";

        # Proxy to application
        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # --- Public Paths (no auth required) ---

    location /health {
        auth_request off;
        proxy_pass http://app_backend;
    }

    location /public/ {
        auth_request off;
        proxy_pass http://app_backend;
    }

    # Static assets (no auth required)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        auth_request off;
        proxy_pass http://app_backend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- API Paths (return 401 JSON instead of redirect) ---

    location /api/ {
        auth_request /oauth2/auth;

        # Return 401 JSON for API requests instead of redirecting
        error_page 401 = @api_unauthorized;

        auth_request_set $auth_user  $upstream_http_x_auth_request_user;
        auth_request_set $auth_email $upstream_http_x_auth_request_email;
        auth_request_set $auth_token $upstream_http_x_auth_request_access_token;

        proxy_set_header X-Auth-User  $auth_user;
        proxy_set_header X-Auth-Email $auth_email;

        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location @api_unauthorized {
        default_type application/json;
        return 401 '{"error": "unauthorized", "message": "Authentication required"}';
    }
}
