# ────────────────────────────────────────────────────────────
# Nginx Security Headers Configuration
#
# Usage:
#   Include in your server block:
#     include /etc/nginx/snippets/security-headers.conf;
#
#   Or copy directives into your server/location blocks.
#
# IMPORTANT:
#   - Use `always` to apply headers on error responses too.
#   - Headers in nested `location` blocks OVERRIDE the parent.
#     Repeat this include in each location block, or use `map`.
#   - Only include HSTS in HTTPS server blocks.
#   - Customize CSP directives for your application.
# ────────────────────────────────────────────────────────────


# ── Content-Security-Policy ─────────────────────────────────
# Strict baseline. Customize per your app's needs.
# For nonce-based CSP, use a dynamic approach (e.g., OpenResty,
# njs module, or set via upstream app and proxy_pass).
#
# To use nonces with Nginx, set the CSP header in your
# application code instead, or use the njs module:
#   js_set $csp_nonce csp.generateNonce;
#   add_header Content-Security-Policy "script-src 'nonce-$csp_nonce' 'strict-dynamic'" always;

add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; media-src 'self'; object-src 'none'; frame-src 'none'; worker-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'none'; upgrade-insecure-requests" always;


# ── Strict-Transport-Security (HSTS) ───────────────────────
# Forces HTTPS for 1 year. includeSubDomains covers all
# subdomains. preload enables browser preload list submission.
#
# WARNING: Only enable after confirming ALL subdomains support HTTPS.
# Start with a short max-age (300) during rollout, then increase.
# Preload submission: https://hstspreload.org

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;


# ── X-Content-Type-Options ─────────────────────────────────
# Prevents MIME-type sniffing. Browsers will respect the
# declared Content-Type and refuse to execute scripts served
# with wrong MIME types.

add_header X-Content-Type-Options "nosniff" always;


# ── X-Frame-Options ────────────────────────────────────────
# Clickjacking protection. DENY blocks all framing.
# Use SAMEORIGIN if your app uses self-framing.
# This is a backup for CSP frame-ancestors (which takes precedence).

add_header X-Frame-Options "DENY" always;


# ── Referrer-Policy ────────────────────────────────────────
# Controls referrer information sent with requests.
# strict-origin-when-cross-origin: full URL same-origin,
# origin-only cross-origin (HTTPS), nothing on downgrade.

add_header Referrer-Policy "strict-origin-when-cross-origin" always;


# ── Permissions-Policy ─────────────────────────────────────
# Restricts browser feature access. Deny features you don't use.
# Syntax: feature=() denies all, feature=(self) allows same-origin.

add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), display-capture=(), fullscreen=(self), picture-in-picture=(self)" always;


# ── Cross-Origin-Opener-Policy (COOP) ─────────────────────
# Isolates browsing context group.
# same-origin: only same-origin pages share the context.
# Use same-origin-allow-popups if you need OAuth/payment popups.

add_header Cross-Origin-Opener-Policy "same-origin" always;


# ── Cross-Origin-Resource-Policy (CORP) ────────────────────
# Controls which origins can load your resources.
# same-origin: only your origin can load these resources.
# Use cross-origin for public assets (CDN, public API).

add_header Cross-Origin-Resource-Policy "same-origin" always;


# ── Cross-Origin-Embedder-Policy (COEP) ───────────────────
# Requires all embedded resources to opt in via CORS or CORP.
# Required for cross-origin isolation (SharedArrayBuffer).
# Use credentialless as a less restrictive alternative.
#
# NOTE: May break third-party images/scripts. Test thoroughly.
# Comment out if not needed.

# add_header Cross-Origin-Embedder-Policy "require-corp" always;


# ── Server Information ─────────────────────────────────────
# Hide Nginx version in Server header.
# To fully remove the Server header, use: more_clear_headers Server;
# (requires ngx_headers_more module)

server_tokens off;


# ── Cache-Control for Sensitive Pages ──────────────────────
# Apply to location blocks serving authenticated/sensitive content:
#
# location /account {
#     add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
#     add_header Pragma "no-cache" always;
#     # ... repeat other security headers ...
# }


# ── Additional Hardening ───────────────────────────────────
# Remove X-Powered-By if set by upstream application
proxy_hide_header X-Powered-By;

# Limit request body size (prevent large payload attacks)
# client_max_body_size 10m;

# Rate limiting (define in http block, apply in server/location):
# limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
# limit_req zone=general burst=20 nodelay;
