# Keycloak + PostgreSQL Production-like Docker Compose Setup
#
# Usage:
#   docker compose up -d                    # Start stack
#   docker compose logs -f keycloak         # Follow Keycloak logs
#   docker compose down                     # Stop stack
#   docker compose down -v                  # Stop and remove volumes
#
# Environment variables (set in .env file or shell):
#   KC_VERSION          - Keycloak version (default: 25.0)
#   PG_VERSION          - PostgreSQL version (default: 16)
#   KC_ADMIN            - Admin username (default: admin)
#   KC_ADMIN_PASSWORD   - Admin password (CHANGE IN PRODUCTION)
#   PG_PASSWORD         - PostgreSQL password (CHANGE IN PRODUCTION)
#   KC_HOSTNAME         - Public hostname (default: localhost)
#   KC_HTTP_PORT        - HTTP port (default: 8080)
#   KC_HTTPS_PORT       - HTTPS port (default: 8443)

version: "3.9"

services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:${PG_VERSION:-16}-alpine
    container_name: keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${PG_PASSWORD:-keycloak}
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - keycloak-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "log_statement=mod"
      - "-c"
      - "log_min_duration_statement=500"

  # --- Keycloak Identity Provider ---
  keycloak:
    image: quay.io/keycloak/keycloak:${KC_VERSION:-25.0}
    container_name: keycloak
    restart: unless-stopped
    command: start --optimized
    build:
      context: .
      dockerfile_inline: |
        FROM quay.io/keycloak/keycloak:${KC_VERSION:-25.0} AS builder
        ENV KC_DB=postgres
        ENV KC_HEALTH_ENABLED=true
        ENV KC_METRICS_ENABLED=true
        ENV KC_FEATURES=token-exchange,admin-fine-grained-authz,organization
        RUN /opt/keycloak/bin/kc.sh build
        FROM quay.io/keycloak/keycloak:${KC_VERSION:-25.0}
        COPY --from=builder /opt/keycloak/ /opt/keycloak/
        ENTRYPOINT ["/opt/keycloak/bin/kc.sh"]
    environment:
      # Database
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${PG_PASSWORD:-keycloak}
      KC_DB_POOL_MIN_SIZE: "10"
      KC_DB_POOL_MAX_SIZE: "50"

      # Admin credentials
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}

      # Hostname
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"

      # Proxy (when behind reverse proxy)
      KC_PROXY_HEADERS: xforwarded

      # Health and metrics
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"

      # Logging
      KC_LOG_LEVEL: INFO
      KC_LOG_CONSOLE_OUTPUT: json

      # Cache
      KC_CACHE: ispn

      # JVM
      JAVA_OPTS_APPEND: >-
        -XX:MaxRAMPercentage=70.0
        -XX:InitialRAMPercentage=50.0
        -Djava.net.preferIPv4Stack=true
    ports:
      - "${KC_HTTP_PORT:-8080}:8080"
      - "${KC_HTTPS_PORT:-8443}:8443"
    volumes:
      - ./themes:/opt/keycloak/themes:ro
      - ./providers:/opt/keycloak/providers:ro
      - ./import:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - keycloak-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

volumes:
  pgdata:
    driver: local

networks:
  keycloak-net:
    driver: bridge
