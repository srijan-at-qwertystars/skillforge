# Nginx Reverse Proxy Configuration for Keycloak
#
# Usage:
#   1. Copy this file to /etc/nginx/conf.d/keycloak.conf
#   2. Update server_name, SSL certificate paths, and upstream address
#   3. Set KC_PROXY_HEADERS=xforwarded on Keycloak
#   4. Test: nginx -t && systemctl reload nginx
#
# Prerequisites:
#   - Nginx 1.20+ with SSL module
#   - Valid SSL certificate (use Let's Encrypt for production)
#   - Keycloak running on the backend (default: port 8080)

# --- Upstream Backend ---
upstream keycloak_backend {
    # Single instance
    server 127.0.0.1:8080;

    # For clustered deployments, add multiple backends:
    # server kc-node1:8080;
    # server kc-node2:8080;
    # server kc-node3:8080;

    # Sticky sessions for clustered Keycloak (cookie-based)
    # Requires nginx-sticky-module or ip_hash:
    # ip_hash;

    keepalive 32;
}

# --- HTTP → HTTPS Redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name auth.example.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.example.com;

    # --- SSL Configuration ---
    ssl_certificate     /etc/ssl/certs/auth.example.com.crt;
    ssl_certificate_key /etc/ssl/private/auth.example.com.key;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Security Headers ---
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Logging ---
    access_log /var/log/nginx/keycloak-access.log;
    error_log  /var/log/nginx/keycloak-error.log warn;

    # --- Buffer Settings (important for Keycloak) ---
    # Keycloak sends large headers (tokens, cookies). Increase buffers.
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
    large_client_header_buffers 4 32k;

    # --- Timeouts ---
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
    send_timeout          60s;

    # Maximum upload size (for theme uploads, imports)
    client_max_body_size 10m;

    # --- Main Proxy Location ---
    location / {
        proxy_pass http://keycloak_backend;

        # Required proxy headers for Keycloak
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_set_header X-Forwarded-Port   $server_port;

        # WebSocket support (for admin console live updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Do NOT add CORS headers here — Keycloak handles CORS itself
    }

    # --- Health Check Endpoint (optional: restrict access) ---
    location /health {
        proxy_pass http://keycloak_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Restrict to internal networks
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny all;
    }

    # --- Metrics Endpoint (restrict access) ---
    location /metrics {
        proxy_pass http://keycloak_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Restrict to monitoring systems only
        # allow 10.0.0.0/8;
        # deny all;
    }

    # --- Block common attack paths ---
    location ~ /\.(?!well-known) {
        deny all;
    }
}

# --- WebSocket Upgrade Map ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
