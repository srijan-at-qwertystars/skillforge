# nginx-websocket.conf — Nginx configuration for WebSocket proxying
#
# Copy-paste-ready. Handles:
#   - WebSocket upgrade (Upgrade + Connection headers)
#   - Proper timeouts for persistent connections
#   - Sticky sessions (IP hash) for Socket.IO / stateful servers
#   - SSL/TLS termination with HTTP/2 for REST, HTTP/1.1 for WebSocket
#   - Health check pass-through
#   - Rate limiting for new WebSocket connections
#   - Logging
#
# Usage:
#   1. Copy to /etc/nginx/conf.d/websocket.conf (or include in nginx.conf)
#   2. Update server_name, upstream servers, SSL cert paths
#   3. nginx -t && nginx -s reload

# ── Connection upgrade map ──────────────────────────────
# Maps the Upgrade header to the Connection header value.
# If client sends "Upgrade: websocket", we set "Connection: upgrade".
# Otherwise, we close the connection after the response.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Rate limiting zone ─────────────────────────────────
# Limit new WebSocket connections to 10 per second per IP.
# Burst allows short spikes (e.g., page reload with multiple WS connections).

limit_req_zone $binary_remote_addr zone=ws_connect:10m rate=10r/s;

# ── Upstream: WebSocket backend servers ─────────────────
# ip_hash ensures the same client IP always reaches the same backend.
# Required for Socket.IO (HTTP polling handshake must hit same server as WS upgrade).
# Remove ip_hash if using a message bus (Redis/NATS) and stateless WS servers.

upstream ws_backend {
    ip_hash;

    server app1:3000 max_fails=3 fail_timeout=30s;
    server app2:3000 max_fails=3 fail_timeout=30s;
    server app3:3000 max_fails=3 fail_timeout=30s;

    # Keepalive connections to backend (reduces TCP handshake overhead)
    keepalive 64;
}

# ── HTTPS Server ────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ws.example.com;

    # ── SSL Configuration ───────────────────────────────
    ssl_certificate     /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── WebSocket endpoint ──────────────────────────────
    # Primary WebSocket path. Handles both ws:// upgrade and
    # Socket.IO's initial HTTP polling handshake.

    location /ws {
        # Rate limit new connections only (not ongoing traffic)
        limit_req zone=ws_connect burst=20 nodelay;

        proxy_pass http://ws_backend;

        # CRITICAL: HTTP/1.1 required for WebSocket upgrade
        # HTTP/2 does not support the Upgrade mechanism
        proxy_http_version 1.1;

        # CRITICAL: Forward upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Forward client info to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # CRITICAL: Timeout settings for persistent connections
        # These must be LONGER than your heartbeat interval.
        # If heartbeat is every 30s, set these to at least 60s.
        # 86400s (24 hours) is a safe default for always-on connections.
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;

        # Disable buffering — WebSocket frames should pass through immediately
        proxy_buffering off;
        proxy_cache off;

        # Don't limit the size of the request body (for file uploads over WS)
        client_max_body_size 0;
    }

    # ── Socket.IO specific endpoint ─────────────────────
    # If using Socket.IO, it negotiates via /socket.io/ path.
    # Same config as /ws but with Socket.IO's default path.

    location /socket.io/ {
        limit_req zone=ws_connect burst=20 nodelay;

        proxy_pass http://ws_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;

        proxy_buffering off;
        proxy_cache off;
    }

    # ── Health check endpoint ───────────────────────────
    # Pass through to backend health endpoint.
    # Load balancers / Kubernetes probes hit this.

    location /health {
        proxy_pass http://ws_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;

        # Don't apply rate limiting to health checks
        limit_req off;
    }

    # ── Static assets / REST API ────────────────────────
    # Everything else uses standard HTTP/2 proxying.

    location / {
        proxy_pass http://ws_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard HTTP timeouts (not 24h like WebSocket)
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Logging ─────────────────────────────────────────
    access_log /var/log/nginx/ws_access.log;
    error_log  /var/log/nginx/ws_error.log warn;
}

# ── HTTP → HTTPS Redirect ──────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name ws.example.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}
