# Traefik reverse proxy stack for Docker Swarm
# Features: automatic SSL via Let's Encrypt, service discovery, dashboard
#
# Deploy:
#   docker network create --driver overlay --attachable traefik-public
#   echo "dashboard-password-hash" | docker secret create traefik_dashboard_auth -
#   docker stack deploy -c traefik-stack.yml traefik
#
# Label your services to expose them via Traefik:
#   deploy:
#     labels:
#       - "traefik.enable=true"
#       - "traefik.http.routers.myapp.rule=Host(`myapp.example.com`)"
#       - "traefik.http.routers.myapp.entrypoints=websecure"
#       - "traefik.http.routers.myapp.tls.certresolver=letsencrypt"
#       - "traefik.http.services.myapp.loadbalancer.server.port=8080"

version: "3.8"

services:
  traefik:
    image: traefik:v3.1
    command:
      # --- API / Dashboard ---
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # --- Docker Swarm provider ---
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.exposedByDefault=false"
      - "--providers.swarm.network=traefik-public"
      - "--providers.swarm.watch=true"

      # --- Entrypoints ---
      - "--entryPoints.web.address=:80"
      - "--entryPoints.web.http.redirections.entryPoint.to=websecure"
      - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
      - "--entryPoints.websecure.address=:443"
      - "--entryPoints.websecure.http.tls=true"
      - "--entryPoints.websecure.http.tls.certResolver=letsencrypt"

      # --- Let's Encrypt ---
      - "--certificatesResolvers.letsencrypt.acme.email=admin@example.com"
      - "--certificatesResolvers.letsencrypt.acme.storage=/acme/acme.json"
      - "--certificatesResolvers.letsencrypt.acme.httpChallenge.entryPoint=web"
      # Uncomment for DNS challenge (requires DNS provider config):
      # - "--certificatesResolvers.letsencrypt.acme.dnsChallenge.provider=cloudflare"

      # --- Logging ---
      - "--log.level=INFO"
      - "--log.format=json"
      - "--accessLog=true"
      - "--accessLog.format=json"
      - "--accessLog.bufferingSize=100"

      # --- Metrics ---
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entryPoint=metrics"
      - "--entryPoints.metrics.address=:8082"

      # --- Ping (health check) ---
      - "--ping=true"
      - "--ping.entryPoint=web"

    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      placement:
        constraints:
          - node.role == manager
        preferences:
          - spread: node.id
      labels:
        # --- Dashboard router ---
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard.rule=Host(`traefik.example.com`)"
        - "traefik.http.routers.dashboard.entrypoints=websecure"
        - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
        - "traefik.http.routers.dashboard.service=api@internal"
        - "traefik.http.routers.dashboard.middlewares=dashboard-auth,security-headers"

        # --- Dashboard authentication ---
        # Generate with: htpasswd -nB admin
        - "traefik.http.middlewares.dashboard-auth.basicauth.usersfile=/run/secrets/traefik_dashboard_auth"

        # --- Security headers middleware ---
        - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
        - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
        - "traefik.http.middlewares.security-headers.headers.stsPreload=true"
        - "traefik.http.middlewares.security-headers.headers.forceSTSHeader=true"
        - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
        - "traefik.http.middlewares.security-headers.headers.browserXssFilter=true"
        - "traefik.http.middlewares.security-headers.headers.frameDeny=true"

        # --- Rate limiting middleware (reusable) ---
        - "traefik.http.middlewares.rate-limit.ratelimit.average=100"
        - "traefik.http.middlewares.rate-limit.ratelimit.burst=50"
        - "traefik.http.middlewares.rate-limit.ratelimit.period=1s"

        # --- Compression middleware (reusable) ---
        - "traefik.http.middlewares.gzip.compress=true"

        # --- Service port ---
        - "traefik.http.services.traefik.loadbalancer.server.port=8080"

    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme_data:/acme

    secrets:
      - traefik_dashboard_auth

    networks:
      - traefik-public

    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "5"

  # --- Whoami (test/debug service) ---
  # Remove in production — useful for verifying Traefik works
  whoami:
    image: traefik/whoami:latest
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.1"
          memory: 32M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.whoami.rule=Host(`whoami.example.com`)"
        - "traefik.http.routers.whoami.entrypoints=websecure"
        - "traefik.http.routers.whoami.tls.certresolver=letsencrypt"
        - "traefik.http.routers.whoami.middlewares=security-headers,gzip"
        - "traefik.http.services.whoami.loadbalancer.server.port=80"
    networks:
      - traefik-public

# --- Networks ---
networks:
  traefik-public:
    external: true

# --- Volumes ---
volumes:
  acme_data:
    driver: local

# --- Secrets ---
secrets:
  traefik_dashboard_auth:
    external: true
