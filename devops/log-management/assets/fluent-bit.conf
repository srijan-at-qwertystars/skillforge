# =============================================================================
# Fluent Bit Configuration — Common Patterns
# =============================================================================
# Production-ready Fluent Bit config with:
#   - Tail input for JSON application logs
#   - Kubernetes metadata enrichment
#   - Multiple output options (Elasticsearch, Loki, stdout)
#   - Parsers for JSON, Docker, syslog, and multiline stack traces
#
# Usage:
#   fluent-bit -c fluent-bit.conf
#
# For Kubernetes DaemonSet, mount this as a ConfigMap.
# =============================================================================

# ---- Service ----
[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  On
    HTTP_Listen  0.0.0.0
    HTTP_Port    2020
    # Filesystem buffering for backpressure protection
    storage.path              /var/log/flb-storage/
    storage.sync              normal
    storage.checksum          off
    storage.max_chunks_up     128
    storage.backlog.mem_limit 10M

# ---- Inputs ----

# Application JSON logs
[INPUT]
    Name              tail
    Tag               app.*
    Path              /var/log/app/*.log
    Parser            json
    DB                /var/log/flb-storage/app.db
    Mem_Buf_Limit     50MB
    storage.type      filesystem
    Skip_Long_Lines   On
    Refresh_Interval  10
    Read_from_Head    False

# Kubernetes container logs
[INPUT]
    Name              tail
    Tag               kube.*
    Path              /var/log/containers/*.log
    Parser            cri
    DB                /var/log/flb-storage/kube.db
    Mem_Buf_Limit     50MB
    storage.type      filesystem
    Skip_Long_Lines   On
    Refresh_Interval  10
    multiline.parser  docker, cri

# Syslog input (UDP)
[INPUT]
    Name              syslog
    Tag               syslog.*
    Listen            0.0.0.0
    Port              5140
    Mode              udp
    Parser            syslog-rfc3164

# Prometheus metrics for self-monitoring
[INPUT]
    Name              fluentbit_metrics
    Tag               internal_metrics

# ---- Filters ----

# Kubernetes metadata enrichment
[FILTER]
    Name             kubernetes
    Match            kube.*
    Merge_Log        On
    Merge_Log_Key    log_processed
    K8S-Logging.Parser On
    K8S-Logging.Exclude On
    Labels           On
    Annotations      Off
    Buffer_Size      0

# Add hostname to all records
[FILTER]
    Name   record_modifier
    Match  *
    Record hostname ${HOSTNAME}
    Record environment ${ENVIRONMENT:production}

# Remove high-cardinality Kubernetes labels
[FILTER]
    Name          modify
    Match         kube.*
    Remove        kubernetes.pod_id
    Remove        kubernetes.docker_id
    Remove        kubernetes.container_hash

# ---- Outputs ----

# Elasticsearch output
[OUTPUT]
    Name              es
    Match             app.* kube.*
    Host              ${ES_HOST:elasticsearch}
    Port              ${ES_PORT:9200}
    Index             logs
    Type              _doc
    Logstash_Format   On
    Logstash_Prefix   logs
    Logstash_DateFormat %Y.%m.%d
    Retry_Limit       5
    Workers           2
    Buffer_Size       5MB
    # TLS (uncomment for production)
    # tls              On
    # tls.verify       On
    # tls.ca_file      /etc/ssl/certs/ca.pem
    # HTTP_User        elastic
    # HTTP_Passwd      ${ES_PASSWORD}

# Loki output (alternative to Elasticsearch)
# [OUTPUT]
#     Name              loki
#     Match             app.* kube.*
#     Host              ${LOKI_HOST:loki}
#     Port              3100
#     Labels            job=fluentbit, environment=$environment
#     Label_Keys        $level, $service, $namespace
#     Remove_Keys       logtag, kubernetes
#     Line_Format       json
#     Retry_Limit       5
#     Workers           2

# Stdout for debugging (disable in production)
# [OUTPUT]
#     Name              stdout
#     Match             *
#     Format            json_lines

# Forward internal metrics to Prometheus
[OUTPUT]
    Name              prometheus_exporter
    Match             internal_metrics
    Host              0.0.0.0
    Port              2021


# =============================================================================
# Parsers — save as parsers.conf or inline with Parsers_File
# =============================================================================
# Note: If using separate file, save the section below as parsers.conf

# --- parsers.conf content ---
# [PARSER]
#     Name         json
#     Format       json
#     Time_Key     timestamp
#     Time_Format  %Y-%m-%dT%H:%M:%S.%LZ
#     Time_Keep    On
#
# [PARSER]
#     Name         docker
#     Format       json
#     Time_Key     time
#     Time_Format  %Y-%m-%dT%H:%M:%S.%LZ
#
# [PARSER]
#     Name         cri
#     Format       regex
#     Regex        ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
#     Time_Key     time
#     Time_Format  %Y-%m-%dT%H:%M:%S.%L%z
#
# [PARSER]
#     Name         syslog-rfc3164
#     Format       regex
#     Regex        ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
#     Time_Key     time
#     Time_Format  %b %d %H:%M:%S
#
# [MULTILINE_PARSER]
#     name          java_stacktrace
#     type          regex
#     rule          "start_state"  "/^\d{4}-\d{2}-\d{2}/"  "cont"
#     rule          "cont"         "/^(\s+at |\s+\.\.\.|\s*Caused by:|\s)/"  "cont"
#
# [MULTILINE_PARSER]
#     name          python_traceback
#     type          regex
#     rule          "start_state"  "/^Traceback|^\d{4}-\d{2}-\d{2}/"  "cont"
#     rule          "cont"         "/^\s+/"  "cont"
