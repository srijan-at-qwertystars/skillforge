# =============================================================================
# Production-Ready ELK Stack — Docker Compose
# =============================================================================
# Elasticsearch + Logstash + Kibana with:
#   - Proper resource limits and health checks
#   - Persistent storage volumes
#   - Security disabled for local dev (enable for production)
#   - Logstash pipeline with Beats + syslog + TCP JSON inputs
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#
# Endpoints:
#   Kibana:          http://localhost:5601
#   Elasticsearch:   http://localhost:9200
#   Logstash Beats:  localhost:5044
#   Logstash Syslog: localhost:5514
#   Logstash TCP:    localhost:5000
# =============================================================================

version: "3.8"

services:
  # ---------- Elasticsearch ----------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION:-8.14.0}
    container_name: elasticsearch
    environment:
      - node.name=es-node-1
      - cluster.name=elk-logs
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.monitoring.collection.enabled=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=true
      - action.destructive_requires_name=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 1g
          cpus: "0.5"
    restart: unless-stopped
    networks:
      - elk

  # ---------- Logstash ----------
  logstash:
    image: docker.elastic.co/logstash/logstash:${ES_VERSION:-8.14.0}
    container_name: logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - logstash-data:/usr/share/logstash/data
    ports:
      - "5044:5044"    # Beats
      - "5514:5514"    # Syslog
      - "5000:5000"    # TCP JSON
      - "9600:9600"    # Monitoring API
    environment:
      - "LS_JAVA_OPTS=-Xms512m -Xmx512m"
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.monitoring.enabled=true
      - xpack.monitoring.elasticsearch.hosts=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9600/_node/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
    restart: unless-stopped
    networks:
      - elk

  # ---------- Kibana ----------
  kibana:
    image: docker.elastic.co/kibana/kibana:${ES_VERSION:-8.14.0}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - xpack.monitoring.ui.container.elasticsearch.enabled=true
      - server.name=kibana
      - server.host=0.0.0.0
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
        reservations:
          memory: 512m
    restart: unless-stopped
    networks:
      - elk

volumes:
  elasticsearch-data:
    driver: local
  logstash-data:
    driver: local

networks:
  elk:
    driver: bridge
