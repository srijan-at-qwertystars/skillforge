# Traefik v3 — Production Static Configuration
# Place at /etc/traefik/traefik.yml or mount as volume.

# ─── Global ──────────────────────────────────────────────────────────
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# ─── Entrypoints ─────────────────────────────────────────────────────
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
    # Trusted proxies (Cloudflare, AWS ALB, etc.)
    # forwardedHeaders:
    #   trustedIPs:
    #     - "173.245.48.0/20"
    #     - "103.21.244.0/22"

  websecure:
    address: ":443"
    http3: {}
    http:
      middlewares:
        - security-headers@file
      tls:
        certResolver: letsencrypt
        domains:
          - main: "example.com"
            sans:
              - "*.example.com"
    transport:
      respondingTimeouts:
        readTimeout: 30s
        writeTimeout: 30s
        idleTimeout: 180s

  metrics:
    address: ":8082"

# ─── Providers ───────────────────────────────────────────────────────
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: proxy
    watch: true
  file:
    directory: /etc/traefik/dynamic
    watch: true
  # Uncomment for Kubernetes:
  # kubernetesCRD:
  #   allowCrossNamespace: true
  #   allowExternalNameServices: true
  # kubernetesIngress:
  #   publishedService:
  #     enabled: true

  providersThrottleDuration: 2s

# ─── Certificate Resolvers ───────────────────────────────────────────
certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@example.com
      storage: /letsencrypt/acme.json
      # Use staging for testing to avoid rate limits:
      # caServer: "https://acme-staging-v02.api.letsencrypt.org/directory"
      httpChallenge:
        entryPoint: web

  # DNS challenge for wildcards / firewalled environments:
  # letsencrypt-dns:
  #   acme:
  #     email: admin@example.com
  #     storage: /letsencrypt/acme-dns.json
  #     dnsChallenge:
  #       provider: cloudflare
  #       delayBeforeCheck: 10s
  #       resolvers:
  #         - "1.1.1.1:53"
  #         - "8.8.8.8:53"

# ─── API / Dashboard ─────────────────────────────────────────────────
api:
  dashboard: true
  insecure: false    # Always false in production

# ─── Logging ─────────────────────────────────────────────────────────
log:
  level: INFO        # TRACE, DEBUG, INFO, WARN, ERROR
  format: json

accessLog:
  format: json
  filters:
    statusCodes:
      - "400-499"
      - "500-599"
    minDuration: 100ms
  fields:
    defaultMode: keep
    names:
      StartUTC: drop
    headers:
      defaultMode: drop
      names:
        User-Agent: keep
        Content-Type: keep
        X-Forwarded-For: keep
        Authorization: redact
  bufferingSize: 100

# ─── Metrics ─────────────────────────────────────────────────────────
metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0

