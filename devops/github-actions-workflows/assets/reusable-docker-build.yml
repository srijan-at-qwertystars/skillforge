# Reusable Docker Build Workflow
# Called from other workflows via `uses: ./.github/workflows/reusable-docker-build.yml`.
# Provides a standardised, secure, multi-platform Docker build pipeline with:
#   • Multi-arch images (AMD64 + ARM64)
#   • Registry-based layer caching for fast rebuilds
#   • SBOM generation for supply-chain transparency
#   • Cosign image signing for tamper-proof verification

name: Reusable – Docker Build

on:
  workflow_call:
    inputs:
      image-name:
        description: "Full image name including registry (e.g. ghcr.io/org/app)"
        required: true
        type: string
      tags:
        description: |
          Newline-separated list of Docker tags to apply.
          Defaults to the Git SHA and 'latest' if left empty.
        required: false
        type: string
        default: ""
      push:
        description: "Push the image to the registry"
        required: false
        type: boolean
        default: true
      dockerfile:
        description: "Path to the Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      platforms:
        description: "Comma-separated target platforms"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
    outputs:
      image-digest:
        description: "The digest of the built image"
        value: ${{ jobs.build.outputs.digest }}
      image-metadata:
        description: "JSON metadata of the built image"
        value: ${{ jobs.build.outputs.metadata }}

permissions:
  contents: read
  packages: write   # push to GHCR
  id-token: write   # keyless cosign signing via Sigstore

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-push.outputs.digest }}
      metadata: ${{ steps.build-push.outputs.metadata }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # QEMU enables cross-architecture builds (ARM64 on AMD64 runners).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx provides advanced Docker build features: multi-platform,
      # cache export/import, and attestation generation.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate to GitHub Container Registry. For other registries,
      # replace with the appropriate login action.
      - name: Log in to container registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # docker/metadata-action generates OCI-compliant labels and tags from
      # Git metadata — no manual tag juggling required.
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            # Use caller-supplied tags if provided, otherwise default set.
            ${{ inputs.tags || format('type=sha,prefix=\ntype=raw,value=latest,enable={{is_default_branch}}') }}

      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry cache stores/retrieves layer cache from the registry itself,
          # which works across runners and doesn't consume Actions cache quota.
          cache-from: type=registry,ref=${{ inputs.image-name }}:buildcache
          cache-to: ${{ inputs.push && format('type=registry,ref={0}:buildcache,mode=max', inputs.image-name) || '' }}
          # SBOM and provenance attestations are attached to the image manifest,
          # enabling `docker sbom` and `cosign verify-attestation` downstream.
          sbom: true
          provenance: mode=max

      # Cosign signs the image keylessly via Sigstore's Fulcio CA and Rekor
      # transparency log. Consumers verify with:
      #   cosign verify --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
      #     --certificate-identity-regexp="github.com/<org>/<repo>" <image>@<digest>
      - name: Sign image with cosign
        if: inputs.push
        uses: sigstore/cosign-installer@v3

      - name: Sign the published image
        if: inputs.push
        run: |
          cosign sign --yes \
            "${{ inputs.image-name }}@${{ steps.build-push.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: "true"
