# GitHub Actions CI with Nix
#
# Features:
# - Deterministic Nix setup with Cachix caching
# - Flake checks, builds, and formatting verification
# - Matrix builds for multiple systems (optional)
# - Cachix push for build artifacts
#
# Required secrets:
# - CACHIX_AUTH_TOKEN (optional, for pushing to Cachix)
#
# Setup:
# 1. Copy to .github/workflows/ci.yml
# 2. Replace 'mycache' with your Cachix cache name (or remove Cachix steps)
# 3. Add CACHIX_AUTH_TOKEN secret in repo settings (optional)

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            accept-flake-config = true

      # Optional: Enable Cachix for faster builds
      # - name: Setup Cachix
      #   uses: cachix/cachix-action@v15
      #   with:
      #     name: mycache
      #     authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Flake check
        run: nix flake check --print-build-logs

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      # Optional: Enable Cachix
      # - name: Setup Cachix
      #   uses: cachix/cachix-action@v15
      #   with:
      #     name: mycache
      #     authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build default package
        run: nix build --print-build-logs

      - name: Show build output info
        run: |
          echo "Build output:"
          nix path-info -Sh ./result
          echo ""
          echo "Closure size:"
          nix path-info -rSh ./result | tail -1

      # Optional: Push to Cachix
      # - name: Push to Cachix
      #   if: github.event_name == 'push'
      #   run: |
      #     nix path-info --all | cachix push mycache

  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Nix formatting
        run: nix fmt -- --check .

  # Optional: Multi-platform build matrix
  # build-matrix:
  #   name: Build (${{ matrix.os }})
  #   runs-on: ${{ matrix.os }}
  #   strategy:
  #     fail-fast: false
  #     matrix:
  #       os: [ubuntu-latest, macos-latest]
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: cachix/install-nix-action@v27
  #       with:
  #         github_access_token: ${{ secrets.GITHUB_TOKEN }}
  #     - run: nix build --print-build-logs
  #     - run: nix flake check --print-build-logs

