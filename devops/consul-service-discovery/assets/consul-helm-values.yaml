# Production Consul Helm Chart Values
# Customize for your environment before deploying.
# Reference: https://developer.hashicorp.com/consul/docs/k8s/helm
#
# Install:
#   helm repo add hashicorp https://helm.releases.hashicorp.com
#   helm install consul hashicorp/consul -n consul --create-namespace -f consul-helm-values.yaml

global:
  name: consul
  datacenter: dc1
  domain: consul

  # Container images
  image: "hashicorp/consul:1.17.0"
  imageK8S: "hashicorp/consul-k8s-control-plane:1.3.0"
  imageConsulDataplane: "hashicorp/consul-dataplane:1.3.0"

  # --- TLS Encryption ---
  tls:
    enabled: true
    enableAutoEncrypt: true
    verify: true
    # Additional SANs for the server certificate
    serverAdditionalDNSSANs:
      - "consul-server.consul.svc"
    serverAdditionalIPSANs: []
    # To use an external CA, provide the cert/key secrets:
    # caCert:
    #   secretName: consul-ca-cert
    #   secretKey: tls.crt
    # caKey:
    #   secretName: consul-ca-key
    #   secretKey: tls.key

  # --- Gossip Encryption ---
  gossipEncryption:
    autoGenerate: true
    # Or use a pre-existing secret:
    # secretName: consul-gossip-key
    # secretKey: key

  # --- ACL System ---
  acls:
    manageSystemACLs: true
    # bootstrapToken:
    #   secretName: consul-bootstrap-token
    #   secretKey: token

  # --- Enterprise Features ---
  # enterpriseLicense:
  #   secretName: consul-license
  #   secretKey: key
  # adminPartitions:
  #   enabled: true
  #   name: default

  # --- Metrics ---
  metrics:
    enabled: true
    enableAgentMetrics: true
    agentMetricsRetentionTime: "1m"
    enableGatewayMetrics: true

  # --- Vault Integration ---
  # secretsBackend:
  #   vault:
  #     enabled: true
  #     consulServerRole: consul-server
  #     consulClientRole: consul-client
  #     consulCARole: consul-ca
  #     connectCA:
  #       address: https://vault.vault.svc:8200
  #       rootPKIPath: connect-root/
  #       intermediatePKIPath: connect-intermediate/

# --- Consul Servers ---
server:
  enabled: true
  replicas: 3            # 3 for most production; 5 for large-scale
  bootstrapExpect: 3

  storage: 10Gi
  storageClass: null     # Use cluster default; set to "gp3" / "pd-ssd" etc.

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

  # Spread servers across nodes/zones
  affinity: |
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: {{ template "consul.name" . }}
              component: server
          topologyKey: kubernetes.io/hostname

  # For zone-aware anti-affinity:
  # topologySpreadConstraints:
  #   - maxSkew: 1
  #     topologyKey: topology.kubernetes.io/zone
  #     whenUnsatisfiable: DoNotSchedule
  #     labelSelector:
  #       matchLabels:
  #         app: consul
  #         component: server

  # Disruption budget
  disruptionBudget:
    enabled: true
    maxUnavailable: 1

  # Extra Consul server config (HCL or JSON)
  extraConfig: |
    {
      "performance": {
        "raft_multiplier": 1
      },
      "limits": {
        "http_max_conns_per_client": 200,
        "rpc_max_conns_per_client": 100
      },
      "telemetry": {
        "prometheus_retention_time": "60s",
        "disable_hostname": true
      }
    }

  # Server snapshot agent (Enterprise)
  # snapshotAgent:
  #   enabled: true
  #   interval: "1h"
  #   configSecret:
  #     secretName: consul-snapshot-config
  #     secretKey: config.json

# --- Client Agents ---
# With Consul Dataplane (Helm v1.0+), clients are optional.
# Set to false when using Dataplane mode.
client:
  enabled: false

# --- Connect Inject (Sidecar Injection) ---
connectInject:
  enabled: true
  default: false          # Require explicit annotation to inject

  # Transparent proxy
  transparentProxy:
    defaultEnabled: true
    defaultOverwriteProbes: true

  # Sidecar resource defaults
  sidecarProxy:
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "250m"

  # Init container resources
  initContainer:
    resources:
      requests:
        memory: "25Mi"
        cpu: "50m"
      limits:
        memory: "150Mi"
        cpu: "250m"

  # Metrics merging
  metrics:
    defaultEnabled: true
    defaultEnableMerging: true

  # Consul DNS in injected pods
  consulDNS:
    enabled: true

# --- Service Sync (K8s ↔ Consul) ---
syncCatalog:
  enabled: false           # Enable if needed
  # toConsul: true
  # toK8S: false
  # k8sPrefix: "k8s-"
  # k8sDenyNamespaces: ["kube-system", "kube-public"]
  # syncClusterIPServices: true

# --- Consul DNS ---
dns:
  enabled: true
  enableRedirection: true  # Auto-configure CoreDNS/kube-dns

# --- Consul UI ---
ui:
  enabled: true
  service:
    type: ClusterIP        # Use LoadBalancer for external access
    # annotations:
    #   service.beta.kubernetes.io/aws-load-balancer-internal: "true"
  # Metrics dashboard in UI
  metrics:
    enabled: true
    provider: "prometheus"
    baseURL: "http://prometheus-server.monitoring.svc"

# --- Mesh Gateway ---
meshGateway:
  enabled: false           # Enable for multi-DC / peering
  # replicas: 2
  # service:
  #   type: LoadBalancer
  #   annotations:
  #     service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
  # wanAddress:
  #   source: Service
  #   port: 443
  # resources:
  #   requests:
  #     memory: "128Mi"
  #     cpu: "250m"
  #   limits:
  #     memory: "256Mi"
  #     cpu: "500m"

# --- Ingress Gateway ---
ingressGateways:
  enabled: false
  # defaults:
  #   replicas: 2
  # gateways:
  #   - name: ingress-gateway
  #     service:
  #       type: LoadBalancer
  #       ports:
  #         - port: 8080

# --- Terminating Gateway ---
terminatingGateways:
  enabled: false
  # gateways:
  #   - name: terminating-gateway
  #     replicas: 2

# --- API Gateway ---
apiGateway:
  enabled: false
  # image: "hashicorp/consul-api-gateway-controller:0.5.0"
  # managedGatewayClass:
  #   serviceType: LoadBalancer

# --- Webhook Cert Manager ---
webhookCertManager:
  enabled: true

# --- Controller (manages CRDs) ---
controller:
  enabled: true
  resources:
    requests:
      memory: "50Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
