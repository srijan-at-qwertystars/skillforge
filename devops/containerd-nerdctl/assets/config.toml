# containerd production configuration
# Location: /etc/containerd/config.toml
# After changes: sudo systemctl restart containerd

version = 3
root = "/var/lib/containerd"
state = "/run/containerd"

# gRPC and debug settings
[grpc]
  address = "/run/containerd/containerd.sock"
  uid = 0
  gid = 0
  max_recv_message_size = 16777216
  max_send_message_size = 16777216

[debug]
  address = "/run/containerd/debug.sock"
  uid = 0
  gid = 0
  level = "info"

[metrics]
  address = "127.0.0.1:10257"
  grpc_histogram = false

# Timeouts
[timeouts]
  "io.containerd.timeout.bolt.open" = "0s"
  "io.containerd.timeout.metrics.shimstats" = "2s"
  "io.containerd.timeout.shim.cleanup" = "5s"
  "io.containerd.timeout.shim.load" = "5s"
  "io.containerd.timeout.shim.shutdown" = "3s"
  "io.containerd.timeout.task.state" = "2s"

# CRI plugin (for Kubernetes integration)
[plugins."io.containerd.grpc.v1.cri"]
  sandbox_image = "registry.k8s.io/pause:3.10"
  max_concurrent_downloads = 10
  max_container_log_line_size = 16384
  disable_tcp_service = true
  enable_selinux = false
  enable_unprivileged_icmp = false
  enable_unprivileged_ports = false
  snapshotter = "overlayfs"

# Default runtime (runc with systemd cgroup)
[plugins."io.containerd.grpc.v1.cri".containerd]
  default_runtime_name = "runc"

[plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
  runtime_type = "io.containerd.runc.v2"
  sandboxer = "podsandbox"

[plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
  SystemdCgroup = true
  BinaryName = ""

# Kata Containers runtime (uncomment to enable)
# [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata]
#   runtime_type = "io.containerd.kata.v2"
#   privileged_without_host_devices = true
# [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.kata.options]
#   ConfigPath = "/opt/kata/share/defaults/kata-containers/configuration.toml"

# gVisor runtime (uncomment to enable)
# [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runsc]
#   runtime_type = "io.containerd.runsc.v1"

# Registry configuration — use hosts.toml directory method
[plugins."io.containerd.grpc.v1.cri".registry]
  config_path = "/etc/containerd/certs.d"

# CNI networking
[plugins."io.containerd.grpc.v1.cri".cni]
  bin_dir = "/opt/cni/bin"
  conf_dir = "/etc/cni/net.d"
  max_conf_num = 1

# Snapshotter settings (overlayfs is default)
[plugins."io.containerd.snapshotter.v1.overlayfs"]
  # root_path is inherited from global root
  # upperdir_label = false

# Remote snapshotters (uncomment to enable lazy pulling)
# [proxy_plugins.stargz]
#   type = "snapshot"
#   address = "/run/containerd-stargz-grpc/containerd-stargz-grpc.sock"

# [proxy_plugins.nydus]
#   type = "snapshot"
#   address = "/run/nydus-snapshotter/nydus-snapshotter.sock"

# Image encryption support (uncomment to enable)
# [stream_processors."io.containerd.ocicrypt.decoder.v1.tar"]
#   accepts = ["application/vnd.oci.image.layer.v1.tar+encrypted"]
#   returns = "application/vnd.oci.image.layer.v1.tar"
#   path = "/usr/local/bin/ctd-decoder"

# [stream_processors."io.containerd.ocicrypt.decoder.v1.tar.gzip"]
#   accepts = ["application/vnd.oci.image.layer.v1.tar+gzip+encrypted"]
#   returns = "application/vnd.oci.image.layer.v1.tar+gzip"
#   path = "/usr/local/bin/ctd-decoder"

# NRI (Node Resource Interface) — uncomment to enable
# [plugins."io.containerd.nri.v1.nri"]
#   disable = false
#   disable_connections = false
#   plugin_config_path = "/etc/nri/conf.d"
#   plugin_path = "/opt/nri/plugins"
#   plugin_registration_timeout = "5s"
#   plugin_request_timeout = "2s"
#   socket_path = "/var/run/nri/nri.sock"

# GC scheduler tuning
[plugins."io.containerd.gc.v1.scheduler"]
  pause_threshold = 0.02
  deletion_threshold = 0
  mutation_threshold = 100
  schedule_delay = "0s"
  startup_delay = "100ms"
