# nerdctl compose example — demonstrates containerd-specific features
# Usage: nerdctl compose -f nerdctl-compose.yml up -d
#
# Compatible with docker compose but showcases nerdctl extras:
#   - works without Docker daemon
#   - uses CNI networking
#   - supports BuildKit natively
#   - works with containerd namespaces

services:
  # Web frontend with build from Dockerfile
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: myapp-web:latest
    container_name: myapp-web
    ports:
      - "8080:80"
    volumes:
      - ./web/static:/usr/share/nginx/html:ro
      - web-logs:/var/log/nginx
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    networks:
      - frontend
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 64M

  # API backend
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        - GO_VERSION=1.22
    image: myapp-api:latest
    container_name: myapp-api
    ports:
      - "3000:3000"
    volumes:
      - api-data:/app/data
    environment:
      - DATABASE_URL=postgres://postgres:secret@db:5432/myapp?sslmode=disable
      - REDIS_URL=redis://cache:6379
      - LOG_LEVEL=info
    env_file:
      - .env
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: myapp-db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: myapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      PGDATA: /var/lib/postgresql/data/pgdata
    networks:
      - backend
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    shm_size: 256m

  # Redis cache
  cache:
    image: redis:7-alpine
    container_name: myapp-cache
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - backend
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.5"

  # Background worker
  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: myapp-api:latest
    container_name: myapp-worker
    command: ["/app/worker"]
    environment:
      - DATABASE_URL=postgres://postgres:secret@db:5432/myapp?sslmode=disable
      - REDIS_URL=redis://cache:6379
      - WORKER_CONCURRENCY=4
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  pgdata:
    driver: local
  redis-data:
    driver: local
  api-data:
    driver: local
  web-logs:
    driver: local

networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  backend:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.1.0/24
