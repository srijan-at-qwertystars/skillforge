# Full-Stack Docker Compose Template
# App (Node.js) + API (Python) + PostgreSQL + Redis + Nginx reverse proxy
#
# Usage:
#   cp .env.example .env && docker compose up -d
#   docker compose logs -f

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &hc-defaults
  interval: 10s
  timeout: 5s
  retries: 3
  start_period: 15s

x-common: &common
  restart: unless-stopped
  logging: *default-logging

services:
  # ─── Reverse Proxy ───────────────────────────
  nginx:
    <<: *common
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    networks: [public, frontend-net, api-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      <<: *hc-defaults

  # ─── Frontend App ────────────────────────────
  frontend:
    <<: *common
    build:
      context: ./frontend
      target: production
    expose: ["3000"]
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health')"]
      <<: *hc-defaults
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
    networks: [frontend-net]

  # ─── API Server ──────────────────────────────
  api:
    <<: *common
    build:
      context: ./api
      target: production
    expose: ["4000"]
    environment:
      DATABASE_URL: postgresql://${DB_USER:-app}:${DB_PASSWORD}@db:5432/${DB_NAME:-appdb}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_FILE: /run/secrets/app_secret
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      <<: *hc-defaults
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 1G }
        reservations: { cpus: "0.5", memory: 256M }
    secrets: [app_secret]
    networks: [api-net, backend]

  # ─── Database ────────────────────────────────
  db:
    <<: *common
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-appdb}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-appdb}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
    secrets: [db_password]
    networks: [backend]

  # ─── Cache ───────────────────────────────────
  redis:
    <<: *common
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEM:-256mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 300M }
    networks: [backend]

  # ─── Database Migrations (init container) ────
  migrate:
    build:
      context: ./api
      target: production
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: postgresql://${DB_USER:-app}:${DB_PASSWORD}@db:5432/${DB_NAME:-appdb}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks: [backend]

volumes:
  pgdata: {}
  redis-data: {}

networks:
  public: {}
  frontend-net: { internal: true }
  api-net: { internal: true }
  backend: { internal: true }

secrets:
  db_password:
    file: ./secrets/db_password.txt
  app_secret:
    file: ./secrets/app_secret.txt
