# =============================================================================
# GitHub Actions CI/CD Workflow using mise
# =============================================================================
# Uses jdx/mise-action to install and cache tools from .mise.toml
# Docs: https://github.com/jdx/mise-action
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint & Type Check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - run: mise run lint

  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    # strategy:
    #   matrix:
    #     node: ["20", "22"]      # uncomment for multi-version testing
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
          # Uncomment for matrix testing:
          # mise_toml: |
          #   [tools]
          #   node = "${{ matrix.node }}"

      - run: mise run test

  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - run: mise run build

      # Upload build artifacts (uncomment as needed)
      # - uses: actions/upload-artifact@v4
      #   with:
      #     name: build
      #     path: dist/

  # ---------------------------------------------------------------------------
