# Terraform Module CI/CD — GitHub Actions
#
# This workflow runs on PRs (static analysis + plan tests) and on tags (release).
# Customize the env vars and AWS credentials for your environment.
#
# Required secrets:
#   AWS_TEST_ROLE_ARN — IAM role for integration tests (OIDC-based)
#
name: Terraform Module CI

on:
  pull_request:
    branches: [main]
    paths-ignore: ["**.md"]
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

env:
  TF_VERSION: "1.9.0"
  TFLINT_VERSION: "v0.52.0"
  GO_VERSION: "1.22"

jobs:
  # ─── Static Analysis ──────────────────────────────────────────────
  format:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive -diff

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init -backend=false
      - run: terraform validate

  lint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}
      - run: tflint --init
      - run: tflint --recursive --format=compact

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

  # ─── Plan Tests ────────────────────────────────────────────────────
  plan-tests:
    name: Plan Tests
    runs-on: ubuntu-latest
    needs: [format, validate, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init -backend=false
      - run: terraform test -filter=tests/plan_*.tftest.hcl -verbose

  # ─── Integration Tests (main branch only) ──────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [plan-tests, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: test
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: integration-tests
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TEST_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform Tests (apply)
        run: terraform test -verbose
        timeout-minutes: 30

  # ─── Terratest (optional, Go-based) ───────────────────────────────
  terratest:
    name: Terratest
    runs-on: ubuntu-latest
    needs: [plan-tests, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: test
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: terratest
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TEST_ROLE_ARN }}
          aws-region: us-east-1

      - name: Run Terratest
        working-directory: tests
        run: |
          go mod download
          go test -v -timeout 30m -parallel 4
        timeout-minutes: 35

  # ─── Release ──────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [format, validate, lint, security, plan-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since ${PREV_TAG}" > changelog.md
            git log --oneline "${PREV_TAG}..HEAD" >> changelog.md
          else
            echo "## Initial Release" > changelog.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: changelog.md
          generate_release_notes: true
