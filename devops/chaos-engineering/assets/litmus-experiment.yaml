---
# ChaosEngine: AWS EC2 Terminate (cloud chaos)
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: ec2-terminate-engine
  namespace: litmus
spec:
  engineState: active
  chaosServiceAccount: litmus-admin
  experiments:
    - name: ec2-terminate-by-tag
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            - name: CHAOS_INTERVAL
              value: "30"
            - name: INSTANCE_TAG
              value: "chaos-enabled:true"
            - name: REGION
              value: us-east-1
            - name: MANAGED_NODEGROUP
              value: "enable"
          secrets:
            - name: cloud-secret
              mountPath: /tmp/
