---
# ChaosEngine: Pod CPU Hog
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: pod-cpu-hog-engine
  namespace: staging
spec:
  appinfo:
    appns: staging
    applabel: app=compute-svc
    appkind: deployment
  engineState: active
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-cpu-hog
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"
            - name: CPU_CORES
              value: "2"
            - name: CPU_LOAD
              value: "80"
            - name: PODS_AFFECTED_PERC
              value: "100"
        probe:
          - name: check-cpu-threshold
            type: promProbe
            promProbe/inputs:
              endpoint: http://prometheus.monitoring.svc:9090
              query: avg(rate(container_cpu_usage_seconds_total{pod=~"compute-svc.*",namespace="staging"}[1m]))
              comparator:
                type: float
                criteria: "<="
                value: "0.9"
            mode: Edge
            runProperties:
              probeTimeout: 5s
              interval: 15s

