# Production Ansible Configuration
# Copy to your project root as ansible.cfg

[defaults]
# Inventory
inventory = inventories/production/hosts.yml

# Paths
roles_path = roles:~/.ansible/roles:/usr/share/ansible/roles
collections_path = collections:~/.ansible/collections
library = library
filter_plugins = filter_plugins
callback_plugins = callback_plugins

# Connection
remote_user = deploy
ask_pass = false
remote_tmp = /tmp/.ansible-${USER}/tmp

# Performance
forks = 30
internal_poll_interval = 0.001

# Fact caching
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 7200

# Output
stdout_callback = yaml
callbacks_enabled = timer, profile_tasks
display_skipped_hosts = false
display_ok_hosts = true

# Safety
retry_files_enabled = false
host_key_checking = true
any_errors_fatal = false

# Python
interpreter_python = auto_silent

# Logging (uncomment for persistent logging)
# log_path = /var/log/ansible/ansible.log

# Vault
# vault_password_file = ~/.vault_pass
# vault_identity_list = prod@~/.vault/prod_pass, dev@~/.vault/dev_pass

[privilege_escalation]
become = false
become_method = sudo
become_user = root
become_ask_pass = false

[ssh_connection]
# Pipelining — major performance gain (requires !requiretty on targets)
pipelining = true

# SSH multiplexing
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o PreferredAuthentications=publickey
control_path_dir = /tmp/ansible-cp
control_path = %(directory)s/%%h-%%r

# Transfer method
transfer_method = smart
retries = 3

[diff]
always = true
context = 3

[galaxy]
server_list = automation_hub, galaxy

[galaxy_server.automation_hub]
url = https://console.redhat.com/api/automation-hub/content/published/
auth_url = https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token
# token = <your-token>

[galaxy_server.galaxy]
url = https://galaxy.ansible.com/
