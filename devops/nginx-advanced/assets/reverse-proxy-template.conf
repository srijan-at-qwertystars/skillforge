# Nginx Reverse Proxy — Production Template
# Covers: SSL termination, security headers, proxy buffering, logging, rate limiting
#
# Usage: Copy and adjust domains, upstream addresses, certificate paths, and rate limits.
# Test with: nginx -t && nginx -s reload

# ── Rate Limiting Zones (http block) ──
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_strict:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=connperip:10m;
limit_req_status 429;
limit_conn_status 429;

# ── Upstream Definition ──
upstream app_backend {
    server 10.0.0.1:8080 max_fails=3 fail_timeout=30s;
    server 10.0.0.2:8080 max_fails=3 fail_timeout=30s;
    server 10.0.0.3:8080 backup;

    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ── Logging ──
log_format proxy_log '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'rt=$request_time uct=$upstream_connect_time '
                     'uht=$upstream_header_time urt=$upstream_response_time '
                     'us=$upstream_status cs=$upstream_cache_status '
                     'rid=$request_id';

# ── HTTP → HTTPS Redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # ACME challenge support
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Server ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name example.com www.example.com;

    # ── SSL Configuration (Mozilla Intermediate) ──
    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;
    include /etc/nginx/ssl-params.conf;  # or inline SSL parameters

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; frame-ancestors 'none';" always;

    # ── General Settings ──
    server_tokens off;
    client_max_body_size 50m;
    client_body_buffer_size 16k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # ── Logging ──
    access_log /var/log/nginx/example.com-access.log proxy_log buffer=32k flush=5s;
    error_log  /var/log/nginx/example.com-error.log warn;

    # ── Connection Limits ──
    limit_conn connperip 30;

    # ── Block Hidden Files ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Health Check ──
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Static Assets (direct serve with caching) ──
    location /static/ {
        alias /var/www/example.com/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        tcp_nodelay off;
        open_file_cache max=3000 inactive=120s;
        open_file_cache_valid 45s;
        open_file_cache_min_uses 2;
    }

    # ── API Proxy ──
    location /api/ {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;

        # Buffers
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;

        # Error handling
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;

        # Hide upstream headers
        proxy_hide_header X-Powered-By;
    }

    # ── Application Root ──
    location / {
        limit_req zone=general burst=30 nodelay;

        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ── Custom Error Pages ──
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/error_pages;
        internal;
    }
    location = /404.html {
        root /var/www/error_pages;
        internal;
    }
}
