# SSL Parameters — Mozilla Intermediate Configuration
# Reference: https://ssl-config.mozilla.org/
# Generated for: Nginx 1.24+, OpenSSL 3.0+
# Supports: Firefox 27+, Android 4.4+, Chrome 31+, IE 11+, Safari 9+
#
# Usage: include /etc/nginx/ssl-params.conf; in your server block
# Prerequisites:
#   openssl dhparam -out /etc/nginx/dhparam.pem 2048

ssl_protocols TLSv1.2 TLSv1.3;

ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;

ssl_prefer_server_ciphers off;

# DH parameters for DHE ciphers
ssl_dhparam /etc/nginx/dhparam.pem;

# Session settings
ssl_session_timeout 1d;
ssl_session_cache shared:SSL:10m;   # ~40,000 sessions
ssl_session_tickets off;

# OCSP Stapling
ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# HSTS (2 years)
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
