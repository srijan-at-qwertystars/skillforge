# Nginx Load Balancer — Production Template
# Covers: multiple upstream groups, health checks, session persistence,
#         weighted routing, failover, and monitoring
#
# Usage: Adjust server addresses, weights, and health check parameters.
# Test with: nginx -t && nginx -s reload

# ── Rate Limiting Zones ──
limit_req_zone $binary_remote_addr zone=lb_general:20m rate=50r/s;
limit_conn_zone $binary_remote_addr zone=lb_connperip:10m;

# ── Upstream: Round-Robin with Weights ──
upstream web_pool {
    server 10.0.1.10:8080 weight=5 max_fails=3 fail_timeout=30s;
    server 10.0.1.11:8080 weight=5 max_fails=3 fail_timeout=30s;
    server 10.0.1.12:8080 weight=3 max_fails=3 fail_timeout=30s;
    server 10.0.1.20:8080 backup;  # only used when all others are down

    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ── Upstream: Least Connections ──
upstream api_pool {
    least_conn;

    server 10.0.2.10:8080 max_fails=3 fail_timeout=30s max_conns=200;
    server 10.0.2.11:8080 max_fails=3 fail_timeout=30s max_conns=200;
    server 10.0.2.12:8080 max_fails=3 fail_timeout=30s max_conns=200;

    keepalive 64;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ── Upstream: Sticky Sessions (IP Hash) ──
upstream session_pool {
    ip_hash;

    server 10.0.3.10:8080 max_fails=3 fail_timeout=30s;
    server 10.0.3.11:8080 max_fails=3 fail_timeout=30s;
    server 10.0.3.12:8080 max_fails=3 fail_timeout=30s;
    # To remove a server temporarily without rehashing:
    # server 10.0.3.12:8080 down;
}

# ── Upstream: Consistent Hashing ──
upstream cache_pool {
    hash $request_uri consistent;

    server 10.0.4.10:8080;
    server 10.0.4.11:8080;
    server 10.0.4.12:8080;
    # consistent hashing minimizes redistribution when servers change
}

# ── Logging ──
log_format lb_log '$remote_addr - [$time_local] "$request" $status '
                  'rt=$request_time ua=$upstream_addr us=$upstream_status '
                  'uct=$upstream_connect_time urt=$upstream_response_time '
                  'rid=$request_id';

# ── HTTP → HTTPS Redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name lb.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main Load Balancer Server ──
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name lb.example.com;

    # ── SSL (include shared params) ──
    ssl_certificate     /etc/letsencrypt/live/lb.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lb.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/lb.example.com/chain.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # ── General Settings ──
    server_tokens off;
    client_max_body_size 50m;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Logging ──
    access_log /var/log/nginx/lb-access.log lb_log buffer=64k flush=5s;
    error_log  /var/log/nginx/lb-error.log warn;

    # ── Monitoring Endpoint (restrict to internal) ──
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        deny all;
    }

    # ── Health Check Endpoint ──
    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Web Application (round-robin, weighted) ──
    location / {
        limit_req zone=lb_general burst=100 nodelay;
        limit_conn lb_connperip 50;

        proxy_pass http://web_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;

        # Response header showing which upstream served the request
        add_header X-Upstream-Addr $upstream_addr always;
    }

    # ── API (least connections) ──
    location /api/ {
        limit_req zone=lb_general burst=50 nodelay;

        proxy_pass http://api_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 16k;

        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    # ── Session-Sticky Routes (ip_hash) ──
    location /app/ {
        proxy_pass http://session_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # ── Cached Content (consistent hash on URI) ──
    location /content/ {
        proxy_pass http://cache_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;

        # Caching at the load balancer level
        proxy_cache_valid 200 10m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── WebSocket Support ──
    location /ws/ {
        proxy_pass http://web_pool;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Custom Error Pages ──
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/error_pages;
        internal;
    }
}

