# Container Storage Configuration
# Place in: /etc/containers/storage.conf (system-wide)
#       or: ~/.config/containers/storage.conf (rootless per-user)
# Docs: man containers-storage.conf(5)
# Format: TOML

[storage]
  # Storage driver: overlay (recommended), fuse-overlayfs (rootless fallback), vfs (universal fallback)
  driver = "overlay"

  # Root storage location (rootful)
  # graphroot = "/var/lib/containers/storage"

  # Rootless storage location (auto-detected, usually ~/.local/share/containers/storage)
  # rootless_storage_path = "$HOME/.local/share/containers/storage"

  # Run root (for lock files and runtime data)
  # runroot = "/run/containers/storage"

  # Transient store: use tmpfs for ephemeral containers (not persisted across reboot)
  # transient_store = false

[storage.options]
  # --- General options ---

  # Additional image stores (read-only, for shared base images)
  # additionalimagestores = ["/mnt/shared-images"]

  # Remap UIDs/GIDs in storage (for rootless)
  # remap-uids = ""
  # remap-gids = ""
  # remap-user = ""
  # remap-group = ""

  # Pull options
  # pull_options = {enable_partial_images = "true", use_hard_links = "false", ostree_repos = ""}

[storage.options.overlay]
  # --- Overlay driver options ---

  # For rootless on kernels without native overlay support, use fuse-overlayfs:
  # mount_program = "/usr/bin/fuse-overlayfs"

  # Mount options for overlay
  # mountopt = "nodev,metacopy=on"

  # Force use of native overlay diff (bypass fuse-overlayfs)
  # force_mask = ""

  # Size of overlay (useful for limiting storage)
  # size = ""

  # Skip mount home check (for NFS home directories)
  # skip_mount_home = "false"

  # Inodes limit
  # inodes = ""

[storage.options.thinpool]
  # --- Devicemapper thin pool options (rarely used, overlay preferred) ---
  # autoextend_percent = "20"
  # autoextend_threshold = "80"
  # basesize = "10G"
  # blocksize = "64k"
  # directlvm_device = ""
  # directlvm_device_force = "false"
  # fs = "xfs"
  # log_level = "7"
  # min_free_space = "10%"
  # mkfsarg = ""
  # mountopt = ""
  # size = ""
  # use_deferred_deletion = "true"
  # use_deferred_removal = "true"
  # xfs_nospace_max_retries = "0"
