# Global Podman Configuration
# Place in: /etc/containers/containers.conf (system-wide)
#       or: ~/.config/containers/containers.conf (rootless per-user)
# Docs: man containers.conf(5)
# Format: TOML

[containers]
  # --- Default settings for all containers ---

  # Default DNS servers (empty = use host DNS)
  # dns_servers = ["8.8.8.8", "8.8.4.4"]

  # Default DNS search domains
  # dns_searches = ["example.com"]

  # Default environment variables for all containers
  # env = ["PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"]

  # Default hostname (empty = container ID)
  # hostname = ""

  # Default HTTP proxy settings
  # http_proxy = false
  # env = ["http_proxy=${http_proxy}", "https_proxy=${https_proxy}"]

  # Init binary (for --init flag)
  init_path = "/usr/libexec/podman/catatonit"

  # IPCNS setting: host | private | shareable
  ipcns = "shareable"

  # Default log driver: journald | k8s-file | none | passthrough
  log_driver = "journald"

  # Log size limit (for k8s-file driver)
  # log_size_max = 1048576

  # Network mode: bridge | host | none | pasta | slirp4netns
  # netns = "bridge"

  # Default PID limit
  pids_limit = 2048

  # Security options
  # Default: no-new-privileges is a good security practice
  # no_new_privileges = true

  # Default seccomp profile
  # seccomp_profile = "/usr/share/containers/seccomp.json"

  # Default ulimits
  # default_ulimits = [
  #   "nofile=65535:65535",
  # ]

  # Default timezone (empty = UTC)
  # tz = "local"

  # Default umask
  # umask = "0022"

  # User namespace mode: auto | host | keep-id | nomap | private
  # userns = "host"

  # Default user to run as inside container
  # user = ""

  # Volumes: default mount options
  # volumes = []

[engine]
  # --- Podman engine settings ---

  # Cgroup manager: systemd | cgroupfs
  cgroup_manager = "systemd"

  # Compose providers (paths to compose implementations)
  # compose_providers = ["/usr/libexec/docker/cli-plugins/docker-compose"]
  # compose_warning_logs = true

  # Events logger: journald | file | none
  events_logger = "journald"

  # Image build format: oci | docker
  # image_default_format = "oci"

  # Default transport for image pulls
  # image_default_transport = "docker://"

  # Infra image for pods
  infra_image = "registry.k8s.io/pause:3.9"

  # Lock type: shm | file
  # lock_type = "shm"

  # Number of parallel image layer pulls
  image_parallel_copies = 5

  # Podman machine settings
  # machine_enabled = false

  # Network backend: netavark | cni
  network_cmd = "netavark"

  # Runtime: crun (recommended) | runc
  runtime = "crun"

  # SSH config for remote connections
  # ssh_config = ""

  # Stop timeout (seconds)
  stop_timeout = 10

  # Enable container auto-update checking via labels
  # auto_update = "registry"

  # Database backend: sqlite | boltdb
  database_backend = "sqlite"

[engine.runtimes]
  # Available OCI runtimes
  crun = ["/usr/bin/crun"]
  runc = ["/usr/bin/runc"]
  # For Kata containers:
  # kata = ["/usr/bin/kata-runtime"]
  # For gVisor:
  # runsc = ["/usr/bin/runsc"]

[engine.volume_plugins]
  # Volume plugin configuration
  # plugin-name = "/run/containers/plugins/plugin.sock"

[network]
  # --- Network settings ---

  # Network backend: netavark | cni
  network_backend = "netavark"

  # Default rootless network command: pasta | slirp4netns
  default_rootless_network_cmd = "pasta"

  # Default network name
  default_network = "podman"

  # Default subnet for new networks
  default_subnet = "10.88.0.0/16"

  # Default subnet pools (for automatic subnet allocation)
  default_subnet_pools = [
    { base = "10.89.0.0/16", size = 24 },
    { base = "10.90.0.0/15", size = 24 },
    { base = "10.92.0.0/14", size = 24 },
  ]

  # DNS port for Aardvark-DNS
  # dns_bind_port = 53

  # Firewall driver: iptables | nftables | none
  # firewall_driver = ""

[machine]
  # --- Podman machine settings (macOS / Windows) ---

  # Default CPUs for new machines
  cpus = 4

  # Default memory (MiB) for new machines
  memory = 4096

  # Default disk size (GiB) for new machines
  disk_size = 60

  # Default VM provider: applehv | hyperv | wsl | qemu
  # provider = ""

  # Default image (Fedora CoreOS)
  # image = ""

  # User for SSH access
  # user = "core"

  # Volumes to mount from host
  # volumes = ["/Users:/Users", "/private:/private", "/var/folders:/var/folders"]

[secrets]
  # --- Secrets configuration ---

  # Default secrets driver: file | pass | shell
  # driver = "file"

  # Secrets driver options
  # [secrets.opts]
  #   root = "/run/containers/secrets"

[farms]
  # --- Farm (multi-arch build) configuration ---
  # Default farm
  # default = "my-farm"

  # Farm definitions
  # [farms.list]
  #   my-farm = ["local", "arm-builder", "x86-builder"]
