# Container Registry Configuration
# Place in: /etc/containers/registries.conf (system-wide)
#       or: ~/.config/containers/registries.conf (rootless per-user)
# Docs: man containers-registries.conf(5)
# Format: TOML
#
# Drop-in directory: /etc/containers/registries.conf.d/*.conf
#   (files in drop-in override/extend this config)

# =============================================================================
# Unqualified search registries
# When pulling without a full domain (e.g., `podman pull nginx`), search these
# registries in order. Explicit domain is always preferred for production.
# =============================================================================
unqualified-search-registries = ["docker.io", "quay.io", "ghcr.io"]

# =============================================================================
# Short-name aliases
# Map short names to fully-qualified image references to avoid ambiguity.
# =============================================================================
[aliases]
  "nginx" = "docker.io/library/nginx"
  "alpine" = "docker.io/library/alpine"
  "python" = "docker.io/library/python"
  "postgres" = "docker.io/library/postgres"
  "redis" = "docker.io/library/redis"

# =============================================================================
# Registry configuration
# Configure per-registry behavior: mirrors, TLS, credentials, blocking.
# =============================================================================

# --- Docker Hub ---
[[registry]]
prefix = "docker.io"
location = "docker.io"
# TLS verification (default: true)
# insecure = false
# Block this registry entirely
# blocked = false

# Mirror: try local mirror first, fall back to Docker Hub
[[registry.mirror]]
location = "mirror.gcr.io"
# insecure = false

# Private mirror (uncomment and configure)
# [[registry.mirror]]
# location = "registry.internal:5000/docker.io"
# insecure = true

# --- Quay.io ---
[[registry]]
prefix = "quay.io"
location = "quay.io"

# --- GitHub Container Registry ---
[[registry]]
prefix = "ghcr.io"
location = "ghcr.io"

# --- Private Registry (example) ---
# [[registry]]
# prefix = "registry.internal:5000"
# location = "registry.internal:5000"
# insecure = true  # Allow HTTP (non-TLS) for internal registries

# --- Red Hat Registry ---
# [[registry]]
# prefix = "registry.redhat.io"
# location = "registry.redhat.io"

# =============================================================================
# Blocked registries
# Prevent pulling from untrusted registries.
# =============================================================================
# [[registry]]
# location = "untrusted-registry.example.com"
# blocked = true
