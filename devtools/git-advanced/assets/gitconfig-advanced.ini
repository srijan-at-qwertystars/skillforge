# =============================================================================
# Advanced .gitconfig — Aliases, Diff Tools, Merge Tools, Performance
# =============================================================================
#
# Usage: Copy sections you want into your ~/.gitconfig or include this file:
#   [include]
#       path = /path/to/gitconfig-advanced.ini
#
# Or apply individual settings:
#   git config --global alias.lg "log --graph --oneline --all"
#
# =============================================================================

# ─── User (customize these) ──────────────────────────────────────────────────

[user]
    name = Your Name
    email = you@example.com
    # signingkey = ~/.ssh/id_ed25519.pub    # For SSH signing
    # signingkey = ABCDEF1234567890         # For GPG signing

# ─── Core Settings ───────────────────────────────────────────────────────────

[core]
    editor = vim                     # Or: code --wait, nano, emacs
    pager = less -FRX                # Don't page short output
    autocrlf = input                 # LF in repo, native on checkout (use "true" on Windows)
    whitespace = trailing-space,space-before-tab,indent-with-non-tab
    excludesfile = ~/.gitignore_global
    # hooksPath = .githooks          # Shared hooks directory
    # fsmonitor = true               # Git 2.37+ built-in file monitor (speeds up status)
    untrackedCache = true            # Cache untracked files (faster status)

# ─── Aliases ─────────────────────────────────────────────────────────────────

[alias]
    # ── Log & History ──
    lg      = log --graph --oneline --decorate --all
    ll      = log --graph --pretty=format:'%C(yellow)%h%Creset %C(cyan)%ar%Creset %C(green)%an%Creset %s%C(auto)%d'
    hist    = log --pretty=format:'%C(yellow)%h %C(cyan)%ad%Creset | %s%d [%an]' --date=short
    today   = log --since=midnight --oneline --no-merges
    week    = log --since='1 week ago' --oneline --no-merges
    mine    = log --author='Your Name' --oneline --no-merges

    # ── Status & Diff ──
    s       = status --short --branch
    d       = diff
    dc      = diff --cached                  # staged changes
    ds      = diff --stat                    # summary only
    dw      = diff --word-diff               # word-level diff
    changed = diff --name-only

    # ── Commit ──
    cm      = commit -m
    ca      = commit --amend --no-edit       # amend without editing message
    cae     = commit --amend                 # amend and edit message
    fixup   = commit --fixup                 # create fixup commit
    wip     = !git add -A && git commit -m 'chore: WIP [skip ci]'
    unwip   = reset HEAD~1                   # undo WIP commit, keep changes

    # ── Branch ──
    co      = checkout
    sw      = switch
    br      = branch -vv                     # branches with upstream info
    bra     = branch -avv                    # all branches
    new     = switch -c                      # create and switch to branch
    gone    = !git branch -vv | grep ': gone]' | awk '{print $1}'
    cleanup = !git gone | xargs -r git branch -D

    # ── Stash ──
    ss      = stash push -m                  # stash with message
    sl      = stash list
    sp      = stash pop
    sa      = stash apply
    sd      = stash show -p                  # show stash diff

    # ── Rebase ──
    ri      = rebase -i                      # interactive rebase
    rc      = rebase --continue
    ra      = rebase --abort
    rom     = !git fetch origin && git rebase origin/main
    rod     = !git fetch origin && git rebase origin/develop

    # ── Remote ──
    f       = fetch --all --prune
    pl      = pull --rebase
    pushf   = push --force-with-lease        # safe force push
    pub     = !git push -u origin $(git symbolic-ref --short HEAD)

    # ── Inspection ──
    who     = shortlog -sn --no-merges       # contributor list
    last    = log -1 --stat                  # last commit details
    undo    = reset HEAD~1 --mixed           # undo last commit, keep changes
    unstage = reset HEAD --                  # unstage files
    tags    = tag -l --sort=-version:refname # list tags by version
    aliases = config --get-regexp alias      # list all aliases

    # ── Advanced ──
    find    = log --all --full-history -- # find file in history
    search  = log -S                         # pickaxe search
    searchg = log -G                         # regex pickaxe
    root    = rev-parse --show-toplevel      # repo root
    upstream = rev-parse --abbrev-ref --symbolic-full-name @{upstream}

# ─── Color ───────────────────────────────────────────────────────────────────

[color]
    ui = auto
    diff = auto
    status = auto
    branch = auto

[color "diff"]
    meta = yellow bold
    frag = magenta bold
    old = red
    new = green
    whitespace = red reverse

[color "status"]
    added = green
    changed = yellow
    untracked = cyan

# ─── Diff ────────────────────────────────────────────────────────────────────

[diff]
    algorithm = histogram              # Better diff output than default myers
    colorMoved = default               # Highlight moved lines
    colorMovedWS = allow-indentation-change
    renames = copies                    # Detect renames and copies
    mnemonicPrefix = true              # Use i/ w/ c/ o/ instead of a/ b/
    # tool = vscode                    # Uncomment for VS Code diff tool

[diff "json"]
    textconv = python3 -m json.tool

[diff "csv"]
    textconv = column -t -s,

# [difftool "vscode"]
#     cmd = code --wait --diff $LOCAL $REMOTE

# ─── Merge ───────────────────────────────────────────────────────────────────

[merge]
    conflictstyle = zdiff3             # Better conflict markers (Git 2.35+)
    ff = false                         # Always create merge commit on merge
    # tool = vscode                    # Uncomment for VS Code merge tool

# [mergetool "vscode"]
#     cmd = code --wait --merge $REMOTE $LOCAL $BASE $MERGED

[mergetool]
    keepBackup = false                 # Don't keep .orig backup files
    prompt = false                     # Don't prompt before each file

# ─── Rebase ──────────────────────────────────────────────────────────────────

[rebase]
    autoSquash = true                  # Auto-reorder fixup/squash commits
    autoStash = true                   # Stash before rebase, pop after
    updateRefs = true                  # Update stacked branches (Git 2.38+)
    missingCommitsCheck = warn         # Warn if commits are dropped

# ─── Pull / Push ─────────────────────────────────────────────────────────────

[pull]
    rebase = true                      # Rebase instead of merge on pull

[push]
    default = current                  # Push current branch to same name
    autoSetupRemote = true             # Auto set upstream on first push (Git 2.37+)
    followTags = true                  # Push tags that point to pushed commits

# ─── Fetch ───────────────────────────────────────────────────────────────────

[fetch]
    prune = true                       # Auto-prune stale remote branches
    pruneTags = true                   # Also prune stale tags
    parallel = 0                       # Parallel fetches (0 = auto)

# ─── Rerere ──────────────────────────────────────────────────────────────────

[rerere]
    enabled = true                     # Remember merge conflict resolutions
    autoUpdate = true                  # Auto-stage rerere resolutions

# ─── Blame ───────────────────────────────────────────────────────────────────

[blame]
    coloring = highlightRecent         # Color by recency
    # ignoreRevsFile = .git-blame-ignore-revs  # Ignore formatting commits

# ─── Commit ──────────────────────────────────────────────────────────────────

[commit]
    verbose = true                     # Show diff in commit message editor
    # gpgsign = true                   # Sign all commits

# ─── Tag ─────────────────────────────────────────────────────────────────────

[tag]
    # gpgsign = true                   # Sign all tags
    sort = -version:refname            # Sort tags by version

# ─── Signing (choose GPG or SSH) ────────────────────────────────────────────

# SSH Signing (recommended, simpler):
# [gpg]
#     format = ssh
# [gpg "ssh"]
#     allowedSignersFile = ~/.ssh/allowed_signers

# GPG Signing:
# [gpg]
#     program = gpg2

# ─── Performance ─────────────────────────────────────────────────────────────

[pack]
    threads = 0                        # Auto-detect CPU cores

[gc]
    auto = 256                         # Run gc after 256 loose objects
    reflogExpire = 180.days            # Keep reflog longer (default 90)
    reflogExpireUnreachable = 90.days  # Unreachable (default 30)

[feature]
    manyFiles = true                   # Optimize for large repos (Git 2.24+)

[index]
    version = 4                        # Smaller, faster index format

# ─── URL Shortcuts ───────────────────────────────────────────────────────────

[url "git@github.com:"]
    insteadOf = gh:

[url "git@gitlab.com:"]
    insteadOf = gl:

# ─── Maintenance (Git 2.29+) ────────────────────────────────────────────────

# Enable scheduled background maintenance:
#   git maintenance start
# This registers a cron job / launchd task for:
#   - prefetch: hourly fetch in background
#   - gc: daily garbage collection
#   - loose-objects: daily pack loose objects
#   - incremental-repack: daily repack
#   - commit-graph: hourly update commit graph

[maintenance]
    auto = false                       # Disable auto-gc when maintenance is enabled
