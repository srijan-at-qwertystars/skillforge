; mypy.ini — Production-ready mypy configuration
; Copy to project root. Adjust python_version and per-module overrides.

[mypy]
; ── Target ──
python_version = 3.12

; ── Strict mode (enables all checks below) ──
strict = True

; ── Import handling ──
; Don't silently ignore missing imports — forces explicit stub management
ignore_missing_imports = False
; Follow imports for type checking
follow_imports = normal

; ── Disallow untyped code ──
disallow_untyped_defs = True
disallow_incomplete_defs = True
disallow_untyped_decorators = True
disallow_any_generics = True
disallow_subclassing_any = True

; ── Warnings ──
warn_return_any = True
warn_unused_configs = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_unreachable = True

; ── Error output ──
show_error_codes = True
show_error_context = True
show_column_numbers = True
pretty = True
color_output = True

; ── Additional checks ──
check_untyped_defs = True
no_implicit_reexport = True
no_implicit_optional = True
strict_equality = True
strict_concatenate = True
enable_error_code = ignore-without-code, redundant-expr, truthy-bool

; ── Performance ──
incremental = True
cache_dir = .mypy_cache
; sqlite_cache = True  ; Uncomment for large projects

; ── Stubs ──
; mypy_path = stubs    ; Uncomment if using custom stubs directory

; ── Plugins ──
; plugins = pydantic.mypy, mypy_django_plugin.main, sqlalchemy.ext.mypy.plugin

; ══ Per-Module Overrides ═══════════════════════════════════════════════════

; Relax rules for tests
[mypy-tests.*]
disallow_untyped_defs = False
disallow_untyped_decorators = False

; Ignore missing stubs for specific third-party packages
; [mypy-some_untyped_lib.*]
; ignore_missing_imports = True

; ── Plugin-specific config ─────────────────────────────────────────────────

; [pydantic-mypy]
; init_forbid_extra = True
; init_typed = True
; warn_required_dynamic_aliases = True

; [mypy.plugins.django-stubs]
; django_settings_module = myproject.settings
