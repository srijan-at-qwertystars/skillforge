version: "3.8"

x-celery-env: &celery-env
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1

x-celery-common: &celery-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    <<: *celery-env
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  # --- Message Broker ---
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
        reservations:
          memory: 256M

  # --- Default Queue Worker ---
  worker-default:
    <<: *celery-common
    command: >
      celery -A myproject worker
      --loglevel=INFO
      --concurrency=8
      --max-tasks-per-child=200
      --max-memory-per-child=200000
      -Q default
      -n default@%h
      -E
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
      replicas: 2
    healthcheck:
      test: ["CMD-SHELL", "celery -A myproject inspect ping --timeout=10 -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # --- Priority Queue Worker ---
  worker-priority:
    <<: *celery-common
    command: >
      celery -A myproject worker
      --loglevel=INFO
      --concurrency=4
      --max-tasks-per-child=100
      -Q high_priority
      -n priority@%h
      -E
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M

  # --- Celery Beat Scheduler ---
  # CRITICAL: Only ONE beat instance should run at a time
  beat:
    <<: *celery-common
    command: >
      celery -A myproject beat
      --loglevel=INFO
      --schedule=/tmp/celerybeat-schedule
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
      replicas: 1  # MUST be 1

  # --- Flower Monitoring ---
  flower:
    <<: *celery-common
    command: >
      celery -A myproject flower
      --port=5555
      --broker_api=redis://redis:6379/0
      --persistent=True
      --db=/data/flower.db
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-changeme}
    ports:
      - "5555:5555"
    volumes:
      - flower-data:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5555/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis-data:
    driver: local
  flower-data:
    driver: local
