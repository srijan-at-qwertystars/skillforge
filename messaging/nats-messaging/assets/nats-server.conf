###############################################################################
# Authorization — NKey-Based (Ed25519)
#
# Generate keys: nsc generate nkey -u
# For JWT/Account mode (large scale): use nsc + resolver instead
###############################################################################
authorization {
    # Zero-trust default: deny all for unmatched connections
    default_permissions {
        publish   { deny: [">"] }
        subscribe { deny: [">"] }
    }

    users: [
        # ── Admin (ops tooling only) ────────────────────────────────────
        {
            nkey: "UAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"  # CHANGEME
            permissions {
                publish   { allow: [">"] }
                subscribe { allow: [">"] }
            }
        }

        # ── Application: order-service ──────────────────────────────────
        {
            nkey: "UBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB"  # CHANGEME
            permissions {
                publish   { allow: ["orders.>", "$JS.API.>", "_INBOX.>"] }
                subscribe { allow: ["orders.>", "_INBOX.>"] }
            }
        }

        # ── Application: notification-service ───────────────────────────
        {
            nkey: "UCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC"  # CHANGEME
            permissions {
                publish   { allow: ["notifications.>", "_INBOX.>"] }
                subscribe { allow: ["notifications.>", "orders.created", "_INBOX.>"] }
            }
        }
    ]
}

