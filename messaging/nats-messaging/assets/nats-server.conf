###############################################################################
# NATS Server Configuration — Production Template
#
# This file provides a comprehensive, production-ready NATS server
# configuration.  Copy it, adjust values marked with "CHANGEME", and
# point nats-server at it:
#
#   nats-server -c /etc/nats/nats-server.conf
#
# Documentation: https://docs.nats.io/running-a-nats-service/configuration
###############################################################################

# ─── Server Identification ───────────────────────────────────────────────────
# A unique, human-readable name for this server instance.
# Used in logging, monitoring, and cluster route advertisements.
server_name: "nats-prod-1"                     # CHANGEME per node

# ─── Client Listener ────────────────────────────────────────────────────────
# The address and port clients connect to.
listen: 0.0.0.0:4222

# ─── Maximum Payload ────────────────────────────────────────────────────────
# Largest message body the server will accept.  Messages exceeding this
# size are rejected.  Default is 1 MB; raise with caution as large payloads
# increase memory pressure and latency.
max_payload: 8MB

# ─── Maximum Client Connections ──────────────────────────────────────────────
# Hard cap on concurrent client connections.  Set based on your expected
# peak load plus headroom.
max_connections: 65536

# ─── Ping / Pong Keep-alive ─────────────────────────────────────────────────
# The server pings idle clients every `ping_interval` seconds.
# If a client misses `ping_max` consecutive pongs the connection is closed.
ping_interval: 20
ping_max: 3

# ─── Write Deadline ─────────────────────────────────────────────────────────
# Maximum time the server will wait to finish writing a message to a slow
# client before dropping the connection.
write_deadline: "10s"

###############################################################################
# JetStream — Persistent Messaging / Streaming
###############################################################################
jetstream {
  # Directory where JetStream stores stream data on disk.
  store_dir: "/data/nats/jetstream"            # CHANGEME — use a fast SSD

  # Maximum memory the server may use for JetStream memory-backed stores.
  max_mem: 1GB

  # Maximum disk space the server may use for JetStream file-backed stores.
  max_file: 50GB

  # Domain isolates this JetStream instance from others when using leaf
  # nodes or super-clusters.  Leave empty for a single-domain deployment.
  # domain: "production"
}

###############################################################################
# TLS — Transport-Layer Security
#
# Encrypts client ↔ server traffic.  In production you should always
# enable TLS.  Provide PEM-encoded certificate and key files signed by
# a trusted CA (or use Let's Encrypt / cert-manager in Kubernetes).
###############################################################################
# tls {
#   cert_file:  "/etc/nats/certs/server-cert.pem"   # CHANGEME
#   key_file:   "/etc/nats/certs/server-key.pem"     # CHANGEME
#   ca_file:    "/etc/nats/certs/ca-cert.pem"         # CHANGEME (for mTLS)
#
#   # Require clients to present a valid certificate (mutual TLS).
#   # verify: true
#
#   # Minimum TLS version.  1.2 is a safe default; use 1.3 when all
#   # clients support it.
#   # min_version: "1.2"
#
#   # TLS handshake timeout — how long the server waits for the TLS
#   # handshake to complete before dropping the connection.
#   timeout: 5
# }

###############################################################################
# Authorization — NKey-Based Users & Permissions
#
# NKeys are Ed25519 key pairs.  The public key (starting with "U") is
# placed here; the private seed is kept by the client.  Generate keys
# with `nsc generate nkey -u`.
#
# For large-scale or multi-tenant setups, consider using the NATS Account
# Resolver (nsc + nats-account-server) instead of static authorization.
###############################################################################
authorization {
  # Default permissions applied to connections that do not match any user.
  # Deny all by default for a zero-trust posture.
  default_permissions {
    publish {
      deny: [">"]
    }
    subscribe {
      deny: [">"]
    }
  }

  users: [
    # ── Admin user ──────────────────────────────────────────────────────────
    # Full access — use only for ops tooling (nats CLI, monitoring).
    {
      nkey: "UAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"  # CHANGEME
      permissions {
        publish {
          allow: [">"]
        }
        subscribe {
          allow: [">"]
        }
      }
    }

    # ── Application: order-service ──────────────────────────────────────────
    # Can publish to orders.* and subscribe to orders.replies.*
    {
      nkey: "UBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB"  # CHANGEME
      permissions {
        publish {
          allow: ["orders.>", "_INBOX.>"]
        }
        subscribe {
          allow: ["orders.>", "_INBOX.>"]
        }
        # Deny access to admin / system subjects
        publish {
          deny: ["$SYS.>", "$JS.API.>"]
        }
      }
    }

    # ── Application: notification-service ───────────────────────────────────
    {
      nkey: "UCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCCC"  # CHANGEME
      permissions {
        publish {
          allow: ["notifications.>", "_INBOX.>"]
        }
        subscribe {
          allow: ["notifications.>", "orders.created", "_INBOX.>"]
        }
      }
    }
  ]
}

###############################################################################
# Logging
###############################################################################
# Log to stdout (recommended when running under systemd / containers).
# Set log_file to a path if you prefer file-based logging.

# log_file: "/var/log/nats/nats-server.log"
# log_size_limit: 100MB          # Rotate after this size

# Verbosity levels — enable only what you need in production.
debug: false
trace: false
logtime: true

###############################################################################
# Monitoring / Metrics HTTP Endpoint
#
# Exposes a lightweight HTTP server for health checks and Prometheus
# scraping.  Endpoints include:
#   /healthz    — liveness probe (returns 200 if running)
#   /varz       — general server stats
#   /connz      — connection info
#   /routez     — cluster routes
#   /subsz      — subscription info
#   /jsz        — JetStream stats
###############################################################################
http_port: 8222

###############################################################################
# System Account
#
# The system account receives internal events (connection open/close,
# slow consumers, etc.).  Required for NATS monitoring tooling.
###############################################################################
# system_account: "SYSACCOUNT"   # CHANGEME — set to the public NKey of a
                                  # dedicated system account when using
                                  # account resolver.

###############################################################################
# Cluster — Multi-Node Replication
#
# Uncomment and configure this block on every node to form a cluster.
# All nodes must share the same cluster name.  Routes should list the
# addresses of ALL nodes (including self — NATS handles the self-route).
#
# In production, use DNS names and keep the route list identical on every
# node for simplicity.
###############################################################################
# cluster {
#   name: "nats-prod-cluster"                   # CHANGEME — same on all nodes
#   listen: 0.0.0.0:6222
#
#   # TLS for inter-node traffic (strongly recommended in production).
#   # tls {
#   #   cert_file: "/etc/nats/certs/cluster-cert.pem"
#   #   key_file:  "/etc/nats/certs/cluster-key.pem"
#   #   ca_file:   "/etc/nats/certs/ca-cert.pem"
#   #   verify:    true
#   # }
#
#   routes = [
#     nats-route://nats-prod-1.example.com:6222
#     nats-route://nats-prod-2.example.com:6222
#     nats-route://nats-prod-3.example.com:6222
#   ]
#
#   # Allow the server to automatically discover new peers.
#   connect_retries: 30
# }

###############################################################################
# Leaf Nodes — Edge / Branch Connectivity
#
# Leaf nodes connect to a hub cluster and transparently bridge subjects.
# Use leaf nodes to:
#   • extend NATS to edge locations or remote data-centers
#   • isolate workloads while sharing a subset of subjects
#
# Hub-side: configure a leafnode listener block.
# Leaf-side: configure a remotes block pointing at the hub(s).
###############################################################################
# leafnodes {
#   # ── Hub-side listener ──────────────────────────────────────────────────
#   # listen: 0.0.0.0:7422
#   #
#   # tls {
#   #   cert_file: "/etc/nats/certs/leafnode-cert.pem"
#   #   key_file:  "/etc/nats/certs/leafnode-key.pem"
#   #   ca_file:   "/etc/nats/certs/ca-cert.pem"
#   #   verify:    true
#   # }
#
#   # ── Leaf-side remotes ──────────────────────────────────────────────────
#   # remotes [
#   #   {
#   #     url: "nats-leaf://hub.example.com:7422"
#   #     credentials: "/etc/nats/creds/leaf.creds"
#   #   }
#   # ]
# }

###############################################################################
# Connection Limits — Per-Account Overrides
#
# When using the account resolver these are set per-account via nsc.
# The values below are global server-wide limits.
###############################################################################
# max_subscriptions: 0           # 0 = unlimited
# max_control_line:  4KB         # Max length of a protocol control line
