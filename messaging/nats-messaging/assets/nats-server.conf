###############################################################################
# Logging
###############################################################################
# log_file: "/var/log/nats/nats-server.log"   # Omit for stdout (containers)
# log_size_limit: 100MB                        # Rotate at this size
# max_traced_msg_len: 1024

debug: false                                   # Protocol debug (5% CPU overhead)
trace: false                                   # Message trace (NEVER in prod)
logtime: true                                  # Timestamps in logs

###############################################################################
# Monitoring — HTTP Endpoints
#   /healthz  — liveness probe
#   /varz     — server stats (Prometheus-compatible with ?format=prometheus)
#   /connz    — connection info
#   /routez   — cluster routes
#   /subsz    — subscriptions
#   /jsz      — JetStream stats
#   /gatewayz — gateway info
#   /leafz    — leaf nodes
#   /accountz — account stats
###############################################################################
http_port: 8222

###############################################################################
# Lame Duck Mode — Graceful Shutdown
###############################################################################
lame_duck_duration: "30s"
lame_duck_grace_period: "10s"
