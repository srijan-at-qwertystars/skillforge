###############################################################################
# NATS Server Configuration — Production Template
#
# Deploy:  nats-server -c /etc/nats/nats-server.conf
# Reload:  Send SIGHUP to reload TLS certs and most settings without restart
# Docs:    https://docs.nats.io/running-a-nats-service/configuration
###############################################################################

# ─── Server Identity ────────────────────────────────────────────────────────
server_name: "nats-prod-1"                     # CHANGEME — unique per node

# ─── Client Listener ────────────────────────────────────────────────────────
listen: 0.0.0.0:4222

# ─── Limits ──────────────────────────────────────────────────────────────────
max_payload: 8MB                               # Max message body (default 1MB)
max_connections: 65536                         # Max concurrent client connections
max_control_line: 4KB                          # Max protocol control line
max_pending: 67108864                          # 64MB write buffer per client

# ─── Keep-Alive ─────────────────────────────────────────────────────────────
ping_interval: 20                              # Seconds between pings
ping_max: 3                                    # Missed pongs before disconnect
write_deadline: "10s"                          # Max write time for slow clients

###############################################################################
# JetStream — Persistent Messaging
###############################################################################
jetstream {
    store_dir: "/data/nats/jetstream"          # CHANGEME — use fast SSD/NVMe
    max_mem: 4GB                               # Memory-backed stream limit
    max_file: 100GB                            # File-backed stream limit
    # domain: "production"                     # Isolate JS domains (leaf nodes)
}

###############################################################################
# TLS — Client Connections
###############################################################################
tls {
    cert_file:  "/etc/nats/certs/server-cert.pem"    # CHANGEME
    key_file:   "/etc/nats/certs/server-key.pem"      # CHANGEME
    ca_file:    "/etc/nats/certs/ca-cert.pem"          # CHANGEME

    # Mutual TLS: require client certificates
    verify: true

    # Minimum TLS version (1.2 safe default, 1.3 preferred)
    min_version: "1.2"

    # Handshake timeout
    timeout: 5
}

###############################################################################
# OCSP Stapling
###############################################################################
# ocsp {
#     mode: always    # always | never | must_staple
# }

###############################################################################
# Cluster — Multi-Node Replication (3 or 5 nodes for HA)
###############################################################################
cluster {
    name: "nats-prod-cluster"                  # CHANGEME — same on all nodes
    listen: 0.0.0.0:6222

    tls {
        cert_file:  "/etc/nats/certs/cluster-cert.pem"   # CHANGEME
        key_file:   "/etc/nats/certs/cluster-key.pem"     # CHANGEME
        ca_file:    "/etc/nats/certs/ca-cert.pem"          # CHANGEME
        verify: true
    }

    routes = [
        nats-route://nats-prod-1.example.com:6222        # CHANGEME
        nats-route://nats-prod-2.example.com:6222        # CHANGEME
        nats-route://nats-prod-3.example.com:6222        # CHANGEME
    ]

    connect_retries: 30
}

