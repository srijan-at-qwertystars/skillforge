# =============================================================================
# NATS Observability Stack — Docker Compose
#
# Brings up a complete NATS cluster with monitoring:
#   • 3 NATS servers (JetStream, clustering)
#   • NATS Surveyor (metrics exporter)
#   • Prometheus (metrics storage)
#   • Grafana (dashboards, pre-provisioned)
#
# Usage:
#   docker compose up -d          # start everything
#   docker compose down -v        # tear down + remove data
#
# Ports:
#   4222-4224  — NATS client connections
#   8222-8224  — NATS monitoring HTTP (varz, connz, jsz, healthz)
#   6222-6224  — NATS cluster routing (internal)
#   9090       — Prometheus UI
#   3000       — Grafana UI  (admin / admin)
#   7777       — NATS Surveyor metrics endpoint
# =============================================================================
version: "3.9"

# ─── Shared configuration fragments ─────────────────────────────────────────
x-nats-common: &nats-common
  image: nats:2-alpine
  restart: unless-stopped
  networks:
    - nats-net
  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
    interval: 10s
    timeout: 5s
    retries: 10
    start_period: 5s

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # NATS Cluster — 3 nodes
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Node 1 ────────────────────────────────────────────────────────────────
  nats-1:
    <<: *nats-common
    container_name: nats-1
    hostname: nats-1
    command: >
      -n nats-1
      -p 4222
      -m 8222
      --cluster_name nats-observability
      --cluster nats://0.0.0.0:6222
      --routes nats-route://nats-1:6222,nats-route://nats-2:6222,nats-route://nats-3:6222
      --js
      --sd /data
      --store_dir /data/jetstream
    ports:
      - "4222:4222"   # Client
      - "8222:8222"   # Monitoring HTTP
      - "6222:6222"   # Cluster routing
    volumes:
      - nats-1-data:/data

  # ── Node 2 ────────────────────────────────────────────────────────────────
  nats-2:
    <<: *nats-common
    container_name: nats-2
    hostname: nats-2
    command: >
      -n nats-2
      -p 4222
      -m 8222
      --cluster_name nats-observability
      --cluster nats://0.0.0.0:6222
      --routes nats-route://nats-1:6222,nats-route://nats-2:6222,nats-route://nats-3:6222
      --js
      --sd /data
      --store_dir /data/jetstream
    ports:
      - "4223:4222"   # Client
      - "8223:8222"   # Monitoring HTTP
      - "6223:6222"   # Cluster routing
    volumes:
      - nats-2-data:/data

  # ── Node 3 ────────────────────────────────────────────────────────────────
  nats-3:
    <<: *nats-common
    container_name: nats-3
    hostname: nats-3
    command: >
      -n nats-3
      -p 4222
      -m 8222
      --cluster_name nats-observability
      --cluster nats://0.0.0.0:6222
      --routes nats-route://nats-1:6222,nats-route://nats-2:6222,nats-route://nats-3:6222
      --js
      --sd /data
      --store_dir /data/jetstream
    ports:
      - "4224:4222"   # Client
      - "8224:8222"   # Monitoring HTTP
      - "6224:6222"   # Cluster routing
    volumes:
      - nats-3-data:/data

  # ═══════════════════════════════════════════════════════════════════════════
  # NATS Surveyor — Collects NATS metrics and exposes Prometheus /metrics
  # https://github.com/nats-io/nats-surveyor
  # ═══════════════════════════════════════════════════════════════════════════
  nats-surveyor:
    image: natsio/nats-surveyor:latest
    container_name: nats-surveyor
    restart: unless-stopped
    command: >
      --servers nats://nats-1:4222,nats://nats-2:4222,nats://nats-3:4222
      --port 7777
      --jetstream-enabled
      --accounts
    ports:
      - "7777:7777"   # Prometheus scrape endpoint
    depends_on:
      nats-1: { condition: service_healthy }
      nats-2: { condition: service_healthy }
      nats-3: { condition: service_healthy }
    networks:
      - nats-net

  # ═══════════════════════════════════════════════════════════════════════════
  # Prometheus — Metrics Storage
  # ═══════════════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"   # Prometheus Web UI
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    depends_on:
      - nats-surveyor
    networks:
      - nats-net

  # ═══════════════════════════════════════════════════════════════════════════
  # Grafana — Dashboards & Visualization
  # ═══════════════════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"   # Grafana Web UI
    environment:
      # Default admin credentials (change in production!)
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Disable login screen for local dev
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - grafana-data:/var/lib/grafana
      # Auto-provision the Prometheus datasource
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      # Auto-provision NATS dashboards
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - nats-net

# ═══════════════════════════════════════════════════════════════════════════════
# Named Volumes
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  # JetStream data — one per node for persistence across restarts
  nats-1-data:
    driver: local
  nats-2-data:
    driver: local
  nats-3-data:
    driver: local
  # Prometheus time-series data
  prometheus-data:
    driver: local
  # Grafana dashboards, plugins, and SQLite database
  grafana-data:
    driver: local

# ═══════════════════════════════════════════════════════════════════════════════
# Network
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  nats-net:
    driver: bridge

# =============================================================================
# Supporting configuration files
#
# Before running `docker compose up`, create the following directory structure
# alongside this file:
#
#   prometheus/
#     prometheus.yml            ← Prometheus scrape configuration
#   grafana/
#     provisioning/
#       datasources/
#         datasource.yml        ← Auto-provision Prometheus in Grafana
#       dashboards/
#         dashboard.yml         ← Tell Grafana where to find dashboards
#     dashboards/
#       nats-dashboard.json     ← NATS dashboard JSON (import from
#                                  https://grafana.com/grafana/dashboards/
#                                  search "NATS")
#
# ── prometheus/prometheus.yml ────────────────────────────────────────────────
#   global:
#     scrape_interval: 10s
#   scrape_configs:
#     - job_name: nats-surveyor
#       static_configs:
#         - targets: ["nats-surveyor:7777"]
#     - job_name: nats-varz
#       metrics_path: /varz
#       static_configs:
#         - targets:
#             - "nats-1:8222"
#             - "nats-2:8222"
#             - "nats-3:8222"
#
# ── grafana/provisioning/datasources/datasource.yml ─────────────────────────
#   apiVersion: 1
#   datasources:
#     - name: Prometheus
#       type: prometheus
#       access: proxy
#       url: http://prometheus:9090
#       isDefault: true
#
# ── grafana/provisioning/dashboards/dashboard.yml ────────────────────────────
#   apiVersion: 1
#   providers:
#     - name: NATS
#       folder: NATS
#       type: file
#       options:
#         path: /var/lib/grafana/dashboards
# =============================================================================
