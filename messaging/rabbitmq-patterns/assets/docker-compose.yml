# RabbitMQ Cluster Docker Compose — Production-Ready Template
#
# Features:
# - 3-node cluster with quorum queue support
# - Management UI on node1 (port 15672)
# - Prometheus metrics (port 15692)
# - Stream protocol (port 5552)
# - Volume persistence for each node
# - Shared Erlang cookie for cluster authentication
# - Custom configuration and definitions
#
# Usage:
#   docker compose up -d
#   docker compose ps
#   # Management UI: http://localhost:15672 (admin / rabbitmq_admin_pass)
#
# To scale down to a single node for development:
#   docker compose up -d rabbitmq1

x-rabbitmq-common: &rabbitmq-common
  image: rabbitmq:4.0-management
  restart: unless-stopped
  environment: &rabbitmq-env
    RABBITMQ_DEFAULT_USER: admin
    RABBITMQ_DEFAULT_PASS: rabbitmq_admin_pass
    RABBITMQ_ERLANG_COOKIE: "CLUSTER_SECRET_COOKIE_CHANGE_ME"
    RABBITMQ_DEFAULT_VHOST: /
  networks:
    - rabbitmq-cluster
  healthcheck:
    test: ["CMD-SHELL", "rabbitmq-diagnostics check_running && rabbitmq-diagnostics check_local_alarms"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 60s

services:
  rabbitmq1:
    <<: *rabbitmq-common
    hostname: rabbitmq1
    container_name: rabbitmq1
    ports:
      - "5672:5672"       # AMQP
      - "15672:15672"     # Management UI
      - "15692:15692"     # Prometheus metrics
      - "5552:5552"       # Streams
    volumes:
      - rabbitmq1-data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./definitions.json:/etc/rabbitmq/definitions.json:ro
    environment:
      <<: *rabbitmq-env
      RABBITMQ_NODENAME: rabbit@rabbitmq1

  rabbitmq2:
    <<: *rabbitmq-common
    hostname: rabbitmq2
    container_name: rabbitmq2
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq2-data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      <<: *rabbitmq-env
      RABBITMQ_NODENAME: rabbit@rabbitmq2
    depends_on:
      rabbitmq1:
        condition: service_healthy
    entrypoint: >
      bash -c "
        sleep 10 &&
        docker-entrypoint.sh rabbitmq-server &
        sleep 30 &&
        rabbitmqctl stop_app &&
        rabbitmqctl join_cluster rabbit@rabbitmq1 &&
        rabbitmqctl start_app &&
        tail -f /var/log/rabbitmq/*.log
      "

  rabbitmq3:
    <<: *rabbitmq-common
    hostname: rabbitmq3
    container_name: rabbitmq3
    ports:
      - "5674:5672"
      - "15674:15672"
    volumes:
      - rabbitmq3-data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      <<: *rabbitmq-env
      RABBITMQ_NODENAME: rabbit@rabbitmq3
    depends_on:
      rabbitmq1:
        condition: service_healthy
    entrypoint: >
      bash -c "
        sleep 15 &&
        docker-entrypoint.sh rabbitmq-server &
        sleep 30 &&
        rabbitmqctl stop_app &&
        rabbitmqctl join_cluster rabbit@rabbitmq1 &&
        rabbitmqctl start_app &&
        tail -f /var/log/rabbitmq/*.log
      "

volumes:
  rabbitmq1-data:
    driver: local
  rabbitmq2-data:
    driver: local
  rabbitmq3-data:
    driver: local

networks:
  rabbitmq-cluster:
    driver: bridge
