# =============================================================================
# RabbitMQ Configuration — Production Template
# =============================================================================
# Documentation: https://www.rabbitmq.com/docs/configure
# Place at /etc/rabbitmq/rabbitmq.conf

# -----------------------------------------------------------------------------
# Listeners
# -----------------------------------------------------------------------------

# AMQP 0-9-1 and AMQP 1.0
listeners.tcp.default = 5672

# Management UI and HTTP API
management.tcp.port = 15672

# Stream protocol
stream.listeners.tcp.default = 5552

# Prometheus metrics endpoint
prometheus.tcp.port = 15692

# TLS (uncomment and configure for production)
# listeners.ssl.default = 5671
# ssl_options.cacertfile = /certs/ca.pem
# ssl_options.certfile = /certs/server.pem
# ssl_options.keyfile = /certs/server-key.pem
# ssl_options.verify = verify_peer
# ssl_options.fail_if_no_peer_cert = true
# ssl_options.versions.1 = tlsv1.3
# ssl_options.versions.2 = tlsv1.2

# Management TLS (uncomment for HTTPS management UI)
# management.ssl.port = 15671
# management.ssl.cacertfile = /certs/ca.pem
# management.ssl.certfile = /certs/server.pem
# management.ssl.keyfile = /certs/server-key.pem

# -----------------------------------------------------------------------------
# Resource Limits
# -----------------------------------------------------------------------------

# Memory watermark — publishers block when memory usage exceeds this fraction
vm_memory_high_watermark.relative = 0.7

# Start paging messages to disk before hitting the watermark
vm_memory_high_watermark_paging_ratio = 0.75

# Disk free space limit — publishers block below this threshold
disk_free_limit.absolute = 2GB

# Maximum number of channels per connection (prevent channel leaks)
channel_max = 128

# Maximum number of connections (0 = unlimited)
# connection_max = 10000

# -----------------------------------------------------------------------------
# Default Queue Type
# -----------------------------------------------------------------------------

# Default to quorum queues for new declarations without explicit type
default_queue_type = quorum

# -----------------------------------------------------------------------------
# Clustering
# -----------------------------------------------------------------------------

# Partition handling strategy
# Options: pause_minority (recommended), autoheal, ignore
cluster_partition_handling = pause_minority

# Erlang net_ticktime in seconds (default 60)
# Lower = faster detection of unreachable nodes, but more false positives
net_ticktime = 60

# Peer discovery (for containerized/cloud deployments)
# cluster_formation.peer_discovery_backend = rabbit_peer_discovery_dns
# cluster_formation.dns.hostname = rabbitmq-headless.rabbitmq.svc.cluster.local

# -----------------------------------------------------------------------------
# Consumer Settings
# -----------------------------------------------------------------------------

# Consumer timeout — cancel consumer if no ack within this period (ms)
# Default: 1800000 (30 minutes). Set to 0 to disable.
consumer_timeout = 1800000

# -----------------------------------------------------------------------------
# Quorum Queue Defaults
# -----------------------------------------------------------------------------

# Default replication factor for quorum queues (should match cluster size)
# quorum_queue.default_initial_group_size = 3

# Raft WAL max batch size (bytes)
# raft.wal_max_batch_size = 4096

# -----------------------------------------------------------------------------
# Management Plugin
# -----------------------------------------------------------------------------

# Load definitions on boot (exchanges, queues, users, policies, etc.)
management.load_definitions = /etc/rabbitmq/definitions.json

# Rate mode for message statistics (basic or detailed)
management.rates_mode = basic

# CORS (uncomment if management UI is accessed from a different origin)
# management.cors.allow_origins.1 = https://dashboard.example.com

# Sample retention policies for management statistics
management.sample_retention_policies.global.minute = 5
management.sample_retention_policies.global.hour = 60
management.sample_retention_policies.global.day = 1200

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------

# Log level: debug, info, warning, error, critical, none
log.console = true
log.console.level = info

# File logging
log.file = /var/log/rabbitmq/rabbit.log
log.file.level = info
log.file.rotation.date = $D0
log.file.rotation.count = 7
log.file.rotation.size = 104857600

# Connection lifecycle logging (useful for debugging connection churn)
# log.connection.level = info

# -----------------------------------------------------------------------------
# Heartbeat
# -----------------------------------------------------------------------------

# Server-suggested heartbeat interval in seconds
# Clients can negotiate a different value
heartbeat = 60

# -----------------------------------------------------------------------------
# Message Store
# -----------------------------------------------------------------------------

# Max message size (default 128MB in 4.0, was 16MB)
max_message_size = 16777216

# Credits-based flow control (default values shown)
# credit_flow_default_credit.initial = 400
# credit_flow_default_credit.more = 200

# -----------------------------------------------------------------------------
# Background GC
# -----------------------------------------------------------------------------

# Interval between background GC runs (ms)
# background_gc_target_interval = 60000

# -----------------------------------------------------------------------------
# Collect Statistics Interval
# -----------------------------------------------------------------------------

# How often to emit statistics events (ms)
collect_statistics_interval = 5000
