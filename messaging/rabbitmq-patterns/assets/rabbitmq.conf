## Production RabbitMQ Configuration
## See: https://www.rabbitmq.com/docs/configure

# ─── Networking ───
listeners.tcp.default = 5672
# listeners.ssl.default = 5671
management.tcp.port = 15672

# Heartbeat interval (seconds) — detect dead connections
heartbeat = 60

# Max channels per connection
channel_max = 2047

# Max frame size (bytes)
frame_max = 131072

# ─── TLS (uncomment to enable) ───
# listeners.tcp = none
# listeners.ssl.default = 5671
# ssl_options.cacertfile = /etc/rabbitmq/ssl/ca.pem
# ssl_options.certfile   = /etc/rabbitmq/ssl/server.pem
# ssl_options.keyfile    = /etc/rabbitmq/ssl/server-key.pem
# ssl_options.verify     = verify_peer
# ssl_options.fail_if_no_peer_cert = true
# ssl_options.versions.1 = tlsv1.3
# ssl_options.versions.2 = tlsv1.2
# ssl_options.honor_cipher_order = true
# ssl_options.honor_ecc_order    = true

# Management UI TLS (uncomment to enable)
# management.ssl.port       = 15671
# management.ssl.cacertfile = /etc/rabbitmq/ssl/ca.pem
# management.ssl.certfile   = /etc/rabbitmq/ssl/server.pem
# management.ssl.keyfile    = /etc/rabbitmq/ssl/server-key.pem

# ─── Resource Limits ───

# Memory watermark — publishers block when memory exceeds this fraction of total RAM
vm_memory_high_watermark.relative = 0.6
# Or absolute: vm_memory_high_watermark.absolute = 4GB

# Paging ratio — start paging messages to disk at this fraction of watermark
vm_memory_high_watermark_paging_ratio = 0.75

# Disk free limit — publishers block when free disk drops below this
disk_free_limit.relative = 1.5
# Or absolute: disk_free_limit.absolute = 5GB

# ─── Default Vhost and User ───
default_vhost = /production
default_user = admin
default_pass = CHANGE_ME_IN_PRODUCTION
default_user_tags.administrator = true
default_permissions.configure = .*
default_permissions.read = .*
default_permissions.write = .*

# ─── Clustering ───
cluster_partition_handling = pause_minority
queue_leader_locator = balanced

# Peer discovery (uncomment one backend)
# cluster_formation.peer_discovery_backend = classic_config
# cluster_formation.classic_config.nodes.1 = rabbit@rabbit1
# cluster_formation.classic_config.nodes.2 = rabbit@rabbit2
# cluster_formation.classic_config.nodes.3 = rabbit@rabbit3

# cluster_formation.peer_discovery_backend = dns
# cluster_formation.dns.hostname = rabbitmq.service.consul

# cluster_formation.peer_discovery_backend = k8s
# cluster_formation.k8s.host = kubernetes.default.svc.cluster.local
# cluster_formation.k8s.address_type = hostname
# cluster_formation.k8s.service_name = rabbitmq-headless

# ─── Queue Defaults ───
# Consumer timeout — auto-close consumers that don't ack within this time (ms)
consumer_timeout = 1800000

# ─── Management Plugin ───
management.rates_mode = basic
# Disable detailed per-object stats to reduce overhead on busy clusters:
# management.rates_mode = none

# Load definitions on startup (exchanges, queues, bindings, users, policies)
# management.load_definitions = /etc/rabbitmq/definitions.json

# ─── Prometheus Plugin ───
# prometheus.return_per_object_metrics = true
# prometheus.path = /metrics

# ─── Logging ───
log.console = true
log.console.level = info

log.file = /var/log/rabbitmq/rabbit.log
log.file.level = info
log.file.rotation.date = $D0
log.file.rotation.size = 104857600
log.file.rotation.count = 7

# Per-category log levels
# log.connection.level = warning
# log.channel.level = warning
# log.queue.level = info
# log.federation.level = info
# log.shovel.level = info

# ─── Background GC ───
# background_gc_enabled = true
# background_gc_target_interval = 60000

# ─── Erlang VM Tuning ───
# Increase for high connection/channel counts:
# RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS = +P 1048576 +Q 1048576
