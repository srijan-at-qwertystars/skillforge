# =============================================================================
# Apache Kafka Producer Configuration
# =============================================================================
# Optimized producer configuration template with detailed explanations.
# Tune these values based on your throughput, latency, and durability needs.
#
# Reference: https://kafka.apache.org/documentation/#producerconfigs
# =============================================================================


# =============================================================================
# CONNECTION
# =============================================================================

# Comma-separated list of broker addresses for initial cluster discovery.
# The producer will discover all brokers from any single bootstrap server,
# so you don't need to list every broker—but list at least 2-3 for resilience.
bootstrap.servers=localhost:9092

# Unique identifier for this producer instance. Used in server-side logging,
# metrics, and quotas. Helps with debugging and monitoring.
client.id=my-app-producer


# =============================================================================
# SERIALIZATION
# =============================================================================

# Serializer for message keys. Keys determine partition assignment.
# Common options:
#   org.apache.kafka.common.serialization.StringSerializer    (UTF-8 strings)
#   org.apache.kafka.common.serialization.LongSerializer      (64-bit integers)
#   org.apache.kafka.common.serialization.ByteArraySerializer (raw bytes)
key.serializer=org.apache.kafka.common.serialization.StringSerializer

# Serializer for message values. Choose based on your data format.
value.serializer=org.apache.kafka.common.serialization.StringSerializer

# --- Schema Registry Integration (uncomment for Avro/Protobuf/JSON Schema) ---
# When using Schema Registry, schemas are registered and validated automatically,
# enabling schema evolution with backward/forward compatibility guarantees.
#
# key.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
# value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
# schema.registry.url=http://localhost:8081
#
# Auto-register schemas (disable in production for tighter governance):
# auto.register.schemas=true
# Use the latest schema version for serialization:
# use.latest.version=false


# =============================================================================
# RELIABILITY & DURABILITY
# =============================================================================

# Number of broker acknowledgments required before considering a request complete.
#   acks=0   : No acknowledgment (fire-and-forget). Highest throughput, risk of data loss.
#   acks=1   : Leader acknowledgment only. Data could be lost if leader crashes
#              before replication.
#   acks=all : (Recommended) All in-sync replicas must acknowledge. Strongest
#              durability guarantee. Combined with min.insync.replicas=2 on the
#              broker, this ensures no data loss even if a broker fails.
acks=all

# Enable idempotent producer to guarantee exactly-once delivery semantics
# (per partition). The broker deduplicates messages using a producer ID and
# sequence number, preventing duplicates caused by retries.
# Requires: acks=all, retries > 0, max.in.flight.requests.per.connection <= 5.
enable.idempotence=true

# Maximum number of retry attempts for a failed send. With idempotence enabled,
# retries are safe (no duplicates). Set high to handle transient failures.
# The producer will retry until delivery.timeout.ms is exceeded.
retries=2147483647

# Upper bound on the total time to send a message, including retries and
# batching delays. If the message isn't delivered within this window,
# the send() callback receives a TimeoutException.
# Default: 120000 (2 minutes). Increase for unreliable networks.
delivery.timeout.ms=120000

# Maximum time to wait for a response from the broker for a single request.
# If exceeded, the producer retries (if retries remain). Should be less than
# delivery.timeout.ms to allow room for retries.
request.timeout.ms=30000

# Maximum number of unacknowledged requests the producer will send per connection
# before blocking. With idempotence enabled, the broker guarantees ordering even
# with up to 5 in-flight requests by tracking sequence numbers.
#   - Setting this to 1 guarantees strict ordering but severely limits throughput.
#   - Values 2-5 are safe with idempotence and provide good throughput.
#   - Values > 5 disable idempotence.
max.in.flight.requests.per.connection=5


# =============================================================================
# PERFORMANCE & BATCHING
# =============================================================================

# Maximum size (in bytes) of a single message batch sent to a partition.
# Larger batches improve throughput via amortized overhead but increase latency.
# The producer accumulates messages until batch.size is reached OR linger.ms
# elapses, whichever comes first.
#   Default:  16384 (16 KB)
#   Tuned:    65536 (64 KB) — good for higher throughput workloads
#   High:   131072 (128 KB) — for very high volume producers
batch.size=65536

# Time (in ms) the producer waits for additional messages before sending a batch.
# Introduces a small delay to accumulate more messages per batch.
#   0  : Send immediately (lowest latency, lower throughput)
#   5  : Good balance between latency and throughput
#   50+: High throughput, higher latency (use for analytics/logging pipelines)
linger.ms=5

# Compression algorithm applied to each batch before sending.
#   none   : No compression. Use when CPU is the bottleneck.
#   gzip   : Best compression ratio (~70-80% reduction). High CPU cost.
#            Good for slow networks or storage-constrained environments.
#   snappy : Low CPU overhead, moderate compression (~50%). Good general choice.
#   lz4    : (Recommended) Very fast compression/decompression with good ratio
#            (~55-60%). Best balance of CPU and network savings.
#   zstd   : Excellent compression ratio (~65-75%) with reasonable CPU.
#            Good for large messages. Requires Kafka 2.1+.
compression.type=lz4

# Total memory (in bytes) available for buffering unsent messages across all
# partitions. When the buffer is full, the producer blocks send() calls for
# up to max.block.ms before throwing a BufferExhaustedException.
# This acts as a backpressure mechanism: if the producer generates messages
# faster than they can be sent, the buffer fills up and slows down the producer.
#   Default: 33554432 (32 MB)
# Increase for high-throughput producers or bursty workloads.
buffer.memory=33554432

# Maximum time (in ms) that send() and partitionsFor() will block when the
# buffer is full or metadata is unavailable. After this timeout, a
# TimeoutException is thrown. Set high enough to ride out transient issues
# but low enough to fail fast if the cluster is truly unavailable.
max.block.ms=60000


# =============================================================================
# TRANSACTIONS (Exactly-Once Semantics across partitions/topics)
# =============================================================================

# Uncomment to enable transactional producer for exactly-once semantics (EOS)
# across multiple partitions and topics. Each transactional producer must have
# a unique transactional.id that persists across restarts (for fencing zombies).
# Use when you need atomic writes across multiple topics/partitions, or when
# implementing the read-process-write pattern with consumer offsets committed
# within the transaction.
#
# transactional.id=my-app-transaction-producer-1


# =============================================================================
# INTERCEPTORS
# =============================================================================

# Uncomment to add interceptor classes that hook into the producer lifecycle.
# Interceptors can modify records before sending, capture acknowledgments,
# and gather custom metrics—without modifying producer application code.
# Multiple interceptors are separated by commas and executed in order.
#
# interceptor.classes=com.example.monitoring.ProducerMetricsInterceptor


# =============================================================================
# SECURITY (SASL/SSL)
# =============================================================================
# Uncomment and configure for secure connections. These settings enable
# encryption (SSL/TLS) and authentication (SASL) to the Kafka cluster.

# --- SSL/TLS Encryption ---
# security.protocol=SASL_SSL
#
# ssl.truststore.location=/path/to/truststore.jks
# ssl.truststore.password=truststore-password
#
# # Client certificate authentication (mutual TLS):
# ssl.keystore.location=/path/to/keystore.jks
# ssl.keystore.password=keystore-password
# ssl.key.password=key-password
#
# # TLS version (require TLSv1.2 or higher):
# ssl.enabled.protocols=TLSv1.2,TLSv1.3
# ssl.protocol=TLSv1.3

# --- SASL Authentication ---
# sasl.mechanism=PLAIN
# # For SCRAM (recommended over PLAIN for password-based auth):
# # sasl.mechanism=SCRAM-SHA-512
#
# sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
#   username="producer-user" \
#   password="producer-password";
