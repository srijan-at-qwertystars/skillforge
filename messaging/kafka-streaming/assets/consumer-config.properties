# =============================================================================
# Apache Kafka Consumer Configuration
# =============================================================================
# Optimized consumer configuration template with detailed explanations.
# Tune these values based on your processing model, latency, and throughput needs.
#
# Reference: https://kafka.apache.org/documentation/#consumerconfigs
# =============================================================================


# =============================================================================
# CONNECTION
# =============================================================================

# Comma-separated list of broker addresses for initial cluster discovery.
# List at least 2-3 brokers for resilience against individual broker failures.
bootstrap.servers=localhost:9092

# Unique identifier for this consumer instance. Used in server-side logging,
# metrics, and quota enforcement. Include the group and instance info for
# easier debugging (e.g., "order-service-consumer-1").
client.id=my-app-consumer


# =============================================================================
# SERIALIZATION
# =============================================================================

# Deserializer for message keys.
# Must match the serializer used by the producer.
# Common options:
#   org.apache.kafka.common.serialization.StringDeserializer    (UTF-8 strings)
#   org.apache.kafka.common.serialization.LongDeserializer      (64-bit integers)
#   org.apache.kafka.common.serialization.ByteArrayDeserializer (raw bytes)
key.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Deserializer for message values.
value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# --- Schema Registry Integration (uncomment for Avro/Protobuf/JSON Schema) ---
# When using Schema Registry, the deserializer automatically resolves schemas
# and handles schema evolution, so consumers can read data written with
# older or newer (compatible) schema versions.
#
# key.deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
# value.deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
# schema.registry.url=http://localhost:8081
#
# Return specific Avro type instead of GenericRecord:
# specific.avro.reader=true


# =============================================================================
# GROUP MANAGEMENT
# =============================================================================

# Consumer group ID. All consumers sharing the same group.id form a consumer
# group and cooperatively consume partitions. Each partition is assigned to
# exactly one consumer in the group. Choose a descriptive name that reflects
# the consuming application/service.
group.id=my-consumer-group

# Static group membership (uncomment to enable).
# Assigns a persistent identity to this consumer instance. When a consumer
# with a static ID restarts within session.timeout.ms, it reclaims its
# previous partition assignments WITHOUT triggering a full group rebalance.
# Benefits:
#   - Eliminates unnecessary rebalances during rolling deployments
#   - Reduces rebalance storms in large consumer groups
#   - Faster recovery after transient failures
# Each instance in the group MUST have a unique group.instance.id.
#
# group.instance.id=my-app-consumer-instance-1

# Partition assignment strategy. Determines how partitions are distributed
# among consumers in the group.
#   RangeAssignor              : Assigns contiguous partition ranges per topic.
#                                Can cause imbalance across topics.
#   RoundRobinAssignor         : Distributes partitions evenly across consumers
#                                in a round-robin fashion.
#   StickyAssignor             : Minimizes partition movement during rebalances
#                                to preserve consumer affinity (e.g., local caches).
#   CooperativeStickyAssignor  : (Recommended) Same as StickyAssignor but uses
#                                incremental cooperative rebalancing. Only revokes
#                                partitions that need to move, so consumers keep
#                                processing unaffected partitions during rebalance.
partition.assignment.strategy=org.apache.kafka.clients.consumer.CooperativeStickyAssignor


# =============================================================================
# OFFSET MANAGEMENT
# =============================================================================

# What to do when there is no committed offset for the consumer group
# (first time consuming) or when the committed offset is out of range.
#   earliest : Start from the beginning of the topic (process all historical data).
#   latest   : Start from the end (only process new messages arriving after joining).
#   none     : Throw an exception if no committed offset exists (fail-safe mode).
# Use "earliest" for data processing pipelines; "latest" for real-time consumers
# that can tolerate missing historical data.
auto.offset.reset=earliest

# Whether to automatically commit offsets in the background.
#   true  : Offsets are committed periodically (at auto.commit.interval.ms).
#           Simple but risks data loss (offsets committed before processing
#           completes) or duplicates (crash between process and commit).
#   false : (Recommended) Application controls when offsets are committed.
#           Use commitSync() after processing for at-least-once semantics, or
#           commit within a transaction for exactly-once semantics.
enable.auto.commit=false

# Interval (in ms) between automatic offset commits when enable.auto.commit=true.
# Lower values reduce the window for duplicates after a crash but increase
# broker load. Irrelevant when enable.auto.commit=false.
#
# auto.commit.interval.ms=5000


# =============================================================================
# POLLING & PROCESSING
# =============================================================================

# Maximum number of records returned per poll() call. Controls the batch size
# for processing. Tune based on your processing speed:
#   Low  (100)  : For slow/complex per-record processing (e.g., DB writes, API calls)
#   Med  (500)  : Good default for most workloads
#   High (1000+): For fast processing or micro-batch workloads (e.g., in-memory aggregations)
# If processing takes too long relative to max.poll.interval.ms, reduce this value.
max.poll.records=500

# Maximum delay (in ms) between poll() invocations before the consumer is
# considered dead and evicted from the group (triggering a rebalance).
# This is the "processing time budget" per batch of records.
# If your processing (per poll batch) takes longer than this, the consumer
# will be kicked from the group. Set this higher than your worst-case
# processing time, including retries and backoff.
#   Default:  300000 (5 minutes)
#   Increase for long-running batch processing or slow external service calls.
max.poll.interval.ms=300000

# Session timeout: maximum time (in ms) between heartbeats before the broker
# considers the consumer dead. The consumer sends heartbeats on a background
# thread independently of poll().
#   Lower values  : Faster failure detection but more spurious rebalances
#                   (e.g., during GC pauses or network blips).
#   Higher values : More tolerant of transient issues but slower failure detection.
#   Broker constraint: must be between group.min.session.timeout.ms and
#                      group.max.session.timeout.ms (broker-side configs).
session.timeout.ms=45000

# Heartbeat interval: time (in ms) between heartbeats sent to the group
# coordinator. Must be less than session.timeout.ms.
# Rule of thumb: set to 1/3 of session.timeout.ms or lower to ensure the
# broker receives enough heartbeats within the session timeout window.
#   session.timeout.ms=45000 → heartbeat.interval.ms=15000 (safe)
#   Using 3000 here for faster liveness detection while keeping a generous
#   session timeout.
heartbeat.interval.ms=3000


# =============================================================================
# FETCH TUNING
# =============================================================================

# Minimum amount of data (in bytes) the broker should return for a fetch request.
# The broker will wait until this much data is available (or fetch.max.wait.ms
# elapses) before responding. Higher values improve throughput by reducing
# the number of fetch requests, at the cost of increased latency.
#   1     : Respond as soon as any data is available (lowest latency)
#   1024+ : Wait for at least 1 KB to accumulate (better throughput)
fetch.min.bytes=1

# Maximum time (in ms) the broker will block a fetch request when there is
# insufficient data to satisfy fetch.min.bytes. Works with fetch.min.bytes
# to balance latency vs. throughput.
#   Low  (100ms) : Lower latency, more frequent (possibly empty) responses
#   High (500ms) : Better batching, fewer requests, higher latency
fetch.max.wait.ms=500

# Maximum amount of data (in bytes) returned per partition per fetch request.
# Controls memory consumption. If a single message exceeds this limit, the
# message is still returned (so the consumer can always make progress).
# Total memory per fetch ≈ max.partition.fetch.bytes × number_of_partitions.
#   Default: 1048576 (1 MB)
max.partition.fetch.bytes=1048576

# Maximum amount of data (in bytes) the broker returns across ALL partitions
# per fetch request. An upper bound on total fetch response size.
#   Default: 52428800 (50 MB)
# fetch.max.bytes=52428800


# =============================================================================
# EXACTLY-ONCE SEMANTICS (EOS)
# =============================================================================

# Controls which messages are visible to the consumer.
#   read_uncommitted : (Default) Reads all messages, including those in
#                      open (uncommitted) transactions. Faster, but may read
#                      data that is later aborted.
#   read_committed   : (Recommended for EOS) Only reads messages from committed
#                      transactions. Non-transactional messages are read normally.
#                      Required when consuming from topics written by a
#                      transactional producer to guarantee exactly-once semantics.
isolation.level=read_committed


# =============================================================================
# INTERCEPTORS
# =============================================================================

# Uncomment to add interceptor classes that hook into the consumer lifecycle.
# Interceptors can inspect/modify records after fetching and capture commit
# callbacks—useful for custom metrics, tracing, or audit logging without
# modifying consumer application code.
#
# interceptor.classes=com.example.monitoring.ConsumerMetricsInterceptor


# =============================================================================
# SECURITY (SASL/SSL)
# =============================================================================
# Uncomment and configure for secure connections. These settings must match
# the broker's security configuration.

# --- SSL/TLS Encryption ---
# security.protocol=SASL_SSL
#
# ssl.truststore.location=/path/to/truststore.jks
# ssl.truststore.password=truststore-password
#
# # Client certificate authentication (mutual TLS):
# ssl.keystore.location=/path/to/keystore.jks
# ssl.keystore.password=keystore-password
# ssl.key.password=key-password
#
# # TLS version (require TLSv1.2 or higher):
# ssl.enabled.protocols=TLSv1.2,TLSv1.3
# ssl.protocol=TLSv1.3

# --- SASL Authentication ---
# sasl.mechanism=PLAIN
# # For SCRAM (recommended over PLAIN for password-based auth):
# # sasl.mechanism=SCRAM-SHA-512
#
# sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
#   username="consumer-user" \
#   password="consumer-password";
