# =============================================================================
# Valkey / Redis Production Configuration
# =============================================================================
# Compatible with Valkey 7.x/8.x and Redis 6.x/7.x
# Rename to valkey.conf or redis.conf as appropriate.
# Annotated with rationale for each production setting.
# =============================================================================

# --- Network ---

# Bind to specific interfaces. Use 0.0.0.0 only behind firewall/VPN.
bind 127.0.0.1 -::1
# bind 0.0.0.0                       # uncomment for network access

# Default port
port 6379

# TLS port (uncomment to enable TLS, set port 0 to disable plaintext)
# tls-port 6380
# port 0
# tls-cert-file /etc/valkey/tls/server.crt
# tls-key-file /etc/valkey/tls/server.key
# tls-ca-cert-file /etc/valkey/tls/ca.crt
# tls-auth-clients optional

# Reject unauthenticated external connections
protected-mode yes

# TCP backlog — increase for high-connection environments
# Must be ≤ net.core.somaxconn (sysctl)
tcp-backlog 511

# Close idle client connections after N seconds (0 = disabled)
timeout 300

# TCP keepalive — detect dead peers (recommended: 60)
tcp-keepalive 60

# --- General ---

# Run as daemon (set "no" for systemd/containers)
daemonize no

# Supervised mode: systemd, upstart, auto, or no
supervised auto

# PID file (used with daemonize yes)
pidfile /var/run/valkey/valkey-server.pid

# Log level: debug, verbose, notice, warning
loglevel notice

# Log file (empty string = stdout, good for containers)
logfile ""
# logfile /var/log/valkey/valkey-server.log

# Number of databases (default 16, reduce if not needed)
databases 16

# Show ASCII art logo on startup
always-show-logo no

# --- Snapshotting (RDB) ---
# Save if at least N keys changed in M seconds
# Comment out all save lines to disable RDB entirely for pure cache
save 900 1
save 300 10
save 60 10000

# Stop accepting writes if RDB save fails (safety net)
stop-writes-on-bgsave-error yes

# Compress RDB with LZF (small CPU cost, significant size reduction)
rdbcompression yes

# RDB checksum for corruption detection
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Remove RDB files used by replication when no longer needed
rdb-del-sync-files no

# Working directory — all files are written here
dir /var/lib/valkey

# --- Replication ---

# Make this instance a replica of another
# replicaof <masterip> <masterport>

# Master authentication
# masterauth <password>

# Serve stale data while syncing with master (yes = available during sync)
replica-serve-stale-data yes

# Replicas are read-only by default
replica-read-only yes

# Diskless replication (faster when disk is slow, network is fast)
repl-diskless-sync yes
repl-diskless-sync-delay 5

# Replication backlog size — larger = more tolerance for replica disconnects
repl-backlog-size 64mb

# Release backlog after N seconds with no replicas connected
repl-backlog-ttl 3600

# Replica priority for Sentinel promotion (lower = higher priority, 0 = never promote)
replica-priority 100

# Require minimum replicas for writes (split-brain protection)
# min-replicas-to-write 1
# min-replicas-max-lag 10

# --- Security ---

# Password (legacy — prefer ACLs below)
# requirepass YourStrongPasswordHere

# ACL file for user management
# aclfile /etc/valkey/users.acl

# ACL rules inline (alternative to aclfile)
# user default on >password ~* &* +@all
# user app-readonly on >readonlypass ~cache:* &* +@read
# user app-writer on >writerpass ~* &* +@all -@dangerous

# Rename dangerous commands (legacy approach — prefer ACLs)
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command DEBUG ""
# rename-command CONFIG ""

# --- Clients ---

# Maximum simultaneous client connections
maxclients 10000

# --- Memory Management ---

# Maximum memory limit — SET THIS IN PRODUCTION
# Use 75% of available RAM, leave rest for OS + fork operations
maxmemory 4gb

# Eviction policy when maxmemory is reached
# allkeys-lru   — best for general caching (recommended)
# allkeys-lfu   — better for skewed access patterns
# volatile-lru  — only evict keys with TTL set
# volatile-ttl  — evict soonest-expiring
# noeviction    — return errors (for queues/persistent data)
maxmemory-policy allkeys-lru

# LRU/LFU sampling precision (higher = more accurate, slightly slower)
maxmemory-samples 10

# --- Lazy Freeing ---
# Async deletion prevents blocking on large key operations
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
replica-lazy-flush yes

# --- Append Only File (AOF) ---

# Enable AOF persistence
appendonly yes

# AOF filename (Valkey 7+ uses directory-based multi-part AOF)
appendfilename "appendonly.aof"
appenddirname "appendonlydir"

# fsync policy:
#   always    — safest, slowest (fsync every write)
#   everysec  — recommended balance (fsync every second)
#   no        — OS decides (fastest, least safe)
appendfsync everysec

# Don't fsync during AOF rewrite (improves rewrite performance, slight risk)
no-appendfsync-on-rewrite no

# Trigger AOF rewrite when AOF grows by this percentage
auto-aof-rewrite-percentage 100

# Minimum AOF size to trigger rewrite
auto-aof-rewrite-min-size 64mb

# Load truncated AOF on startup (yes = recover what we can)
aof-load-truncated yes

# Hybrid persistence: RDB preamble + AOF tail (recommended)
aof-use-rdb-preamble yes

# AOF timestamps for point-in-time recovery (Valkey 7+)
aof-timestamp-enabled no

# --- Lua Scripting ---

# Maximum execution time for Lua scripts (ms)
# Scripts running longer trigger BUSY error
lua-time-limit 5000

# --- Cluster ---
# Uncomment to enable cluster mode

# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000
# cluster-announce-ip 10.0.0.1
# cluster-announce-port 6379
# cluster-announce-bus-port 16379

# Allow reads on replicas even when cluster is in degraded state
# cluster-allow-reads-when-down yes

# --- Slow Log ---

# Log queries slower than this (microseconds, 10000 = 10ms)
slowlog-log-slower-than 10000

# Maximum entries in slow log
slowlog-max-len 128

# --- Latency Monitor ---

# Log events taking longer than this (ms, 0 = disabled)
latency-monitor-threshold 5

# --- Notifications ---
# Keyspace notifications (empty = disabled)
# K = keyspace events, E = keyevent events
# g = generic commands, $ = string, l = list, s = set, h = hash, z = sorted set
# x = expired events, e = evicted events, A = all
# Example: KEA = all events
notify-keyspace-events ""

# --- Advanced ---

# Ziplist encoding thresholds (memory optimization for small hashes/lists)
hash-max-ziplist-entries 128
hash-max-ziplist-value 64

list-max-ziplist-size -2
list-compress-depth 0

set-max-intset-entries 512
set-max-listpack-entries 128

zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog sparse encoding threshold
hll-sparse-max-bytes 3000

# Stream node max bytes and entries
stream-node-max-bytes 4096
stream-node-max-entries 100

# Rehashing: use CPU idle time for incremental rehashing
activerehashing yes

# Client output buffer limits
# <class> <hard limit> <soft limit> <soft seconds>
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 512mb 128mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Server frequency (Hz) — higher = more responsive but more CPU
# Default 10, increase for low-latency workloads
hz 10
dynamic-hz yes

# --- I/O Threads (Valkey 8+ / Redis 6+) ---
# Enable for multi-core throughput improvement on network-bound workloads
# Set to number of available cores minus 1 (main thread)

# io-threads 4
# io-threads-do-reads yes

# --- jemalloc ---
# Enable background thread for memory management
jemalloc-bg-thread yes
