# Production Redis Configuration — Redis 7.x
# Tuned for a production cache/data-store workload
# Review and adjust values for your specific deployment

################################## NETWORK ##################################

bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 2048
timeout 300
tcp-keepalive 300

################################## GENERAL ##################################

daemonize no
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile /var/log/redis/redis-server.log
databases 16

################################ PERFORMANCE ################################

hz 10
dynamic-hz yes
io-threads 4
io-threads-do-reads yes

################################## SECURITY ##################################

# Require authentication (set a strong password or use ACLs)
# requirepass <your-strong-password-here>

# ACL file for fine-grained access control
# aclfile /etc/redis/users.acl

# ACL default user (disable for production — force named users)
# user default off

# Example ACL users (uncomment and customize):
# user app-readonly on >readonly-password ~cache:* ~session:* +@read +ping +info -@dangerous
# user app-readwrite on >readwrite-password ~app:* +@read +@write +@set +@sortedset +@hash +@list +@stream +ping +info -@dangerous -@admin
# user admin on >admin-password ~* &* +@all

# Rename dangerous commands (alternative to ACLs for older setups)
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command DEBUG ""

################################# TLS/SSL ###################################

# Uncomment to enable TLS
# tls-port 6380
# port 0
# tls-cert-file /etc/redis/tls/redis.crt
# tls-key-file /etc/redis/tls/redis.key
# tls-ca-cert-file /etc/redis/tls/ca.crt
# tls-auth-clients optional
# tls-protocols "TLSv1.2 TLSv1.3"
# tls-replication yes
# tls-cluster yes

################################# MEMORY ####################################

maxmemory 4gb
maxmemory-policy allkeys-lfu
maxmemory-samples 10

# Lazy free (async deletion — reduces latency on large key operations)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

################################ PERSISTENCE ################################

# RDB snapshots
save 3600 1
save 300 100
save 60 10000

dbfilename dump.rdb
dir /data
rdbcompression yes
rdbchecksum yes
stop-writes-on-bgsave-error yes

# AOF
appendonly yes
appendfilename "appendonly.aof"
appenddirname "appendonlydir"
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes
aof-timestamp-enabled no

################################ REPLICATION ################################

# replicaof <primary-ip> <primary-port>
# masterauth <primary-password>

replica-serve-stale-data yes
replica-read-only yes
replica-lazy-flush yes
repl-diskless-sync yes
repl-diskless-sync-delay 5
repl-backlog-size 256mb
repl-backlog-ttl 3600

# Prevent split-brain: require at least 1 replica for writes
# min-replicas-to-write 1
# min-replicas-max-lag 10

################################### CLIENTS ##################################

maxclients 10000

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 512mb 128mb 120
client-output-buffer-limit pubsub 64mb 16mb 120

######################## ENCODING / MEMORY OPTIMIZATION ######################

hash-max-listpack-entries 128
hash-max-listpack-value 64
list-max-listpack-size -2
list-compress-depth 0
set-max-intset-entries 512
set-max-listpack-entries 128
zset-max-listpack-entries 128
zset-max-listpack-value 64

stream-node-max-bytes 4096
stream-node-max-entries 100

############################# SLOW LOG #######################################

slowlog-log-slower-than 10000
slowlog-max-len 256

######################### LATENCY MONITORING #################################

latency-monitor-threshold 50

####################### ACTIVE DEFRAGMENTATION ################################

activedefrag yes
active-defrag-enabled yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-cycle-min 1
active-defrag-cycle-max 25
active-defrag-max-scan-fields 1000

########################### CLUSTER (if used) #################################

# Uncomment for cluster mode:
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 15000
# cluster-announce-ip <external-ip>
# cluster-announce-port 6379
# cluster-announce-bus-port 16379
# cluster-require-full-coverage yes
# cluster-allow-reads-when-down no
