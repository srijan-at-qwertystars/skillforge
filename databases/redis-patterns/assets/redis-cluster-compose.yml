# 6-node Redis Cluster: 3 primaries + 3 replicas
# Usage:
#   docker compose -f redis-cluster-compose.yml up -d
#   # Wait a few seconds, then create the cluster:
#   docker exec redis-node-1 redis-cli --cluster create \
#     redis-node-1:7001 redis-node-2:7002 redis-node-3:7003 \
#     redis-node-4:7004 redis-node-5:7005 redis-node-6:7006 \
#     --cluster-replicas 1 --cluster-yes
#
# Ports: 7001-7006 (Redis), 17001-17006 (cluster bus)
# Test:  redis-cli -c -p 7001 CLUSTER INFO

x-redis-node: &redis-node
  image: redis:7-alpine
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "redis-cli", "-p", "${REDIS_PORT:-7001}", "ping"]
    interval: 5s
    timeout: 3s
    retries: 5

services:
  redis-node-1:
    <<: *redis-node
    container_name: redis-node-1
    ports:
      - "7001:7001"
      - "17001:17001"
    volumes:
      - node1-data:/data
    command: >
      redis-server
        --port 7001
        --cluster-enabled yes
        --cluster-config-file nodes.conf
        --cluster-node-timeout 5000
        --cluster-announce-ip redis-node-1
        --cluster-announce-port 7001
        --cluster-announce-bus-port 17001
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lfu
        --protected-mode no
        --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7001", "ping"]

  redis-node-2:
