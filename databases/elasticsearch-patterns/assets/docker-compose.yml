# Elasticsearch 8.x Development Environment
# Usage: docker compose up -d
# ES: http://localhost:9200  |  Kibana: http://localhost:5601
# Security DISABLED for local development — do NOT use in production.

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION:-8.15.0}
    container_name: es-dev
    environment:
      - discovery.type=single-node
      - cluster.name=es-dev-cluster
      - node.name=dev-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - action.destructive_requires_name=false
      # Uncomment for ML features:
      # - xpack.ml.enabled=true
    ports:
      - "${ES_PORT:-9200}:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - elastic
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    ulimits:
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          memory: 2g

  kibana:
    image: docker.elastic.co/kibana/kibana:${ES_VERSION:-8.15.0}
    container_name: kibana-dev
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - xpack.encryptedSavedObjects.encryptionKey=dev-only-encryption-key-32ch
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    networks:
      - elastic
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status | grep -q 'overall' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Uncomment to add Logstash
  # logstash:
  #   image: docker.elastic.co/logstash/logstash:${ES_VERSION:-8.15.0}
  #   container_name: logstash-dev
  #   environment:
  #     - xpack.monitoring.enabled=false
  #   volumes:
  #     - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
  #   ports:
  #     - "5044:5044"    # Beats input
  #     - "5000:5000"    # TCP input
  #     - "9600:9600"    # Monitoring API
  #   networks:
  #     - elastic
  #   depends_on:
  #     elasticsearch:
  #       condition: service_healthy

volumes:
  es-data:
    driver: local

networks:
  elastic:
    driver: bridge
