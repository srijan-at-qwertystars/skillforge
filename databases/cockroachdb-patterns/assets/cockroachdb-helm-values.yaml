# CockroachDB Helm Values for Kubernetes Deployment
#
# Usage:
#   helm repo add cockroachdb https://charts.cockroachdb.com/
#   helm repo update
#   helm install crdb cockroachdb/cockroachdb -f cockroachdb-helm-values.yaml
#
# Prerequisites:
#   - Kubernetes 1.24+
#   - Helm 3.x
#   - kubectl configured for your cluster
#   - StorageClass available for persistent volumes

# -- Number of CockroachDB nodes
statefulset:
  replicas: 3

# -- CockroachDB image
image:
  repository: cockroachdb/cockroach
  tag: latest
  pullPolicy: IfNotPresent

# -- Resource allocation per node
resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "4"
    memory: "8Gi"

# -- Persistent storage configuration
storage:
  persistentVolume:
    enabled: true
    size: 100Gi
    storageClass: ""  # Use default StorageClass; set to "gp3", "pd-ssd", etc.

# -- CockroachDB configuration
conf:
  # Memory allocation: 25% for cache, 25% for SQL
  cache: "25%"
  max-sql-memory: "25%"
  # Maximum clock offset between nodes
  max-offset: 500ms
  # Join addresses (automatically configured for StatefulSet)
  join: []
  # Locality flags (set per-node via topologySpreadConstraints or nodeAffinity)
  locality: ""
  # Single-region mode (set to false for multi-region)
  single-node: false
  # Log configuration
  logtostderr: INFO

# -- TLS configuration
tls:
  enabled: true
  # Use cert-manager for automatic certificate management
  certs:
    provided: false
    # If using cert-manager:
    certManager: true
    certManagerIssuer:
      group: cert-manager.io
      kind: Issuer
      name: cockroachdb-ca-issuer
    # If providing your own certs:
    # clientRootSecret: cockroachdb-root
    # nodeSecret: cockroachdb-node
    # tlsSecret: false

# -- Cluster initialization
init:
  # Automatically initialize the cluster
  provisioning:
    enabled: true
    databases:
      - name: appdb
    users:
      - name: app_user
        options:
          - "LOGIN"
    # Run SQL after initialization
    # postInitSQL:
    #   - "ALTER DATABASE appdb PRIMARY REGION 'us-east1';"

# -- Service configuration
service:
  ports:
    grpc:
      external:
        port: 26257
      internal:
        port: 26257
    http:
      port: 8080
  public:
    type: ClusterIP
    annotations: {}
    # For external access:
    # type: LoadBalancer
    # annotations:
    #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

# -- Topology spread for fault tolerance
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: cockroachdb

# -- Pod anti-affinity (prevent multiple CRDB pods on same node)
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: cockroachdb

# -- Pod disruption budget
budget:
  maxUnavailable: 1

# -- Readiness and liveness probes
healthChecks:
  readiness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6

# -- Monitoring with Prometheus
monitoring:
  enabled: true
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 30s
      labels: {}
      annotations: {}
      # namespace: monitoring

# -- Log collection
logging:
  # Structured JSON logging
  format: json
  # Log to stderr for container log collection
  toStderr: true
  severity: INFO

# -- Node labels for scheduling
nodeSelector: {}
  # node-type: cockroachdb
  # cloud.google.com/gke-nodepool: crdb-pool

# -- Tolerations for dedicated nodes
tolerations: []
  # - key: "dedicated"
  #   operator: "Equal"
  #   value: "cockroachdb"
  #   effect: "NoSchedule"

# -- Network policies
networkPolicy:
  enabled: false
  ingress:
    # Allow SQL connections from application namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: app
      ports:
        - port: 26257
    # Allow admin UI access
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - port: 8080

# -- Backup configuration (requires Enterprise license)
# Configure via SQL after deployment:
#   CREATE SCHEDULE backup_schedule FOR BACKUP INTO 's3://bucket/backups?AUTH=implicit'
#     RECURRING '@daily'
#     FULL BACKUP ALWAYS
#     WITH SCHEDULE OPTIONS first_run = 'now';

# -- Additional labels
labels:
  app.kubernetes.io/part-of: data-platform
  environment: production

# -- Pod annotations
annotations: {}
  # prometheus.io/scrape: "true"
  # prometheus.io/port: "8080"
  # prometheus.io/path: "/_status/vars"
