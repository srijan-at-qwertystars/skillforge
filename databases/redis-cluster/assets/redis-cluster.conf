# =============================================================================
# Redis Cluster Node — Production Configuration Template
# =============================================================================
# This file is designed for a Redis 7.x cluster node running in production.
# Copy it per node and adjust port / announce settings as needed.
#
# Values marked *** CHANGE ME *** must be reviewed before deploying.
# =============================================================================


# =============================================================================
# CLUSTER SETTINGS
# =============================================================================

# Enable Redis Cluster mode. Every node must have this set to "yes".
cluster-enabled yes

# Internal file where this node persists its cluster topology view.
# Each node must use a unique filename if they share the same data directory.
cluster-config-file nodes-6379.conf

# Milliseconds a node must be unreachable before it is considered failing.
# Lower values detect failures faster but increase the risk of false positives.
# Recommended: 5000–15000 ms in production.
cluster-node-timeout 15000

# When set to "yes" (default), the cluster stops accepting writes if any hash
# slot is uncovered (i.e., a master and all its replicas are down).
# Set to "no" to allow partial availability — the cluster continues serving
# requests for the slots that ARE covered.
cluster-require-full-coverage no

# Allow reads from replicas when a master is down, even if the slot is not
# fully covered. Useful for read-heavy workloads that tolerate stale data.
# Requires cluster-require-full-coverage to be "no".
cluster-allow-reads-when-down yes

# Number of replicas that must be reachable for a master migration to happen.
# Default is 1. Set higher if you have many replicas and want conservative
# migration behavior.
cluster-migration-barrier 1

# Allow automatic replica migration between masters to balance replica counts.
# Disable only if you want strict, manual replica placement.
cluster-allow-replica-migration yes


# =============================================================================
# NETWORK
# =============================================================================

# Bind to all interfaces. In production, restrict to specific IPs or use
# firewall rules to limit access.
# *** CHANGE ME *** — e.g., bind 10.0.0.5 127.0.0.1
bind 0.0.0.0

# Port for client connections. Each cluster node needs a unique port if they
# share the same host. The cluster bus port is automatically port + 10000.
port 6379

# Protected mode blocks connections from external IPs when no password is set.
# Since we set a password below, this can remain "yes" as an extra safety net.
protected-mode yes

# Maximum number of pending connections in the TCP listen backlog.
# Raise on high-connection servers; also check the OS net.core.somaxconn.
tcp-backlog 511

# Send TCP keepalive probes to detect dead peers. Value is in seconds.
# 300 is the Redis default; lower values detect failures faster at the cost of
# slightly more network traffic.
tcp-keepalive 300

# Close the connection after a client is idle for this many seconds.
# 0 disables the timeout entirely.
timeout 0


# =============================================================================
# MEMORY
# =============================================================================

# Hard memory cap for this node. Once reached, the eviction policy kicks in.
# Set this to ~70-80% of available physical RAM per node to leave room for
# fragmentation, fork COW pages, and OS overhead.
# *** CHANGE ME ***
maxmemory 1gb

# Eviction policy when maxmemory is reached.
# allkeys-lru  — Evict least-recently-used keys across all keys.
# volatile-lru — Only evict keys with an expiry set (safer if you mix
#                persistent and cache data).
# noeviction   — Return errors on writes when memory is full (safest for
#                data you cannot lose).
maxmemory-policy allkeys-lru

# Lazyfree — offload expensive DEL / FLUSH / eviction work to a background
# thread so the main thread stays responsive.
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
lazyfree-lazy-user-del yes
lazyfree-lazy-user-flush yes

# Number of LRU samples Redis inspects when choosing a key to evict.
# Higher = more accurate eviction but slightly more CPU.
maxmemory-samples 10


# =============================================================================
# PERSISTENCE — AOF (Append Only File)
# =============================================================================
# AOF provides much better durability than RDB alone. We enable AOF with
# RDB-preamble for fast restarts and fine-grained durability.

# Enable AOF.
appendonly yes

# AOF filename (relative to the data directory).
appendfilename "appendonly.aof"

# How often to fsync the AOF file.
# everysec — fsync once per second. Best balance of durability and performance.
# always   — fsync on every write. Maximum durability, lower throughput.
# no       — let the OS flush when it wants. Fastest, least durable.
appendfsync everysec

# During an RDB save or AOF rewrite, the main process may delay fsync to avoid
# disk contention. Set to "yes" to avoid latency spikes at the cost of up to
# ~1 second of data loss if the server crashes during a rewrite.
no-appendfsync-on-rewrite yes

# Trigger an AOF rewrite when the AOF file grows by this percentage compared
# to the size after the last rewrite.
auto-aof-rewrite-percentage 100

# Do not trigger an AOF rewrite if the AOF is smaller than this.
auto-aof-rewrite-min-size 64mb

# Use RDB preamble inside the AOF for faster loading on restart.
# Recommended for Redis 7+.
aof-use-rdb-preamble yes


# =============================================================================
# PERSISTENCE — RDB (Snapshotting)
# =============================================================================
# RDB snapshots provide point-in-time backups. They complement AOF for
# disaster recovery and faster cold starts.

# Save an RDB snapshot when at least N keys changed in the given number of
# seconds. Multiple rules can be combined (first match wins).
save 3600 1
save 300 100
save 60 10000

# Stop accepting writes if the background RDB save fails. This alerts
# operators that persistence is broken.
stop-writes-on-bgsave-error yes

# Compress strings in the RDB file using LZF. Slight CPU cost but
# significantly reduces file size.
rdbcompression yes

# Store a CRC64 checksum at the end of the RDB file. Adds ~10% overhead on
# save/load but catches corruption.
rdbchecksum yes

# RDB filename.
dbfilename dump.rdb

# Directory for RDB and AOF files.
dir /data


# =============================================================================
# SECURITY
# =============================================================================

# Password required for client connections. All cluster nodes MUST share
# the same password for cluster bus authentication.
# *** CHANGE ME *** — use a long random string (≥ 32 characters).
requirepass REPLACE_WITH_STRONG_PASSWORD

# Password used by replicas to authenticate with the master and by cluster
# nodes to authenticate with each other. Must match requirepass.
# *** CHANGE ME ***
masterauth REPLACE_WITH_STRONG_PASSWORD

# Rename or disable dangerous commands in production.
# Uncomment and adjust as needed.
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command DEBUG ""
# rename-command CONFIG "CONFIG_b4f8e2a9"


# =============================================================================
# REPLICATION
# =============================================================================

# A master will stop accepting writes unless at least this many replicas are
# connected and their replication lag is within min-replicas-max-lag seconds.
# Set to 0 to disable this safety (not recommended).
min-replicas-to-write 0

# Maximum acceptable replication lag (in seconds) for a replica to be counted
# toward min-replicas-to-write.
min-replicas-max-lag 10

# Size of the replication backlog. Larger values help replicas that briefly
# disconnect to catch up via partial resync instead of a full resync.
# Size this based on your write throughput × expected max disconnect time.
repl-backlog-size 64mb

# How long to keep the replication backlog after the last replica disconnects.
# 0 means keep it forever (uses memory). 3600 (1 hour) is a safe default.
repl-backlog-ttl 3600

# When a replica loses the connection to the master it can either continue
# serving (possibly stale) data or start returning errors.
# "yes" = continue serving data (better availability).
# "no"  = return errors (better consistency).
replica-serve-stale-data yes

# Replicas are read-only by default. Do not change unless you have a very
# specific use case.
replica-read-only yes

# Use diskless replication: the master streams the RDB directly to replicas
# over the socket instead of writing it to disk first. Faster on fast networks
# with slow disks.
repl-diskless-sync yes

# Delay before starting a diskless sync, giving additional replicas a chance
# to connect and receive the same stream.
repl-diskless-sync-delay 5


# =============================================================================
# PERFORMANCE — I/O THREADS (Redis 7+)
# =============================================================================
# I/O threads offload network read/write from the main thread. Useful on
# multi-core machines with high throughput. The main thread still processes
# commands single-threaded.

# Number of I/O threads. 1 = disabled (default). Set to 2-4 on most servers;
# do not exceed the number of CPU cores available to this process.
# *** CHANGE ME *** — measure with redis-benchmark before and after.
io-threads 4

# Also use I/O threads for reading client input (not just writing responses).
# Provides an additional throughput boost.
io-threads-do-reads yes


# =============================================================================
# SLOW LOG
# =============================================================================
# The slow log records queries that exceed a given execution time.
# Useful for identifying expensive commands.

# Log queries slower than this many microseconds. 10000 µs = 10 ms.
slowlog-log-slower-than 10000

# Maximum number of entries kept in the slow log. Older entries are evicted.
slowlog-max-len 128


# =============================================================================
# CLIENT OUTPUT BUFFER LIMITS
# =============================================================================
# Limits on the amount of memory a client output buffer can use before Redis
# disconnects the client. Three classes: normal, replica, pubsub.
#
# Syntax: client-output-buffer-limit <class> <hard> <soft> <soft-seconds>
#   hard  — disconnect immediately when the buffer exceeds this.
#   soft  — disconnect if the buffer stays above this for soft-seconds.
#   0     — unlimited.

# Normal clients (e.g., application connections).
client-output-buffer-limit normal 0 0 0

# Replica clients — these can buffer a lot during full resyncs.
# 256 MB hard limit, 64 MB soft limit for 60 seconds.
client-output-buffer-limit replica 256mb 64mb 60

# Pub/Sub clients — subscribers that cannot keep up are disconnected.
# 32 MB hard, 8 MB soft for 60 seconds.
client-output-buffer-limit pubsub 32mb 8mb 60


# =============================================================================
# LOGGING
# =============================================================================

# Log verbosity. Options: debug, verbose, notice, warning.
# "notice" is appropriate for production.
loglevel notice

# Log to stdout so Docker/container runtimes capture it. Set a file path
# if running on bare metal and you prefer file-based logging.
logfile ""


# =============================================================================
# DOCKER / NAT ANNOUNCE SETTINGS
# =============================================================================
# When Redis runs behind NAT or inside Docker, other cluster nodes and clients
# may not be able to reach it at the address it thinks it has. Use these
# directives to advertise the correct external IP and ports.
#
# *** Uncomment and adjust when deploying in Docker / Kubernetes / NAT ***
#
# cluster-announce-ip 203.0.113.10
# cluster-announce-port 7001
# cluster-announce-bus-port 17001
#
# In Kubernetes, you may use the pod IP or a headless service hostname.
# In Docker Compose the container name works if all nodes share the same
# Docker network (see docker-compose.yaml in this project).
