# =============================================================================
# Redis Sentinel — Production Configuration Template
# =============================================================================
#
# ╔══════════════════════════════════════════════════════════════════════╗
# ║  NOTE: Sentinel is for NON-CLUSTER high-availability setups.       ║
# ║  Do NOT use Redis Sentinel together with Redis Cluster.            ║
# ║                                                                    ║
# ║  Redis Cluster has its own built-in failover mechanism. Running    ║
# ║  Sentinel alongside a Cluster is redundant, unsupported, and will  ║
# ║  lead to conflicts. Use this file ONLY for standalone Redis        ║
# ║  master-replica topologies where you need automatic failover.      ║
# ╚══════════════════════════════════════════════════════════════════════╝
#
# Typical deployment: 3 Sentinel instances on separate machines/VMs,
# monitoring one or more Redis master-replica groups.
#
# Usage:
#   redis-sentinel /path/to/sentinel.conf
#   — or —
#   redis-server /path/to/sentinel.conf --sentinel
# =============================================================================


# =============================================================================
# GENERAL SETTINGS
# =============================================================================

# Port the Sentinel instance listens on. The conventional default is 26379.
# Each Sentinel on the same host needs a unique port.
port 26379

# Bind address. In production, restrict to known IPs.
# *** CHANGE ME ***
bind 0.0.0.0

# Protected mode. Disable only if you have proper firewall rules in place
# and need Sentinels to accept connections from any IP without a password.
protected-mode yes

# Run as a background daemon (set to "no" in Docker so the container stays
# in the foreground).
daemonize no

# PID file (relevant only when daemonize is "yes").
pidfile /var/run/redis-sentinel.pid


# =============================================================================
# LOGGING
# =============================================================================

# Log level: debug | verbose | notice | warning
# "notice" is appropriate for production.
loglevel notice

# Log file path. Empty string ("") logs to stdout, which Docker captures.
# Set a path on bare-metal deployments.
logfile ""


# =============================================================================
# PERSISTENCE
# =============================================================================
# Sentinel rewrites this configuration file at runtime to persist its current
# state (discovered replicas, other Sentinels, failover epoch, etc.).
# Make sure the Sentinel process has write access to this file.

# Directory where Sentinel stores its state.
dir /tmp


# =============================================================================
# SENTINEL — PRIMARY MONITORED MASTER ("mymaster")
# =============================================================================
# sentinel monitor <master-name> <ip> <port> <quorum>
#
# <master-name>  Logical name for this master-replica group. Clients use
#                this name to discover the current master via Sentinel.
# <ip>           IP or hostname of the current master.
# <port>         Port of the current master.
# <quorum>       Number of Sentinels that must agree a master is down
#                before failover begins. With 3 Sentinels, a quorum of 2
#                is standard (majority).
#
# *** CHANGE ME *** — replace IP and port with your actual master.
sentinel monitor mymaster 127.0.0.1 6379 2

# ---------------------------------------------------------------------------
# AUTH — password for the monitored Redis master (and its replicas).
# Must match the requirepass / masterauth value on your Redis instances.
# *** CHANGE ME ***
# ---------------------------------------------------------------------------
sentinel auth-pass mymaster REPLACE_WITH_STRONG_PASSWORD

# ---------------------------------------------------------------------------
# Sentinel's own password — clients connecting to Sentinel itself must
# provide this. Optional but recommended.
# *** CHANGE ME ***
# ---------------------------------------------------------------------------
# requirepass REPLACE_WITH_SENTINEL_PASSWORD

# ---------------------------------------------------------------------------
# Down-after-milliseconds
# ---------------------------------------------------------------------------
# Time in milliseconds an instance must be unreachable (SDOWN) before
# this Sentinel considers it subjectively down.
#
# Lower values = faster detection but higher false-positive risk.
# Recommended: 5000–30000 ms in production.
sentinel down-after-milliseconds mymaster 5000

# ---------------------------------------------------------------------------
# Failover timeout
# ---------------------------------------------------------------------------
# Controls multiple failover timing aspects (in milliseconds):
#   1. Time to retry a failover after a previous attempt to the same master.
#   2. Time for a replica to replicate from the newly promoted master before
#      Sentinel forces reconfiguration.
#   3. Time to cancel a failover already in progress.
#   4. Time for the old master to become a replica of the new master.
#
# Default is 180000 (3 minutes). Increase for very large datasets that take
# a long time to replicate.
sentinel failover-timeout mymaster 180000

# ---------------------------------------------------------------------------
# Parallel syncs
# ---------------------------------------------------------------------------
# After a failover, how many replicas can resync from the new master at the
# same time? A value of 1 means replicas are reconfigured one at a time,
# minimising the window where replicas are unavailable. Higher values speed
# up total reconfiguration but make more replicas temporarily unreachable.
sentinel parallel-syncs mymaster 1

# ---------------------------------------------------------------------------
# Deny / allow scripts
# ---------------------------------------------------------------------------
# For security, Sentinel restricts the paths from which notification and
# reconfig scripts can be loaded. By default no path is allowed.
# Uncomment and set a path if you use scripts.
#
# sentinel deny-scripts-reconfig yes

# ---------------------------------------------------------------------------
# Notification script (optional)
# ---------------------------------------------------------------------------
# Called on any Sentinel event (e.g., +sdown, +failover-end).
# Useful for alerting via PagerDuty, Slack, email, etc.
# The script receives event type and event description as arguments.
#
# Example:
# sentinel notification-script mymaster /opt/redis/scripts/notify.sh
#
# Script requirements:
#   - Must be executable (chmod +x).
#   - Must exit within 60 seconds or it will be killed (SIGKILL).
#   - Exit code 1 → Sentinel retries later. Exit code 2 → no retry.

# ---------------------------------------------------------------------------
# Client reconfig script (optional)
# ---------------------------------------------------------------------------
# Called after a failover when the master address changes. Use this to
# update load balancers, DNS records, virtual IPs, etc.
#
# Arguments passed to the script:
#   <master-name> <role> <state> <from-ip> <from-port> <to-ip> <to-port>
#
# Example:
# sentinel client-reconfig-script mymaster /opt/redis/scripts/failover-reconfig.sh


# =============================================================================
# SENTINEL — SECOND MONITORED MASTER (EXAMPLE)
# =============================================================================
# A single set of Sentinel instances can monitor multiple independent
# master-replica groups. Simply add another "sentinel monitor" block with
# a different master name.
#
# sentinel monitor cache-master 10.0.1.50 6380 2
# sentinel auth-pass cache-master REPLACE_WITH_CACHE_PASSWORD
# sentinel down-after-milliseconds cache-master 10000
# sentinel failover-timeout cache-master 180000
# sentinel parallel-syncs cache-master 1
#
# Each monitored master is completely independent — its own quorum,
# timeouts, and optional scripts.


# =============================================================================
# ADVANCED / TUNING
# =============================================================================

# Announce IP and port — useful when Sentinel is behind NAT or in Docker.
# Uncomment and adjust so other Sentinels and clients can reach this instance.
# sentinel announce-ip 203.0.113.20
# sentinel announce-port 26379

# Rename dangerous commands on the Sentinel instance itself (optional).
# sentinel rename-command mymaster CONFIG CONFIG_b4f8e2a9

# Minimum version of the Redis instance that Sentinel can monitor.
# Leave unset unless you need to enforce version constraints.
# sentinel master-reboot-down-after-period mymaster 0

# Resolve hostnames — when set to "yes", Sentinel stores and reports
# hostnames instead of IPs. Useful in environments with DNS-based service
# discovery (e.g., Kubernetes).
# sentinel resolve-hostnames yes
# sentinel announce-hostnames yes
