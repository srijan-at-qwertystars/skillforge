# =============================================================================
# Redis Cluster — Docker Compose
# =============================================================================
# Deploys a 6-node Redis Cluster: 3 masters + 3 replicas.
# Nodes listen on ports 7001-7006 (client) and 17001-17006 (cluster bus).
#
# Usage:
#   docker compose up -d
#
# The `redis-cluster-init` service automatically creates the cluster once
# every node reports healthy.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Node 1 – will become a master after cluster creation
  # ---------------------------------------------------------------------------
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    # Start Redis with cluster mode enabled and the matching port/bus-port.
    command: >
      redis-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --appendfilename "appendonly.aof"
      --requirepass "${REDIS_PASSWORD:-changeme}"
      --masterauth "${REDIS_PASSWORD:-changeme}"
      --cluster-announce-ip redis-node-1
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
    ports:
      - "7001:7001"    # Client connections
      - "17001:17001"  # Cluster bus (node-to-node gossip)
    volumes:
      - redis-node-1-data:/data
    networks:
      - redis-cluster-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7001", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Node 2
  # ---------------------------------------------------------------------------
  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    command: >
      redis-server
      --port 7002
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --appendfilename "appendonly.aof"
      --requirepass "${REDIS_PASSWORD:-changeme}"
      --masterauth "${REDIS_PASSWORD:-changeme}"
      --cluster-announce-ip redis-node-2
      --cluster-announce-port 7002
      --cluster-announce-bus-port 17002
    ports:
      - "7002:7002"
      - "17002:17002"
    volumes:
      - redis-node-2-data:/data
    networks:
      - redis-cluster-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7002", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Node 3
  # ---------------------------------------------------------------------------
  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    command: >
      redis-server
      --port 7003
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --appendfilename "appendonly.aof"
      --requirepass "${REDIS_PASSWORD:-changeme}"
      --masterauth "${REDIS_PASSWORD:-changeme}"
      --cluster-announce-ip redis-node-3
      --cluster-announce-port 7003
      --cluster-announce-bus-port 17003
    ports:
      - "7003:7003"
      - "17003:17003"
    volumes:
      - redis-node-3-data:/data
    networks:
      - redis-cluster-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7003", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Node 4
  # ---------------------------------------------------------------------------
  redis-node-4:
    image: redis:7-alpine
    container_name: redis-node-4
    command: >
      redis-server
      --port 7004
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --appendfilename "appendonly.aof"
      --requirepass "${REDIS_PASSWORD:-changeme}"
      --masterauth "${REDIS_PASSWORD:-changeme}"
      --cluster-announce-ip redis-node-4
      --cluster-announce-port 7004
      --cluster-announce-bus-port 17004
    ports:
      - "7004:7004"
      - "17004:17004"
    volumes:
      - redis-node-4-data:/data
    networks:
