      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Node 6
  # ---------------------------------------------------------------------------
  redis-node-6:
    image: redis:7-alpine
    container_name: redis-node-6
    command: >
      redis-server
      --port 7006
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --appendfilename "appendonly.aof"
      --requirepass "${REDIS_PASSWORD:-changeme}"
      --masterauth "${REDIS_PASSWORD:-changeme}"
      --cluster-announce-ip redis-node-6
      --cluster-announce-port 7006
      --cluster-announce-bus-port 17006
    ports:
      - "7006:7006"
      - "17006:17006"
    volumes:
      - redis-node-6-data:/data
    networks:
      - redis-cluster-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7006", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Cluster initializer
  # ---------------------------------------------------------------------------
  # This one-shot service waits for every node to become healthy, then runs
  # `redis-cli --cluster create` to form the cluster with 1 replica per master.
  # It exits after the cluster is created and will not restart.
  # ---------------------------------------------------------------------------
  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
      redis-node-4:
        condition: service_healthy
      redis-node-5:
        condition: service_healthy
      redis-node-6:
        condition: service_healthy
    networks:
      - redis-cluster-net
    # The --cluster-yes flag answers "yes" to the interactive confirmation.
    # --cluster-replicas 1 assigns one replica to each of the three masters.
    command: >
      sh -c "
        echo 'Waiting 5 seconds for nodes to stabilize...' &&
        sleep 5 &&
        echo 'Creating Redis Cluster...' &&
        redis-cli -a ${REDIS_PASSWORD:-changeme} --cluster create
          redis-node-1:7001
          redis-node-2:7002
          redis-node-3:7003
          redis-node-4:7004
          redis-node-5:7005
          redis-node-6:7006
          --cluster-replicas 1
          --cluster-yes &&
        echo 'Redis Cluster created successfully.' &&
        echo 'Verifying cluster status...' &&
        redis-cli -a ${REDIS_PASSWORD:-changeme} -p 7001 -h redis-node-1 cluster info &&
        echo 'Done.'
      "
    restart: "no"

# =============================================================================
# Volumes — named volumes for data persistence across restarts
# =============================================================================
volumes:
  redis-node-1-data:
    driver: local
  redis-node-2-data:
    driver: local
  redis-node-3-data:
    driver: local
  redis-node-4-data:
    driver: local
  redis-node-5-data:
    driver: local
  redis-node-6-data:
    driver: local

# =============================================================================
# Networks — isolated bridge network for inter-node communication
# =============================================================================
networks:
  redis-cluster-net:
    driver: bridge
    # Using a predictable subnet makes firewall rules and debugging easier.
    ipam:
      config:
        - subnet: 172.30.0.0/16
