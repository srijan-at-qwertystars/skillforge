# =============================================================================
# Nginx Reverse Proxy for Meilisearch
# =============================================================================
# This configuration provides:
#   • TLS termination (TLS 1.2+ with strong ciphers)
#   • HTTP → HTTPS redirect
#   • Rate limiting (separate zones for search vs. admin endpoints)
#   • CORS headers for browser-based search
#   • Security headers (HSTS, X-Frame-Options, etc.)
#   • Generous body size for document uploads
#   • Health-check pass-through
#
# Place this file in /etc/nginx/conf.d/ or include it from nginx.conf.
# Adjust ssl_certificate paths and server_name to match your environment.
# =============================================================================

# ---------------------------------------------------------------------------
# Upstream – points at the Meilisearch instance
# ---------------------------------------------------------------------------
upstream meilisearch_backend {
    # If running via Docker Compose on the same host:
    server 127.0.0.1:7700;

    # For multiple replicas behind a load balancer, add more servers:
    # server meili-node-2:7700;
    keepalive 32;  # Reuse connections to the backend.
}

# ---------------------------------------------------------------------------
# Rate-limiting zones
# ---------------------------------------------------------------------------
# "search" zone – relatively generous for end-user search traffic.
# $binary_remote_addr uses ~64 bytes per entry vs ~256 for $remote_addr.
limit_req_zone $binary_remote_addr zone=search:10m rate=30r/s;

# "admin" zone – stricter limits for write / management endpoints.
limit_req_zone $binary_remote_addr zone=admin:10m rate=5r/s;

# Return 429 Too Many Requests instead of the default 503.
limit_req_status 429;

# ---------------------------------------------------------------------------
# HTTP server – redirect everything to HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name search.example.com;

    # ACME challenge support for certificate renewal (e.g. certbot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS server – main proxy
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name search.example.com;

    # -- TLS ----------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/search.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/search.example.com/privkey.pem;

    # Only allow TLS 1.2 and 1.3.
    ssl_protocols TLSv1.2 TLSv1.3;

    # Strong cipher suite – prioritise AEAD ciphers.
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;

    # TLS session caching for performance.
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling for faster TLS handshakes.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # -- Security Headers ---------------------------------------------------
    # HSTS – tell browsers to always use HTTPS (2 years, include sub-domains).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Prevent clickjacking.
    add_header X-Frame-Options DENY always;

    # Stop browsers from MIME-sniffing the response.
    add_header X-Content-Type-Options nosniff always;

    # Control referrer information sent with requests.
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Basic permissions policy.
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # -- Logging ------------------------------------------------------------
    access_log /var/log/nginx/meilisearch_access.log;
    error_log  /var/log/nginx/meilisearch_error.log warn;

    # -- Request size -------------------------------------------------------
    # Allow large document uploads (adjust to your needs).
    client_max_body_size 100M;

    # -- Common proxy settings (inherited by all location blocks) -----------
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";  # Enable keep-alive to upstream.

    # Timeouts for long-running indexing operations.
    proxy_connect_timeout 10s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    # -- Health check -------------------------------------------------------
    # Unauthenticated health endpoint – useful for load-balancer probes.
    location = /health {
        proxy_pass http://meilisearch_backend/health;
        access_log off;
    }

    # -- Search endpoint (public-facing, relaxed rate limit) ----------------
    location /multi-search {
        limit_req zone=search burst=60 nodelay;

        # CORS – allow browser-based search from any origin.
        # Restrict 'Access-Control-Allow-Origin' to your domain in production.
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Meili-API-Key" always;
        add_header Access-Control-Max-Age       7200 always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://meilisearch_backend;
    }

    # Indexes search sub-routes (POST /indexes/{uid}/search).
    location ~ ^/indexes/[^/]+/search$ {
        limit_req zone=search burst=60 nodelay;

        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Meili-API-Key" always;
        add_header Access-Control-Max-Age       7200 always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://meilisearch_backend;
    }

    # -- Keys management (admin, strict rate limit) -------------------------
    location /keys {
        limit_req zone=admin burst=10 nodelay;
        proxy_pass http://meilisearch_backend;
    }

    # -- Index management (admin, strict rate limit) ------------------------
    # Matches /indexes and /indexes/{uid} but NOT /indexes/{uid}/search
    # (which is handled above).
    location /indexes {
        limit_req zone=admin burst=10 nodelay;
        proxy_pass http://meilisearch_backend;
    }

    # -- Dumps & snapshots (admin) ------------------------------------------
    location /dumps {
        limit_req zone=admin burst=2 nodelay;
        proxy_pass http://meilisearch_backend;
    }

    location /snapshots {
        limit_req zone=admin burst=2 nodelay;
        proxy_pass http://meilisearch_backend;
    }

    # -- Catch-all: everything else proxied with search-level rate limit ----
    location / {
        limit_req zone=search burst=30 nodelay;
        proxy_pass http://meilisearch_backend;
    }
}
