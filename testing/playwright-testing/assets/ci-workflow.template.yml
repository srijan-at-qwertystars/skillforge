# GitHub Actions workflow for Playwright E2E tests.
#
# Features:
# - Browser caching for fast installs
# - Optional matrix sharding (uncomment for large suites)
# - HTML report uploaded as artifact
# - Trace capture on first retry for debugging
# - Configurable Node.js version
#
# Usage:
#   Copy to .github/workflows/playwright.yml in your repository.
#   Adjust the webServer section in playwright.config.ts to match your app.

name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CI: true

jobs:
  test:
    name: Playwright Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest

    # ── Uncomment for sharding across multiple runners ──────
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     shardIndex: [1, 2, 3, 4]
    #     shardTotal: [4]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install system dependencies only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Run Playwright tests
        run: npx playwright test
        # For sharding: npx playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          # For sharding: playwright-report-${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (traces, screenshots)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

