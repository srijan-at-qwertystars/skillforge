# Docker Compose: k6 + InfluxDB + Grafana Monitoring Stack
#
# Provides a full observability stack for k6 load test results:
#   - k6: Load test runner (runs your scripts)
#   - InfluxDB: Time-series database for metrics storage
#   - Grafana: Dashboard for real-time visualization
#
# Usage:
#   # Start the monitoring stack
#   docker compose up -d influxdb grafana
#
#   # Run a k6 test (results stream to InfluxDB)
#   docker compose run --rm k6 run /scripts/scenarios/load.js
#
#   # Or run k6 locally, pointing to Docker InfluxDB
#   k6 run --out influxdb=http://localhost:8086/k6 scenarios/load.js
#
#   # View results in Grafana
#   open http://localhost:3000  (admin/admin)
#
#   # Stop everything
#   docker compose down -v
#
# Grafana Dashboard:
#   Import the official k6 dashboard: ID 2587
#   Or use the k6-InfluxDB-Grafana dashboard: ID 18030
#
# Customize:
#   - Mount your test scripts via the k6 volumes
#   - Add environment variables for different targets
#   - Scale k6 runners for distributed testing

services:
  # ── k6 Load Test Runner ──────────────────────────────────────────────────
  k6:
    image: grafana/k6:latest
    volumes:
      - ./:/scripts        # mount project root
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
      - ENV=staging
      # Add your env vars here:
      # - BASE_URL=https://staging-api.example.com
      # - API_KEY=${API_KEY}
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - k6-net
    # Default command — override with: docker compose run k6 run /scripts/your-test.js
    entrypoint: ["k6"]

  # ── InfluxDB (Metrics Storage) ───────────────────────────────────────────
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_MAX_BODY_SIZE=0
      # Optional auth:
      # - INFLUXDB_ADMIN_USER=admin
      # - INFLUXDB_ADMIN_PASSWORD=admin123
    volumes:
      - influxdb-data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "influx", "-execute", "SHOW DATABASES"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - k6-net

  # ── Grafana (Dashboards) ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - k6-net

volumes:
  influxdb-data:
  grafana-data:

networks:
  k6-net:
    driver: bridge

# ── Grafana Provisioning ─────────────────────────────────────────────────
# Create these files for auto-configured datasources:
#
# grafana-provisioning/datasources/influxdb.yml:
# ---
# apiVersion: 1
# datasources:
#   - name: k6-InfluxDB
#     type: influxdb
#     access: proxy
#     url: http://influxdb:8086
#     database: k6
#     isDefault: true
#     editable: true
