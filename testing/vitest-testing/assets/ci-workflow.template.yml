# ci-workflow.template.yml — GitHub Actions workflow for Vitest
#
# Usage: Copy to .github/workflows/test.yml in your repo.
# Features: Matrix Node versions, caching, coverage upload, artifact storage.

name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm' # Change to 'yarn' or 'pnpm' if applicable

      # Uncomment for pnpm:
      # - uses: pnpm/action-setup@v4
      #   with:
      #     version: 9

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage --reporter=default --reporter=junit --outputFile.junit=test-results/junit.xml
        env:
          CI: true
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Upload coverage to Codecov
        if: matrix.node-version == 22 && always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            test-results/
            coverage/
          retention-days: 7

      - name: Check coverage thresholds
        if: matrix.node-version == 22
        run: |
          # Fail if coverage drops below thresholds defined in vitest.config
          npx vitest run --coverage --coverage.thresholds.100=false 2>/dev/null || true
          echo "Coverage report available in artifacts"

  # Optional: Type checking job
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Run type checking
        run: npx tsc --noEmit
