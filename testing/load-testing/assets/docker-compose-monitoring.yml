# docker-compose-monitoring.yml — InfluxDB + Grafana for k6 load test monitoring
#
# Usage:
#   docker compose -f docker-compose-monitoring.yml up -d
#
# After startup:
#   - Grafana:  http://localhost:3000 (admin/admin)
#   - InfluxDB: http://localhost:8086
#
# Run k6 with monitoring:
#   k6 run --out influxdb=http://localhost:8086/k6 your-test.js
#
# Dashboard is auto-provisioned. If not, import Grafana dashboard ID 2587.

services:
  # ---------------------------------------------------------------------------
  # InfluxDB — Time-series database for k6 metrics
  # ---------------------------------------------------------------------------
  influxdb:
    image: influxdb:1.8
    container_name: k6-influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin123
      - INFLUXDB_HTTP_AUTH_ENABLED=false
      - INFLUXDB_HTTP_MAX_BODY_SIZE=0
      - INFLUXDB_HTTP_WRITE_TRACING=false
      - INFLUXDB_DATA_MAX_VALUES_PER_TAG=0
      - INFLUXDB_DATA_MAX_SERIES_PER_DATABASE=0
    volumes:
      - influxdb-data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "influx", "-execute", "SHOW DATABASES"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - monitoring

  # ---------------------------------------------------------------------------
  # Grafana — Visualization and dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: k6-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/k6-dashboard.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - monitoring

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  influxdb-data:
    driver: local
  grafana-data:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  monitoring:
    driver: bridge

# =============================================================================
# Grafana Provisioning Files
# =============================================================================
# Create these files alongside this docker-compose file:
#
# grafana/provisioning/datasources/influxdb.yml:
# ---
# apiVersion: 1
# datasources:
#   - name: InfluxDB
#     type: influxdb
#     access: proxy
#     url: http://influxdb:8086
#     database: k6
#     isDefault: true
#     editable: true
#
# grafana/provisioning/dashboards/dashboard.yml:
# ---
# apiVersion: 1
# providers:
#   - name: 'default'
#     orgId: 1
#     folder: 'Load Testing'
#     type: file
#     disableDeletion: false
#     editable: true
#     options:
#       path: /var/lib/grafana/dashboards
#       foldersFromFilesStructure: false
#
# For the k6 dashboard JSON, download from:
#   https://grafana.com/grafana/dashboards/2587-k6-load-testing-results/
# Save as: grafana/dashboards/k6-dashboard.json
# =============================================================================
