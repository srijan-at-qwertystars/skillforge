# =============================================================================
# GitHub Actions — pytest CI workflow
# =============================================================================
# Features:
#   • Python 3.11 / 3.12 / 3.13 matrix
#   • pip dependency caching
#   • Linting (ruff)
#   • Parallel test execution with pytest-xdist
#   • Coverage collection & Codecov upload
# =============================================================================

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # let all matrix legs finish
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Python setup + pip cache
      # -----------------------------------------------------------------------
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip                # caches ~/.cache/pip across runs
          cache-dependency-path: |
            requirements*.txt
            pyproject.toml

      # -----------------------------------------------------------------------
      # 3. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,test]"

      # -----------------------------------------------------------------------
      # 4. Lint (ruff — fast Python linter & formatter)
      # -----------------------------------------------------------------------
      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      # -----------------------------------------------------------------------
      # 5. Type check (optional — uncomment if using mypy/pyright)
      # -----------------------------------------------------------------------
      # - name: Type check
      #   run: mypy src/

      # -----------------------------------------------------------------------
      # 6. Run tests with coverage + xdist parallelism
      # -----------------------------------------------------------------------
      - name: Run tests
        run: |
          pytest \
            --numprocesses auto \
            --cov=src \
            --cov-branch \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=junit.xml \
            -q
        env:
          # Ensure coverage.py works correctly with xdist workers.
          COVERAGE_PROCESS_START: pyproject.toml

      # -----------------------------------------------------------------------
      # 7. Upload coverage to Codecov
      # -----------------------------------------------------------------------
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13' && always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false   # don't block PRs if Codecov is down
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # -----------------------------------------------------------------------
      # 8. Upload test results (viewable in Actions → Summary)
      # -----------------------------------------------------------------------
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: junit.xml
          retention-days: 14
