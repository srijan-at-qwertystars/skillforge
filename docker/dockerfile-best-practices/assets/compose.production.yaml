# =============================================================================
# Production Docker Compose Configuration
# =============================================================================
# This file demonstrates production-ready settings for a typical web stack:
#   - API service (your application)
#   - PostgreSQL database
#   - Redis cache
#
# Usage:
#   docker compose -f compose.production.yaml up -d
#
# Security, reliability, and resource management are prioritized throughout.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # API Service — your application container
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      # Use BuildKit for cache mounts and other optimizations
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: your-registry.example.com/your-org/api:${VERSION:-latest}
    container_name: api

    # Restart policy: always restart unless explicitly stopped
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      - DATABASE_URL=postgresql://app:${DB_PASSWORD}@postgres:5432/appdb
      - REDIS_URL=redis://redis:6379/0
      - NODE_ENV=production

    # --- Security Hardening ---
    # read_only: Make the root filesystem read-only to prevent runtime tampering
    read_only: true
    # tmpfs: Provide writable temp directories where needed (e.g., for PID files)
    tmpfs:
      - /tmp:size=64m
      - /run:size=8m

    # cap_drop ALL: Remove all Linux capabilities by default
    # cap_add: Add back only the specific capabilities your app needs
    cap_drop:
      - ALL
    # cap_add:
    #   - NET_BIND_SERVICE  # Uncomment only if binding to ports < 1024

    # security_opt: Prevent processes from gaining new privileges via setuid/setgid
    security_opt:
      - no-new-privileges:true

    # --- Resource Limits ---
    # Prevent a single container from consuming all host resources
    deploy:
      resources:
        limits:
          cpus: "2.0"          # Maximum 2 CPU cores
          memory: 512M         # Maximum 512 MB RAM
        reservations:
          cpus: "0.5"          # Guarantee at least 0.5 CPU cores
          memory: 256M         # Guarantee at least 256 MB RAM

    # --- Health Check ---
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    # --- Dependency Management ---
    # Wait for dependencies to be healthy before starting
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    # --- Networking ---
    # Attach to both frontend (ingress-facing) and backend (internal) networks
    networks:
      - frontend
      - backend

    # --- Logging ---
    # Configure structured logging with size limits to prevent disk exhaustion
    logging:
      driver: json-file
      options:
        max-size: "10m"       # Max size per log file
        max-file: "3"         # Keep 3 rotated log files

  # ---------------------------------------------------------------------------
  # PostgreSQL — primary database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    # Pin digest: @sha256:<paste-digest-here>
    container_name: postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: app
      # Use Docker secrets or .env file — never hardcode passwords
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}

    # --- Storage ---
    volumes:
      # Named volume for persistent data — survives container recreation
      - postgres_data:/var/lib/postgresql/data

    # --- Security ---
    # Database should only be reachable from the backend network
    # No ports exposed to the host — access through the backend network only
    cap_drop:
      - ALL
    cap_add:
      # PostgreSQL needs these capabilities to function
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

    # --- Resource Limits ---
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M

    # --- Health Check ---
    # Use pg_isready to verify PostgreSQL is accepting connections
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d appdb"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

    networks:
      - backend

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Redis — caching and session storage
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    # Pin digest: @sha256:<paste-digest-here>
    container_name: redis

    restart: unless-stopped

    # Run Redis with:
    #   --maxmemory        — cap memory usage
    #   --maxmemory-policy — evict least-recently-used keys when limit is hit
    #   --appendonly yes   — enable AOF persistence for durability
    command: >
      redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --save 60 1000

    volumes:
      - redis_data:/data

    # --- Security ---
    # Redis should only be reachable from the backend network
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

    # --- Resource Limits ---
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M

    # --- Health Check ---
    # Use redis-cli ping to check if Redis is responsive
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 3

    networks:
      - backend

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# Networks
# =============================================================================
# Separate networks isolate traffic:
#   frontend — between ingress/load-balancer and the API
#   backend  — between the API and databases (not exposed externally)
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    # internal: true prevents containers on this network from reaching the internet
    internal: true

# =============================================================================
# Volumes
# =============================================================================
# Named volumes persist data across container restarts and recreations
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
