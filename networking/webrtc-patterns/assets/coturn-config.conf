# coturn-config.conf — Production coturn TURN server configuration template
#
# Copy to /etc/turnserver.conf and customize values marked with CHANGEME.
#
# Usage:
#   sudo cp coturn-config.conf /etc/turnserver.conf
#   sudo systemctl restart coturn
#
# Documentation: https://github.com/coturn/coturn/wiki/turnserver

# ============================================================================
# Network Settings
# ============================================================================

# TURN listener port for UDP and TCP
listening-port=3478

# TURN listener port for TLS (TURNS)
tls-listening-port=443

# Bind to all interfaces
listening-ip=0.0.0.0

# External/public IP of this server (CHANGEME)
# For cloud VMs, this is the elastic/public IP
# For dual-stack, add both IPv4 and IPv6
external-ip=203.0.113.10
# external-ip=203.0.113.10/10.0.0.5   # public/private for cloud VMs (AWS/GCP/Azure)

# Relay IP — address used for relaying media
relay-ip=0.0.0.0

# Relay port range — open these in your firewall
min-port=49152
max-port=65535

# ============================================================================
# Domain / Realm
# ============================================================================

# Your TURN server domain (CHANGEME)
realm=turn.example.com
server-name=turn.example.com

# ============================================================================
# Authentication
# ============================================================================

# Use HMAC-SHA1 ephemeral credentials (recommended for WebRTC)
use-auth-secret

# Shared secret for generating credentials (CHANGEME — use a strong random value)
# Generate with: openssl rand -hex 32
static-auth-secret=CHANGEME_REPLACE_WITH_RANDOM_SECRET

# Credential TTL in seconds (default: 86400 = 24 hours)
# Shorter = more secure but requires more frequent token refreshes
# stale-nonce=600

# ============================================================================
# TLS / DTLS
# ============================================================================

# Path to TLS certificate and private key (CHANGEME)
cert=/etc/letsencrypt/live/turn.example.com/fullchain.pem
pkey=/etc/letsencrypt/live/turn.example.com/privkey.pem

# Disable old TLS versions
no-tlsv1
no-tlsv1_1

# Strong cipher suite
cipher-list=ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA256

# DH parameters file for stronger key exchange (optional)
# Generate with: openssl dhparam -out /etc/turnserver/dhparam.pem 2048
# dh-file=/etc/turnserver/dhparam.pem

# ============================================================================
# Security
# ============================================================================

# Enable fingerprint mechanism (RFC 5389)
fingerprint

# Enable long-term credential mechanism
lt-cred-mech

# Prevent relaying to multicast addresses
no-multicast-peers

# Prevent relaying to loopback addresses
no-loopback-peers

# Deny specific IP ranges (internal networks, link-local, etc.)
# Adjust based on your network topology
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.88.99.0-192.88.99.255
denied-peer-ip=224.0.0.0-255.255.255.255
# If your relay needs to reach internal services, remove the relevant ranges above.
# allowed-peer-ip=10.0.1.0-10.0.1.255

# ============================================================================
# Performance / Limits
# ============================================================================

# Total number of allocations allowed
total-quota=300

# Per-user allocation quota (0 = unlimited)
user-quota=0

# Max bandwidth per session (0 = unlimited)
max-bps=0

# Stale nonce lifetime (seconds)
stale-nonce=600

# ============================================================================
# Process Settings
# ============================================================================

# Run as this user/group (create with: useradd -r turnserver)
proc-user=turnserver
proc-group=turnserver

# Number of relay threads (0 = auto based on CPU cores)
# relay-threads=0

# ============================================================================
# Logging
# ============================================================================

# Log to file
log-file=/var/log/turnserver/turnserver.log

# Use simple log format (easier to parse)
simple-log

# Include timestamp in log lines
new-log-timestamp

# Suppress stdout logging (use when running as systemd service)
no-stdout-log

# Verbose logging (uncomment for debugging, disable in production)
# verbose

# Log binding requests (uncomment for debugging)
# log-binding

# ============================================================================
# Advanced / Optional
# ============================================================================

# Enable TURN REST API for credential management
# web-admin
# web-admin-ip=127.0.0.1
# web-admin-port=8080

# Enable Prometheus metrics (if compiled with support)
# prometheus

# Enable mobility (ICE-MOBILITY)
# mobility

# Enable DTLS for data channels
# no-dtls=0

# Alternative listening port (useful for some firewalls)
# alt-listening-port=3479
# alt-tls-listening-port=5350

# Redis for shared state (multi-instance deployments)
# redis-statsdb="ip=127.0.0.1 dbname=0 port=6379"
