# nginx-webrtc.conf — Nginx configuration for WebRTC with WebSocket proxy
#
# Features:
#   - HTTPS termination for the signaling server
#   - WebSocket upgrade handling for signaling
#   - TURN server TLS proxy (optional)
#   - Security headers
#   - Static file serving for the web client
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/webrtc
#   2. Update server_name, ssl_certificate paths, and upstream addresses
#   3. sudo ln -s /etc/nginx/sites-available/webrtc /etc/nginx/sites-enabled/
#   4. sudo nginx -t && sudo systemctl reload nginx

# --- Upstreams ---

# WebRTC signaling server (WebSocket)
upstream signaling_backend {
    # Use ip_hash for sticky sessions (required for Socket.IO polling fallback)
    ip_hash;
    server 127.0.0.1:8080;
    # Add more servers for horizontal scaling:
    # server 127.0.0.1:8081;
    # server 127.0.0.1:8082;

    # Keep connections alive to backend
    keepalive 64;
}

# Optional: Web application backend
upstream app_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# --- HTTP → HTTPS redirect ---

server {
    listen 80;
    listen [::]:80;
    server_name webrtc.example.com;    # CHANGEME

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main HTTPS server ---

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name webrtc.example.com;    # CHANGEME

    # --- TLS Configuration ---

    # Certificate paths (CHANGEME)
    ssl_certificate     /etc/letsencrypt/live/webrtc.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webrtc.example.com/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # SSL session caching
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Security Headers ---

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions-Policy for WebRTC
    add_header Permissions-Policy "camera=*, microphone=*, display-capture=*, autoplay=*" always;

    # --- WebSocket Signaling Proxy ---

    # WebSocket signaling endpoint
    location /ws {
        proxy_pass http://signaling_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Preserve client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout — keep connections alive
        # WebRTC signaling connections are long-lived
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # Disable buffering for real-time signaling
        proxy_buffering off;

        # Connection limits
        # limit_conn ws_conn 100;
    }

    # Socket.IO endpoint (if using Socket.IO for signaling)
    location /socket.io/ {
        proxy_pass http://signaling_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    # --- Signaling REST API ---

    location /api/ {
        proxy_pass http://signaling_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Connection "";
        proxy_buffering off;

        # Rate limiting
        # limit_req zone=api burst=20 nodelay;
    }

    # --- Health Check ---

    location /health {
        proxy_pass http://signaling_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # --- Static Files (Web Client) ---

    location / {
        root /var/www/webrtc;          # CHANGEME — path to your web client
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # --- CORS for API (if needed) ---

    # Uncomment if your client is on a different origin
    # location /api/ {
    #     if ($request_method = OPTIONS) {
    #         add_header Access-Control-Allow-Origin $http_origin;
    #         add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    #         add_header Access-Control-Allow-Headers "Authorization, Content-Type";
    #         add_header Access-Control-Max-Age 86400;
    #         return 204;
    #     }
    #     add_header Access-Control-Allow-Origin $http_origin always;
    # }

    # --- Logging ---

    access_log /var/log/nginx/webrtc-access.log;
    error_log  /var/log/nginx/webrtc-error.log warn;
}

# --- Optional: TURN TLS Proxy ---
# Use this if your TURN server doesn't handle TLS natively
# and you want Nginx to terminate TLS for TURNS on port 443.
#
# Requires the ngx_stream_module (stream { } block in nginx.conf).
#
# In /etc/nginx/nginx.conf, add at the top level (outside http { }):
