# =============================================================================
# Comprehensive Security Headers — Nginx Include File
# =============================================================================
#
# Usage:
#   1. Copy to /etc/nginx/snippets/security-headers.conf
#   2. Include in server or location blocks:
#        include snippets/security-headers.conf;
#
# IMPORTANT: Nginx's add_header is NOT inherited by child blocks.
#   If you add any add_header in a location block, you MUST re-include
#   this file in that block, or all these headers will be lost.
#
# Test your headers:
#   curl -I https://your-domain.com
#   https://securityheaders.com
#   https://observatory.mozilla.org
# =============================================================================

# --- Clickjacking Protection ---
# Prevents the page from being embedded in iframes on other sites.
# Values: DENY | SAMEORIGIN | ALLOW-FROM uri
add_header X-Frame-Options "SAMEORIGIN" always;

# --- MIME Type Sniffing Prevention ---
# Stops browsers from guessing the MIME type of a response.
add_header X-Content-Type-Options "nosniff" always;

# --- XSS Protection (Legacy) ---
# Enables browser-built-in XSS filter. Mostly superseded by CSP
# but still useful for older browsers.
add_header X-XSS-Protection "1; mode=block" always;

# --- HTTP Strict Transport Security (HSTS) ---
# Forces browsers to use HTTPS for all future requests.
# max-age=63072000 = 2 years. includeSubDomains applies to all subdomains.
# preload: submit to https://hstspreload.org for browser preload list.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# --- Referrer Policy ---
# Controls how much referrer information is sent with requests.
# strict-origin-when-cross-origin: full URL for same-origin, origin only for cross-origin.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# --- Content Security Policy ---
# Restricts which resources the browser can load.
# CUSTOMIZE THIS for your application. The example below is restrictive.
#
# Common adjustments:
#   - Add CDN domains to script-src and style-src
#   - Add 'unsafe-inline' to style-src if your app uses inline styles
#   - Add data: to img-src for base64 images
#   - Add wss: to connect-src for WebSocket connections
#   - Add blob: to worker-src for Web Workers
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none';" always;

# --- Permissions Policy ---
# Controls which browser features can be used.
# Deny access to sensitive device APIs.
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()" always;

# --- Cross-Origin Policies ---
# Protect against Spectre-like side-channel attacks.

# Require resources loaded cross-origin to explicitly opt-in via CORS or CORP.
# CAUTION: May break loading of third-party resources. Test thoroughly.
# add_header Cross-Origin-Embedder-Policy "require-corp" always;

# Isolate the browsing context to same-origin documents.
add_header Cross-Origin-Opener-Policy "same-origin" always;

# Restrict how resources can be shared cross-origin.
# Use "cross-origin" if your assets must be loadable from other origins.
add_header Cross-Origin-Resource-Policy "same-origin" always;

# --- Cache Control for Sensitive Pages ---
# Uncomment for pages with sensitive data (prevent caching of auth pages, etc.)
# add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
# add_header Pragma "no-cache" always;
# add_header Expires "0" always;
