# =============================================================================
# Production Reverse Proxy Configuration Template
# =============================================================================
#
# Usage:
#   1. Copy to /etc/nginx/conf.d/your-app.conf
#   2. Replace all CHANGEME values
#   3. Ensure snippets exist or inline the settings
#   4. Test with: nginx -t && nginx -s reload
#
# Requires:
#   - /etc/nginx/snippets/ssl-params.conf
#   - /etc/nginx/snippets/security-headers.conf
#   - /etc/nginx/snippets/proxy-params.conf
#   - Valid SSL certificates
# =============================================================================

# --- Upstream Backend ---
upstream app_backend {
    least_conn;

    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;  # CHANGEME: backend address
    # server 10.0.0.2:8080 max_fails=3 fail_timeout=30s;  # add more servers as needed

    keepalive 32;           # persistent connections to backend
    keepalive_timeout 60s;
}

# --- Rate Limiting Zones (http context — place in nginx.conf or include) ---
# limit_req_zone $binary_remote_addr zone=app_general:10m rate=30r/s;
# limit_req_zone $binary_remote_addr zone=app_login:10m rate=5r/m;
# limit_conn_zone $binary_remote_addr zone=app_conn:10m;

# --- Proxy Cache (http context) ---
# proxy_cache_path /var/cache/nginx/app
#     levels=1:2
#     keys_zone=app_cache:50m
#     max_size=5g
#     inactive=60m
#     use_temp_path=off;

# --- HTTP → HTTPS Redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;  # CHANGEME

    # Let's Encrypt challenge (keep even with redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main HTTPS Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;  # CHANGEME

    # --- SSL ---
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;      # CHANGEME
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;    # CHANGEME
    include snippets/ssl-params.conf;

    # --- Security Headers ---
    include snippets/security-headers.conf;

    # --- Logging ---
    access_log /var/log/nginx/example.com.access.log combined buffer=32k flush=5s;  # CHANGEME
    error_log /var/log/nginx/example.com.error.log warn;  # CHANGEME

    # --- Global Settings ---
    client_max_body_size 25m;
    client_body_buffer_size 16k;

    # --- Rate Limiting ---
    # limit_req zone=app_general burst=50 nodelay;
    # limit_conn app_conn 30;
    # limit_req_status 429;
    # limit_conn_status 429;

    # --- Health Check Endpoint ---
    location = /health {
        access_log off;
        return 200 '{"status":"ok"}';
        default_type application/json;
    }

    # --- Cached Static Assets ---
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|eot|webp|avif)$ {
        proxy_pass http://app_backend;
        include snippets/proxy-params.conf;

        # Cache headers
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Proxy cache
        # proxy_cache app_cache;
        # proxy_cache_valid 200 30d;
        # proxy_cache_use_stale error timeout updating;
        # add_header X-Cache-Status $upstream_cache_status;
    }

    # --- API with rate limiting ---
    location /api/ {
        # limit_req zone=app_general burst=30 nodelay;

        proxy_pass http://app_backend;
        include snippets/proxy-params.conf;

        # Proxy cache for GET requests
        # proxy_cache app_cache;
        # proxy_cache_valid 200 5m;
        # proxy_cache_methods GET HEAD;
        # proxy_cache_key "$scheme$request_method$host$request_uri";
        # proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        # proxy_cache_bypass $http_cache_control;
        # add_header X-Cache-Status $upstream_cache_status always;
    }

    # --- Login / Auth (strict rate limit) ---
    location /login {
        # limit_req zone=app_login burst=3;

        proxy_pass http://app_backend;
        include snippets/proxy-params.conf;
    }

    # --- Block sensitive files ---
    location ~ /\.(git|svn|env|htaccess|htpasswd|DS_Store) {
        deny all;
        return 404;
    }

    location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin) {
        deny all;
        return 404;
    }

    # --- Default proxy to backend ---
    location / {
        proxy_pass http://app_backend;
        include snippets/proxy-params.conf;
    }

    # --- Custom error pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
