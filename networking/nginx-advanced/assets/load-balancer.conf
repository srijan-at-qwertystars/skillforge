# =============================================================================
# Production Load Balancer Configuration Template
# =============================================================================
#
# Features:
#   - Multiple load balancing algorithms (least_conn, ip_hash, hash)
#   - Passive health checks with failure detection
#   - Sticky sessions via cookie
#   - Failover to backup servers
#   - Connection draining for graceful shutdown
#   - SSL termination with HTTP/2
#   - Rate limiting and DDoS protection
#
# Usage:
#   1. Copy to /etc/nginx/conf.d/load-balancer.conf
#   2. Replace all CHANGEME values
#   3. Test with: nginx -t && nginx -s reload
# =============================================================================

# --- Upstream: Primary Application Servers ---
upstream app_servers {
    # Algorithm: least_conn | ip_hash | hash $request_uri consistent
    least_conn;

    # Primary servers with health check parameters
    server 10.0.1.1:8080 weight=5 max_fails=3 fail_timeout=30s;   # CHANGEME
    server 10.0.1.2:8080 weight=5 max_fails=3 fail_timeout=30s;   # CHANGEME
    server 10.0.1.3:8080 weight=3 max_fails=3 fail_timeout=30s;   # CHANGEME

    # Backup servers (used only when all primary servers are down)
    server 10.0.2.1:8080 backup;  # CHANGEME
    # server 10.0.2.2:8080 backup;

    # Keepalive connections to backends (reduce TCP overhead)
    keepalive 64;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

# --- Upstream: WebSocket Servers (if needed) ---
upstream ws_servers {
    # IP hash for WebSocket session persistence
    ip_hash;

    server 10.0.1.1:8081 max_fails=3 fail_timeout=30s;  # CHANGEME
    server 10.0.1.2:8081 max_fails=3 fail_timeout=30s;  # CHANGEME

    keepalive 32;
}

# --- Sticky Session Map (Cookie-Based) ---
# Use this approach for cookie-based session persistence without ip_hash
map $cookie_SERVERID $sticky_backend {
    default  "";
    ~server1 10.0.1.1:8080;
    ~server2 10.0.1.2:8080;
    ~server3 10.0.1.3:8080;
}

# --- WebSocket Upgrade Map ---
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- Rate Limiting Zones (define in http context) ---
# limit_req_zone $binary_remote_addr zone=lb_general:20m rate=100r/s;
# limit_req_zone $binary_remote_addr zone=lb_api:20m rate=50r/s;
# limit_conn_zone $binary_remote_addr zone=lb_conn:10m;

# --- HTTP → HTTPS Redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name lb.example.com;  # CHANGEME

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main Load Balancer Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lb.example.com;  # CHANGEME

    # --- SSL ---
    ssl_certificate /etc/letsencrypt/live/lb.example.com/fullchain.pem;      # CHANGEME
    ssl_certificate_key /etc/letsencrypt/live/lb.example.com/privkey.pem;    # CHANGEME

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # --- Logging ---
    log_format lb_detailed '$remote_addr - [$time_local] "$request" $status '
                           '$body_bytes_sent rt=$request_time '
                           'upstream=$upstream_addr urt=$upstream_response_time '
                           'ust=$upstream_status';

    access_log /var/log/nginx/lb.access.log lb_detailed buffer=64k flush=5s;
    error_log /var/log/nginx/lb.error.log warn;

    # --- Rate Limiting ---
    # limit_req zone=lb_general burst=200 nodelay;
    # limit_conn lb_conn 50;

    # --- Health Check Endpoint (LB itself) ---
    location = /lb-health {
        access_log off;
        return 200 '{"status":"ok","server":"lb"}';
        default_type application/json;
    }

    # --- Backend Health Check (proxy to backend /health) ---
    location = /health {
        access_log off;
        proxy_pass http://app_servers;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    # --- Nginx Status (monitoring) ---
    location = /nginx_status {
        stub_status;
        allow 10.0.0.0/8;     # CHANGEME: monitoring network
        allow 127.0.0.1;
        deny all;
    }

    # --- WebSocket Endpoint ---
    location /ws/ {
        proxy_pass http://ws_servers;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # --- API (with retry logic) ---
    location /api/ {
        # limit_req zone=lb_api burst=100 nodelay;

        proxy_pass http://app_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Retry on failure (careful with non-idempotent requests)
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_timeout 10s;
        proxy_next_upstream_tries 2;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Sticky session cookie (optional — uncomment to enable)
        # add_header Set-Cookie "SERVERID=server$upstream_addr; Path=/; HttpOnly; Secure" always;

        # Show which backend served the request (debugging)
        add_header X-Upstream $upstream_addr always;
    }

    # --- Static Assets (long cache) ---
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|eot|webp)$ {
        proxy_pass http://app_servers;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Default Proxy ---
    location / {
        proxy_pass http://app_servers;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
    }

    # --- Error Pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
