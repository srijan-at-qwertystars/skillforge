# WireGuard Client Configuration Template
#
# Copy to /etc/wireguard/wg0.conf and replace all <placeholders>.
# Set permissions: chmod 600 /etc/wireguard/wg0.conf
#
# Generate keys: wg genkey | tee private.key | wg pubkey > public.key
# Send public.key to the server admin for inclusion in server config.

[Interface]
# VPN address assigned to this client
Address = 10.0.0.2/24, fd00:vpn::2/64

# Client private key (chmod 600)
PrivateKey = <CLIENT_PRIVATE_KEY>

# DNS servers — resolved through the VPN tunnel
# Option 1: Public DNS
DNS = 1.1.1.1, 1.0.0.1
# Option 2: Internal DNS (for corporate/private setups)
# DNS = 10.0.0.1

# MTU — match server MTU or set lower for cloud/container environments
MTU = 1420

# Optional: prevent wg-quick from managing routes (for manual/policy routing)
# Table = off

[Peer]
# Server public key
PublicKey = <SERVER_PUBLIC_KEY>

# Preshared key (optional, adds post-quantum resistance)
PresharedKey = <PRESHARED_KEY>

# Server endpoint — hostname or IP with port
Endpoint = vpn.example.com:51820

# --- Tunneling Mode ---
# Choose ONE of the AllowedIPs options below:

# FULL TUNNEL — all traffic routes through VPN (most secure, hides all traffic)
AllowedIPs = 0.0.0.0/0, ::/0

# SPLIT TUNNEL — only specified subnets route through VPN
# Uncomment and customize:
# AllowedIPs = 10.0.0.0/24, 192.168.1.0/24, fd00:vpn::/64

# SPLIT TUNNEL (everything except LAN) — routes all traffic through VPN
# but preserves local network access:
# AllowedIPs = 0.0.0.0/1, 128.0.0.0/1, ::/1, 8000::/1

# Keep NAT mapping alive — required if client is behind NAT
PersistentKeepalive = 25

# --- Optional Kill Switch ---
# Prevents traffic leaks if VPN disconnects.
# Uncomment PostUp/PostDown below to enable.
#
# PostUp = iptables -I OUTPUT ! -o %i -m mark ! --mark $(wg show %i fwmark) -m addrtype ! --dst-type LOCAL -j REJECT
# PostDown = iptables -D OUTPUT ! -o %i -m mark ! --mark $(wg show %i fwmark) -m addrtype ! --dst-type LOCAL -j REJECT
#
# --- Optional DNS Leak Prevention ---
# Block DNS on all interfaces except WireGuard:
#
# PostUp = iptables -I OUTPUT -p udp --dport 53 ! -o %i -j REJECT
# PostUp = iptables -I OUTPUT -p tcp --dport 53 ! -o %i -j REJECT
# PostDown = iptables -D OUTPUT -p udp --dport 53 ! -o %i -j REJECT
# PostDown = iptables -D OUTPUT -p tcp --dport 53 ! -o %i -j REJECT
