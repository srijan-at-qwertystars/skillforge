# WireGuard Server Configuration Template
#
# Copy to /etc/wireguard/wg0.conf and replace all <placeholders>.
# Set permissions: chmod 600 /etc/wireguard/wg0.conf
#
# Prerequisites:
#   - Enable IP forwarding: sysctl -w net.ipv4.ip_forward=1
#   - Persist in /etc/sysctl.d/99-wireguard.conf
#   - Generate keys: wg genkey | tee private.key | wg pubkey > public.key

[Interface]
# VPN address for this server — use .1 as the gateway
Address = 10.0.0.1/24, fd00:vpn::1/64

# UDP listen port — must be reachable (open in firewall/security group)
ListenPort = 51820

# Server private key (chmod 600)
PrivateKey = <SERVER_PRIVATE_KEY>

# DNS server pushed to clients (optional on server, required if clients set DNS)
# DNS = 1.1.1.1, 2606:4700:4700::1111

# MTU — adjust for your environment (cloud VMs may need 1380-1400)
MTU = 1420

# NAT masquerade and forwarding rules
# Replace eth0 with your actual WAN interface (check with: ip route show default)
PostUp = iptables -A FORWARD -i %i -j ACCEPT
PostUp = iptables -A FORWARD -o %i -j ACCEPT
PostUp = iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostUp = ip6tables -A FORWARD -i %i -j ACCEPT
PostUp = ip6tables -A FORWARD -o %i -j ACCEPT
PostUp = ip6tables -t nat -A POSTROUTING -o eth0 -j MASQUERADE

PostDown = iptables -D FORWARD -i %i -j ACCEPT
PostDown = iptables -D FORWARD -o %i -j ACCEPT
PostDown = iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
PostDown = ip6tables -D FORWARD -i %i -j ACCEPT
PostDown = ip6tables -D FORWARD -o %i -j ACCEPT
PostDown = ip6tables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# Optional: MSS clamping to prevent fragmentation issues
PostUp = iptables -t mangle -A FORWARD -i %i -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu

PostDown = iptables -t mangle -D FORWARD -i %i -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu

# --- Peers ---
# Add one [Peer] block per client.
# AllowedIPs should be the client's VPN IP as /32 (not /24).

[Peer]
# Client 1
PublicKey = <CLIENT_1_PUBLIC_KEY>
PresharedKey = <CLIENT_1_PRESHARED_KEY>
AllowedIPs = 10.0.0.2/32, fd00:vpn::2/128

[Peer]
# Client 2
PublicKey = <CLIENT_2_PUBLIC_KEY>
PresharedKey = <CLIENT_2_PRESHARED_KEY>
AllowedIPs = 10.0.0.3/32, fd00:vpn::3/128

# [Peer]
# # Site-to-site example — route an entire remote subnet
# PublicKey = <SITE_B_PUBLIC_KEY>
# PresharedKey = <SITE_B_PRESHARED_KEY>
