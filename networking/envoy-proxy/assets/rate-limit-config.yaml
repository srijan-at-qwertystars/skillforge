# Envoy Rate Limiting Configuration
#
# This config demonstrates both local (per-instance) and global (external service)
# rate limiting with Envoy. Uses envoyproxy/ratelimit as the external rate limit service.
#
# Architecture:
#   Client → Envoy (local RL + global RL) → Rate Limit Service (Redis-backed) → Upstream

static_resources:
  listeners:
    - name: http_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: api
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/api/"
                          route:
                            cluster: api_backend
                            rate_limits:
                              # Global rate limit descriptors sent to external service
                              - actions:
                                  # Per-path rate limiting
                                  - request_headers:
                                      header_name: ":path"
                                      descriptor_key: "path"
                              - actions:
                                  # Per-API-key rate limiting
                                  - request_headers:
                                      header_name: "x-api-key"
                                      descriptor_key: "api_key"
                              - actions:
                                  # Per-remote-address rate limiting
                                  - remote_address: {}
                        - match:
                            prefix: "/"
                          route:
                            cluster: web_backend

                http_filters:
                  # 1. Local rate limit (per-Envoy-instance, no external dependency)
                  - name: envoy.filters.http.local_ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.local_ratelimit.v3.LocalRateLimit
                      stat_prefix: local_rl
                      token_bucket:
                        max_tokens: 500
                        tokens_per_fill: 500
                        fill_interval: 60s
                      filter_enabled:
                        runtime_key: local_rate_limit_enabled
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      filter_enforced:
                        runtime_key: local_rate_limit_enforced
                        default_value:
                          numerator: 100
                          denominator: HUNDRED
                      response_headers_to_add:
                        - append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          header:
                            key: x-local-rate-limit
                            value: "500/min"
                      local_rate_limit_per_downstream_connection: false

                  # 2. Global rate limit (external rate limit service)
                  - name: envoy.filters.http.ratelimit
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ratelimit.v3.RateLimit
                      domain: api_domain
                      stage: 0
                      failure_mode_deny: false  # Allow traffic if rate limit service is down
                      enable_x_ratelimit_headers: DRAFT_VERSION_03
                      rate_limit_service:
                        grpc_service:
                          envoy_grpc:
                            cluster_name: rate_limit_service
                        transport_api_version: V3

                  # 3. Router (must be last)
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: api_backend
      connect_timeout: 0.5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: api_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: api-service
                      port_value: 8080

    - name: web_backend
      connect_timeout: 0.5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: web_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: web-service
                      port_value: 3000

    # External rate limit service (envoyproxy/ratelimit)
    - name: rate_limit_service
      connect_timeout: 0.5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: rate_limit_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: ratelimit
                      port_value: 8081

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

# ─────────────────────────────────────────────────────────────
# Rate Limit Service Configuration (ratelimit-config.yaml)
#
# Deploy alongside the envoyproxy/ratelimit service.
# Mount this as the rate limit service's config file.
#
# domain: api_domain
# descriptors:
#   # Per-path: 100 requests/minute per unique path
#   - key: path
#     rate_limit:
#       unit: minute
#       requests_per_unit: 100
#
#   # Per-API-key: 1000 requests/minute per API key
#   - key: api_key
#     rate_limit:
#       unit: minute
#       requests_per_unit: 1000
#     descriptors:
#       # Override for premium keys
#       - key: api_key
#         value: "premium-key-abc"
#         rate_limit:
#           unit: minute
#           requests_per_unit: 10000
#
#   # Per-IP: 200 requests/minute
#   - key: remote_address
#     rate_limit:
#       unit: minute
#       requests_per_unit: 200
# ─────────────────────────────────────────────────────────────
