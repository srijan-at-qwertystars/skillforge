# Docker Compose — Envoy with upstream services, Jaeger tracing, and Prometheus
#
# Usage:
#   docker compose -f docker-compose-envoy.yml up -d
#
# Services:
#   - envoy         (port 8080 HTTP, 9901 admin)
#   - backend-v1    (upstream service v1)
#   - backend-v2    (upstream service v2)
#   - jaeger         (port 16686 UI, 4317 OTLP gRPC, 14268 collector)
#   - prometheus     (port 9090)
#
# Access:
#   - Application:    http://localhost:8080
#   - Envoy Admin:    http://localhost:9901
#   - Jaeger UI:      http://localhost:16686
#   - Prometheus:     http://localhost:9090

services:
  # ── Envoy Proxy ──
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    ports:
      - "8080:8080"    # HTTP listener
      - "9901:9901"    # Admin interface
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    command: ["envoy", "-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    depends_on:
      - backend-v1
      - backend-v2
      - jaeger
    networks:
      - mesh
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Backend Service v1 ──
  backend-v1:
    image: hashicorp/http-echo:latest
    command: ["-text=Hello from backend v1", "-listen=:8080"]
    networks:
      - mesh
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 10s
      timeout: 2s
      retries: 3

  # ── Backend Service v2 ──
  backend-v2:
    image: hashicorp/http-echo:latest
    command: ["-text=Hello from backend v2", "-listen=:8080"]
    networks:
      - mesh
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 10s
      timeout: 2s
      retries: 3

  # ── Jaeger (distributed tracing) ──
  jaeger:
    image: jaegertracing/all-in-one:1.56
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - mesh

  # ── Prometheus (metrics) ──
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=24h"
    networks:
      - mesh
    depends_on:
      - envoy

networks:
  mesh:
    driver: bridge

