# Envoy mTLS Configuration
#
# Full mutual TLS (mTLS) setup with:
#   - Downstream TLS: Clients must present valid certificates
#   - Upstream TLS: Envoy authenticates to backends with client certificates
#   - SDS (Secret Discovery Service) examples for dynamic cert rotation
#
# Certificate layout (expected paths):
#   /certs/ca.crt           — Trusted CA certificate (signs both server and client certs)
#   /certs/server.crt       — Envoy's server certificate (presented to downstream clients)
#   /certs/server.key       — Envoy's server private key
#   /certs/client.crt       — Envoy's client certificate (presented to upstream backends)
#   /certs/client.key       — Envoy's client private key
#   /certs/upstream-ca.crt  — CA that signed the upstream server's certificate

static_resources:
  listeners:
    # ── HTTPS Listener with mTLS (downstream) ──
    - name: https_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8443
      listener_filters:
        - name: envoy.filters.listener.tls_inspector
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
      filter_chains:
        - transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                # TLS version constraints
                tls_params:
                  tls_minimum_protocol_version: TLSv1_2
                  tls_maximum_protocol_version: TLSv1_3
                  cipher_suites:
                    - "[ECDHE-ECDSA-AES128-GCM-SHA256|ECDHE-ECDSA-CHACHA20-POLY1305]"
                    - "[ECDHE-RSA-AES128-GCM-SHA256|ECDHE-RSA-CHACHA20-POLY1305]"
                    - "ECDHE-ECDSA-AES256-GCM-SHA384"
                    - "ECDHE-RSA-AES256-GCM-SHA384"

                # Server certificate (presented to clients)
                tls_certificates:
                  - certificate_chain:
                      filename: "/certs/server.crt"
                    private_key:
                      filename: "/certs/server.key"

                # Validation context (verify client certificates)
                validation_context:
                  trusted_ca:
                    filename: "/certs/ca.crt"
                  # Optional: restrict to specific client identities
                  match_typed_subject_alt_names:
                    - san_type: DNS
                      matcher:
                        exact: "client.example.com"
                    - san_type: URI
                      matcher:
                        prefix: "spiffe://example.com/"

                # ALPN negotiation
                alpn_protocols:
                  - "h2"
                  - "http/1.1"

          filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_https
                # Forward client cert details to upstream
                forward_client_cert_details: SANITIZE_SET
                set_current_client_cert_details:
                  uri: true
                  dns: true
                  subject: true

                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
                          status: "%RESPONSE_CODE%"
                          client_cert_subject: "%DOWNSTREAM_PEER_SUBJECT%"
                          client_cert_uri_san: "%DOWNSTREAM_PEER_URI_SAN%"
                          tls_version: "%DOWNSTREAM_TLS_VERSION%"
                          tls_cipher: "%DOWNSTREAM_TLS_CIPHER%"
                          sni: "%REQUESTED_SERVER_NAME%"

                route_config:
                  name: mtls_route
                  virtual_hosts:
                    - name: secure_api
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: mtls_upstream

                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

    # ── HTTP → HTTPS Redirect Listener ──
    - name: http_redirect
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 8080
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: redirect
                route_config:
                  virtual_hosts:
                    - name: redirect
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                          redirect:
                            https_redirect: true
                            port_redirect: 8443
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # ── Upstream with mTLS (Envoy as client) ──
    - name: mtls_upstream
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN

      # Upstream TLS — Envoy presents client certificate to backend
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: "backend.example.com"
          common_tls_context:
            tls_params:
              tls_minimum_protocol_version: TLSv1_2
              tls_maximum_protocol_version: TLSv1_3

            # Client certificate (presented to upstream)
            tls_certificates:
              - certificate_chain:
                  filename: "/certs/client.crt"
                private_key:
                  filename: "/certs/client.key"

            # Validate upstream's server certificate
            validation_context:
              trusted_ca:
                filename: "/certs/upstream-ca.crt"
              match_typed_subject_alt_names:
                - san_type: DNS
                  matcher:
                    exact: "backend.example.com"

            alpn_protocols:
              - "h2"
              - "http/1.1"

      load_assignment:
        cluster_name: mtls_upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: backend.example.com
                      port_value: 443

      health_checks:
        - timeout: 2s
          interval: 10s
          unhealthy_threshold: 3
          healthy_threshold: 2
          http_health_check:
            path: "/healthz"

admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

