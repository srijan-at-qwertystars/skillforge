# ─────────────────────────────────────────────────────────────
# Certificate Generation (for development / testing)
#
# # Generate CA
# openssl req -x509 -newkey rsa:4096 -keyout ca.key -out ca.crt \
#   -days 365 -nodes -subj "/CN=My CA"
#
# # Generate server cert
# openssl req -newkey rsa:4096 -keyout server.key -out server.csr \
#   -nodes -subj "/CN=envoy.example.com"
# openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key \
#   -CAcreateserial -out server.crt -days 365 \
#   -extfile <(printf "subjectAltName=DNS:envoy.example.com,DNS:localhost")
#
# # Generate client cert
# openssl req -newkey rsa:4096 -keyout client.key -out client.csr \
#   -nodes -subj "/CN=client.example.com"
# openssl x509 -req -in client.csr -CA ca.crt -CAkey ca.key \
#   -CAcreateserial -out client.crt -days 365 \
#   -extfile <(printf "subjectAltName=DNS:client.example.com,URI:spiffe://example.com/client")
