# Docker Compose — Load Balancer Demo Environment
# Includes Nginx LB, HAProxy LB, and multiple backend instances for testing.
#
# Usage:
#   docker compose up -d                    # Start all services
#   docker compose up -d --scale backend=5  # Scale backends
#   docker compose logs -f nginx-lb         # Watch Nginx LB logs
#   docker compose logs -f haproxy-lb       # Watch HAProxy LB logs
#
# Endpoints:
#   Nginx LB:         http://localhost:8080
#   HAProxy LB:       http://localhost:8081
#   HAProxy Stats:    http://localhost:8404/stats  (admin / haproxy-demo)
#   Backend direct:   http://localhost:9001-9003

services:
  # ===========================================
  # Backend application servers
  # ===========================================
  backend-1:
    image: nginx:alpine
    volumes:
      - ./demo/backend.conf:/etc/nginx/conf.d/default.conf:ro
      - ./demo/index-template.html:/usr/share/nginx/html/index-template.html:ro
    environment:
      - SERVER_ID=backend-1
    entrypoint: /bin/sh
    command:
      - -c
      - |
        # Generate unique response page per instance
        HOSTNAME=$$(hostname)
        cat > /usr/share/nginx/html/index.html <<EOF
        <!DOCTYPE html>
        <html>
        <head><title>Backend: $${SERVER_ID:-$$HOSTNAME}</title></head>
        <body>
          <h1>Hello from $${SERVER_ID:-$$HOSTNAME}</h1>
          <p>Hostname: $$HOSTNAME</p>
          <p>Timestamp: $$(date -u +%Y-%m-%dT%H:%M:%SZ)</p>
        </body>
        </html>
        EOF
        cat > /usr/share/nginx/html/healthz <<EOF
        {"status":"ok","server":"$${SERVER_ID:-$$HOSTNAME}"}
        EOF
        nginx -g "daemon off;"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3
    ports:
      - "9001:80"
    networks:
      - lb-net

  backend-2:
    image: nginx:alpine
    volumes:
      - ./demo/backend.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - SERVER_ID=backend-2
    entrypoint: /bin/sh
    command:
      - -c
      - |
        HOSTNAME=$$(hostname)
        cat > /usr/share/nginx/html/index.html <<EOF
        <!DOCTYPE html>
        <html>
        <head><title>Backend: $${SERVER_ID:-$$HOSTNAME}</title></head>
        <body>
          <h1>Hello from $${SERVER_ID:-$$HOSTNAME}</h1>
          <p>Hostname: $$HOSTNAME</p>
          <p>Timestamp: $$(date -u +%Y-%m-%dT%H:%M:%SZ)</p>
        </body>
        </html>
        EOF
        cat > /usr/share/nginx/html/healthz <<EOF
        {"status":"ok","server":"$${SERVER_ID:-$$HOSTNAME}"}
        EOF
        nginx -g "daemon off;"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3
    ports:
      - "9002:80"
    networks:
      - lb-net

  backend-3:
    image: nginx:alpine
    volumes:
      - ./demo/backend.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - SERVER_ID=backend-3
    entrypoint: /bin/sh
    command:
      - -c
      - |
        HOSTNAME=$$(hostname)
        cat > /usr/share/nginx/html/index.html <<EOF
        <!DOCTYPE html>
        <html>
        <head><title>Backend: $${SERVER_ID:-$$HOSTNAME}</title></head>
        <body>
          <h1>Hello from $${SERVER_ID:-$$HOSTNAME}</h1>
          <p>Hostname: $$HOSTNAME</p>
          <p>Timestamp: $$(date -u +%Y-%m-%dT%H:%M:%SZ)</p>
        </body>
        </html>
        EOF
        cat > /usr/share/nginx/html/healthz <<EOF
        {"status":"ok","server":"$${SERVER_ID:-$$HOSTNAME}"}
        EOF
        nginx -g "daemon off;"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3
    ports:
      - "9003:80"
    networks:
      - lb-net

  # ===========================================
  # Nginx Load Balancer
  # ===========================================
  nginx-lb:
    image: nginx:alpine
    volumes:
      - ./demo/nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      backend-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - lb-net

  # ===========================================
  # HAProxy Load Balancer
  # ===========================================
  haproxy-lb:
    image: haproxy:lts-alpine
    volumes:
      - ./demo/haproxy-demo.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8081:80"
      - "8404:8404"
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      backend-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - lb-net

networks:
  lb-net:
    driver: bridge

