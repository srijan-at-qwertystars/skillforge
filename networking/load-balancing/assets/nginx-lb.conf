# Nginx Load Balancer — Production Configuration
# Features: upstream groups, health checks, SSL termination, caching, rate limiting,
#           WebSocket support, gRPC proxying, security headers, logging.
#
# Usage: Copy to /etc/nginx/conf.d/lb.conf or include from nginx.conf
# Test:  nginx -t
# Reload: nginx -s reload

# --- Rate limiting zones ---
limit_req_zone $binary_remote_addr zone=api_rate:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=auth_rate:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=general_rate:10m rate=100r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# --- Caching ---
proxy_cache_path /var/cache/nginx/lb levels=1:2
                 keys_zone=lb_cache:10m
                 max_size=1g
                 inactive=60m
                 use_temp_path=off;

# --- Upstream: Application servers (primary) ---
upstream app_backend {
    least_conn;

    server 10.0.1.10:8080 weight=5 max_fails=3 fail_timeout=30s;
    server 10.0.1.11:8080 weight=5 max_fails=3 fail_timeout=30s;
    server 10.0.1.12:8080 weight=3 max_fails=3 fail_timeout=30s;
    server 10.0.1.13:8080 backup;

    keepalive 64;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

# --- Upstream: API servers ---
upstream api_backend {
    least_conn;

    server 10.0.2.10:8080 weight=5 max_fails=3 fail_timeout=30s;
    server 10.0.2.11:8080 weight=5 max_fails=3 fail_timeout=30s;

    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 500;
}

# --- Upstream: WebSocket servers ---
upstream ws_backend {
    least_conn;

    server 10.0.3.10:8080 max_fails=2 fail_timeout=15s;
    server 10.0.3.11:8080 max_fails=2 fail_timeout=15s;

    keepalive 16;
}

# --- Upstream: gRPC servers ---
upstream grpc_backend {
    least_conn;

    server 10.0.4.10:50051 max_fails=3 fail_timeout=30s;
    server 10.0.4.11:50051 max_fails=3 fail_timeout=30s;
}

# --- Logging ---
log_format lb_main '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent" '
                   'upstream=$upstream_addr '
                   'upstream_status=$upstream_status '
                   'upstream_time=$upstream_response_time '
                   'request_time=$request_time';

log_format lb_json escape=json
    '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_response_time":"$upstream_response_time",'
        '"request_time":"$request_time",'
        '"http_user_agent":"$http_user_agent",'
        '"x_forwarded_for":"$http_x_forwarded_for"'
    '}';

# --- Map: Determine backend based on URI ---
map $uri $backend_pool {
    ~^/api/     api_backend;
    ~^/ws       ws_backend;
    default     app_backend;
}

# --- Map: CORS origin validation ---
map $http_origin $cors_origin {
    "~^https://(www\.)?example\.com$"  $http_origin;
    "~^https://app\.example\.com$"     $http_origin;
    default                            "";
}

# --- Real IP from trusted proxies (CDN, internal LBs) ---
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;
# CloudFlare IPs (add as needed)
# set_real_ip_from 173.245.48.0/20;
real_ip_header X-Forwarded-For;
real_ip_recursive on;

# =============================================
# HTTP → HTTPS Redirect
# =============================================
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Health check endpoint (accessible over HTTP for LB-to-LB checks)
    location /healthz {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================
# HTTPS — Main Server Block
# =============================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name lb.example.com;

    # --- SSL Configuration ---
    ssl_certificate     /etc/ssl/certs/lb.example.com.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/lb.example.com.key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/ssl/certs/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # --- Access Logs ---
    access_log /var/log/nginx/lb_access.log lb_main;
    access_log /var/log/nginx/lb_access.json lb_json;
    error_log  /var/log/nginx/lb_error.log warn;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Connection limits ---
    limit_conn conn_limit 100;

    # --- Client settings ---
    client_max_body_size 50M;
    client_body_timeout 30s;
    client_header_timeout 10s;

    # =============================================
    # Health check (no logging, no rate limit)
    # =============================================
    location /healthz {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # =============================================
    # Nginx status (restrict to internal)
    # =============================================
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;
    }

    # =============================================
    # API endpoints
    # =============================================
    location /api/ {
        limit_req zone=api_rate burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 10s;

        # CORS
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Vary' 'Origin' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Auth endpoints (stricter rate limiting)
    location /api/auth/ {
        limit_req zone=auth_rate burst=5 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    # =============================================
    # WebSocket endpoint
    # =============================================
    location /ws {
        proxy_pass http://ws_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # =============================================
    # Static assets (cached)
    # =============================================
    location /static/ {
        limit_req zone=general_rate burst=50 nodelay;

        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Caching
        proxy_cache lb_cache;
        proxy_cache_valid 200 60m;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;

        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =============================================
    # File uploads (larger body, longer timeout)
    # =============================================
    location /api/upload {
        client_max_body_size 500M;
        client_body_timeout 120s;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_request_buffering off;
    }

    # =============================================
    # Default: Application servers
    # =============================================
    location / {
        limit_req zone=general_rate burst=30 nodelay;

        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;

        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 2;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
    }
}

# =============================================
# gRPC Server Block (separate port or SNI)
# =============================================
server {
    listen 443 ssl http2;
    server_name grpc.example.com;

    ssl_certificate     /etc/ssl/certs/grpc.example.com.fullchain.pem;
    ssl_certificate_key /etc/ssl/private/grpc.example.com.key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/grpc_access.log lb_main;

    location / {
        grpc_pass grpc://grpc_backend;

        grpc_set_header X-Real-IP $remote_addr;
        grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        grpc_read_timeout 60s;
        grpc_send_timeout 30s;

        # Error handling
        error_page 502 = /error502grpc;
    }

    location = /error502grpc {
        internal;
        default_type application/grpc;
        add_header grpc-status 14;
        add_header grpc-message "Backend unavailable";
        return 204;
    }
}
