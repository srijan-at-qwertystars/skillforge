# Traefik Production Docker Compose
# Includes: Traefik v3, Let's Encrypt, dashboard, Prometheus metrics, example services
#
# Prerequisites:
#   1. Create Docker network:  docker network create proxy
#   2. Create acme.json:       touch acme.json && chmod 600 acme.json
#   3. Update domains and email below
#   4. Generate dashboard password: htpasswd -nbB admin yourpassword
#      Then double all $ signs for docker-compose
#
# Usage:
#   docker compose up -d
#   docker compose logs -f traefik

services:
  # ─── Traefik Reverse Proxy ──────────────────────────────────────────────────
  traefik:
    image: traefik:v3.2
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      # Metrics — expose only internally or via VPN
      # - "8082:8082"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yaml:/traefik.yaml:ro
      - ./dynamic-config.yaml:/etc/traefik/dynamic/config.yaml:ro
      - traefik-certs:/data
      - traefik-logs:/var/log/traefik
    environment:
      # Uncomment for Cloudflare DNS challenge (wildcard certs):
      # CF_DNS_API_TOKEN: "${CF_DNS_API_TOKEN}"
      TZ: "UTC"
    labels:
      - "traefik.enable=true"

      # ── Dashboard Router ──
      - "traefik.http.routers.dashboard.rule=Host(`traefik.example.com`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth,secure-headers@file"

      # ── Dashboard Auth ──
      # Generate: htpasswd -nbB admin password  →  double all $ signs
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=admin:$$2y$$05$$CHANGE_ME_WITH_HTPASSWD_OUTPUT"
      - "traefik.http.middlewares.dashboard-auth.basicauth.removeheader=true"

    networks:
      - proxy
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Docker Socket Proxy (recommended for security) ────────────────────────
  # Uncomment this and remove the docker.sock volume from traefik to use:
  #
  # docker-proxy:
  #   image: tecnativa/docker-socket-proxy:latest
  #   container_name: docker-proxy
  #   restart: unless-stopped
  #   environment:
  #     CONTAINERS: 1
  #     SERVICES: 1
  #     TASKS: 1
  #     NETWORKS: 1
  #     POST: 0
  #     BUILD: 0
  #     COMMIT: 0
  #     CONFIGS: 0
  #     SECRETS: 0
  #     EXEC: 0
  #     IMAGES: 0
  #     VOLUMES: 0
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   networks:
  #     - proxy-internal

  # ─── Example Service: whoami ────────────────────────────────────────────────
  whoami:
    image: traefik/whoami:latest
    container_name: whoami
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.example.com`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls.certresolver=letsencrypt"
      - "traefik.http.routers.whoami.middlewares=secure-headers@file,rate-limit@file"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"
      - "traefik.http.services.whoami.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.whoami.loadbalancer.healthcheck.interval=15s"
    networks:
      - proxy

  # ─── Example Service: Web Application ──────────────────────────────────────
  webapp:
    image: nginx:alpine
    container_name: webapp
    restart: unless-stopped
    # volumes:
    #   - ./app:/usr/share/nginx/html:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webapp.rule=Host(`app.example.com`)"
      - "traefik.http.routers.webapp.entrypoints=websecure"
      - "traefik.http.routers.webapp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webapp.middlewares=secure-headers@file,compress@file"
      - "traefik.http.services.webapp.loadbalancer.server.port=80"
    networks:
      - proxy

  # ─── Example Service: API ──────────────────────────────────────────────────
  api:
    image: traefik/whoami:latest
    container_name: api
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`app.example.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.priority=100"
      - "traefik.http.routers.api.middlewares=rate-limit@file,secure-headers@file"
      - "traefik.http.services.api.loadbalancer.server.port=80"
    networks:
      - proxy

networks:
  proxy:
    name: proxy
    driver: bridge
  # proxy-internal:
  #   internal: true

volumes:
  traefik-certs:
    name: traefik-certs
  traefik-logs:
    name: traefik-logs
