# docker-compose.yml — gRPC development environment.
#
# Services:
#   - grpc-server:  Your gRPC service (build from Dockerfile)
#   - envoy:        gRPC-Web proxy for browser clients
#   - grpcui:       Web UI for testing gRPC services
#
# Usage:
#   docker compose up -d
#   docker compose logs -f grpc-server
#
# Ports:
#   - 50051: gRPC (direct)
#   - 8080:  gRPC-Web via Envoy (browser-compatible)
#   - 8090:  grpcui web interface

services:
  # --- Your gRPC service ---
  grpc-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      - GRPC_ADDR=:50051
      - ENV=development
    healthcheck:
      # Uses grpc_health_probe binary (include in your Dockerfile)
      test: ["CMD", "grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # --- Envoy proxy for gRPC-Web ---
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    ports:
      - "8080:8080"
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    depends_on:
      grpc-server:
        condition: service_healthy
    restart: unless-stopped

  # --- grpcui for interactive testing ---
  grpcui:
    image: fullstorydev/grpcui:latest
    command: ["-plaintext", "-port", "8090", "-bind", "0.0.0.0", "grpc-server:50051"]
    ports:
      - "8090:8090"
    depends_on:
      grpc-server:
        condition: service_healthy
    restart: unless-stopped

