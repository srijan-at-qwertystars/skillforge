# Nginx configuration for WebSocket proxying
#
# This config handles:
# - WebSocket upgrade with proper headers
# - SSL/TLS termination
# - Multiple upstream backends with sticky sessions
# - Separate locations for raw WebSocket and Socket.IO
# - Timeouts tuned for long-lived connections
# - Security headers and rate limiting
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/websocket.conf
#   2. Adjust server_name, ssl_certificate paths, and upstream servers
#   3. ln -s /etc/nginx/sites-available/websocket.conf /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx

# ─── Connection Upgrade Map ──────────────────────────────────────
# Maps the Upgrade header to the Connection header value.
# If Upgrade is present, Connection becomes "upgrade"; otherwise "close".

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ─── Rate Limiting Zone ─────────────────────────────────────────
# Limit WebSocket upgrade requests to prevent connection floods.
# 10 requests/second per IP with burst of 20.

limit_req_zone $binary_remote_addr zone=ws_connect:10m rate=10r/s;

# ─── Upstream Backend Servers ────────────────────────────────────
# ip_hash ensures the same client IP always reaches the same backend,
# which is required for Socket.IO's sticky session requirement.

upstream websocket_backend {
    ip_hash;
    server 127.0.0.1:3000;
    server 127.0.0.1:3001;
    server 127.0.0.1:3002;

    # Keepalive connections to backend (reduces TCP handshake overhead)
    keepalive 64;
}

# ─── HTTP → HTTPS Redirect ──────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name ws.example.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Main HTTPS Server ──────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ws.example.com;

    # ── SSL Configuration ────────────────────────────────────────

    ssl_certificate     /etc/letsencrypt/live/ws.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ws.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ─────────────────────────────────────────

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── Raw WebSocket Endpoint ───────────────────────────────────
    # For applications using the raw WebSocket protocol (ws library, etc.)

    location /ws {
        limit_req zone=ws_connect burst=20 nodelay;

        proxy_pass http://websocket_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers (critical)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Pass client information to backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-lived WebSocket connections
        # Set well above your heartbeat interval (typically 30s)
        proxy_read_timeout 86400s;    # 24 hours
        proxy_send_timeout 86400s;    # 24 hours
        proxy_connect_timeout 10s;    # Initial connection

        # Disable buffering for real-time delivery
        proxy_buffering off;
        proxy_cache off;

        # Don't intercept backend errors (let WS handle them)
        proxy_intercept_errors off;
    }

    # ── Socket.IO Endpoint ───────────────────────────────────────
    # Socket.IO uses both HTTP polling and WebSocket transport.
    # The polling transport requires normal HTTP proxying;
    # the WebSocket transport requires upgrade headers.

    location /socket.io/ {
        limit_req zone=ws_connect burst=20 nodelay;

        proxy_pass http://websocket_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Pass client information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;

        # Disable buffering
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Health Check Endpoint ────────────────────────────────────

    location /health {
        proxy_pass http://websocket_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 5s;
    }

    # ── Default: reject other requests ───────────────────────────

    location / {
        return 404;
    }
}
