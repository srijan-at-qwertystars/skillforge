# Data source provisioning for LGTM stack (Prometheus + Loki + Tempo)
# Place in: /etc/grafana/provisioning/datasources/
apiVersion: 1

deleteDatasources: []

datasources:
  # ─── Prometheus ──────────────────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
      # Exemplar configuration — links metric samples to traces
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: tempo
          urlDisplayLabel: "View Trace"
      # Query timeout
      queryTimeout: "60s"
      # Incremental querying (Grafana 10+)
      incrementalQuerying: true
      incrementalQueryOverlapWindow: "10m"

  # ─── Loki ────────────────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      # Derived fields — extract trace IDs from log lines and link to Tempo
      derivedFields:
        - name: TraceID
          matcherRegex: '"traceID":"(\w+)"'
          url: "$${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "View Trace"
        - name: TraceID_logfmt
          matcherRegex: 'traceID=(\w+)'
          url: "$${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "View Trace"

  # ─── Tempo ───────────────────────────────────────────────────────────────────
  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      # Trace to logs — click from trace span to correlated logs
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
        tags:
          - key: "service.name"
            value: "app"
          - key: "k8s.namespace.name"
            value: "namespace"
      # Trace to metrics — link spans to Prometheus metrics
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - key: "service.name"
            value: "service"
        queries:
          - name: "Request Rate"
            query: "sum(rate(http_requests_total{$$__tags}[5m]))"
          - name: "Error Rate"
            query: "sum(rate(http_requests_total{$$__tags, status=~\"5..\"}[5m])) / sum(rate(http_requests_total{$$__tags}[5m]))"
      # Node graph — service dependency map
      nodeGraph:
        enabled: true
      # Service graph — requires Tempo metrics generator
      serviceMap:
        datasourceUid: prometheus
      # Search
      search:
        hide: false
      # Span bar
      spanBar:
        type: "Tag"
        tag: "http.status_code"
