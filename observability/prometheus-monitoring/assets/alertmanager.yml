# Production Alertmanager configuration
# Docs: https://prometheus.io/docs/alerting/latest/configuration/

global:
  resolve_timeout: 5m

  # SMTP settings for email notifications
  smtp_from: "alertmanager@example.com"
  smtp_smarthost: "smtp.example.com:587"
  smtp_auth_username: "alertmanager@example.com"
  smtp_auth_password_file: "/etc/alertmanager/secrets/smtp-password"
  smtp_require_tls: true

  # Slack defaults
  slack_api_url_file: "/etc/alertmanager/secrets/slack-webhook-url"

  # PagerDuty defaults
  pagerduty_url: "https://events.pagerduty.com/v2/enqueue"

# Notification templates
templates:
  - "/etc/alertmanager/templates/*.tmpl"

# ──────────────────────────────────────────────────────────────────────────────
# Routing Tree
# ──────────────────────────────────────────────────────────────────────────────

route:
  receiver: slack-default
  group_by: ["alertname", "cluster", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # --- Critical SLO alerts → PagerDuty + Slack ---
    - matchers:
        - severity = critical
        - slo =~ ".+"
      receiver: pagerduty-slo
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    - matchers:
        - severity = critical
        - slo =~ ".+"
      receiver: slack-critical

    # --- Critical infrastructure → PagerDuty + Slack ---
    - matchers:
        - severity = critical
      receiver: pagerduty-infra
      group_wait: 10s
      repeat_interval: 2h
      continue: true

    - matchers:
        - severity = critical
      receiver: slack-critical

    # --- Warnings → Slack only ---
    - matchers:
        - severity = warning
      receiver: slack-warnings
      group_wait: 2m
      group_interval: 10m
      repeat_interval: 12h

    # --- Info → Low-priority Slack ---
    - matchers:
        - severity = info
      receiver: slack-info
      group_wait: 5m
      repeat_interval: 24h

# ──────────────────────────────────────────────────────────────────────────────
# Receivers
# ──────────────────────────────────────────────────────────────────────────────

receivers:
  # --- Default Slack channel ---
  - name: slack-default
    slack_configs:
      - channel: "#alerts"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service | default "N/A" }}
          *Summary:* {{ .Annotations.summary }}
          {{ if .Annotations.runbook_url }}*Runbook:* {{ .Annotations.runbook_url }}{{ end }}
          ---
          {{ end }}

  # --- Critical Slack channel ---
  - name: slack-critical
    slack_configs:
      - channel: "#alerts-critical"
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        title: '🚨 [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Cluster:* {{ .Labels.cluster | default "N/A" }}
          *Service:* {{ .Labels.service | default "N/A" }}
          *Instance:* {{ .Labels.instance | default "N/A" }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ if .Annotations.runbook_url }}*Runbook:* {{ .Annotations.runbook_url }}{{ end }}
          *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          ---
          {{ end }}
        actions:
          - type: button
            text: "Runbook"
            url: "{{ (index .Alerts 0).Annotations.runbook_url }}"
          - type: button
            text: "Silence"
            url: '{{ template "__alertmanagerURL" . }}/#/silences/new?filter=%7Balertname%3D%22{{ .GroupLabels.alertname }}%22%7D'

  # --- Warnings Slack channel ---
  - name: slack-warnings
    slack_configs:
      - channel: "#alerts-warnings"
        send_resolved: true
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        title: '⚠️ [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *{{ .Labels.alertname }}* — {{ .Annotations.summary }}
          {{ end }}

  # --- Info Slack channel ---
  - name: slack-info
    slack_configs:
      - channel: "#alerts-info"
        send_resolved: false
        title: 'ℹ️ {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          {{ .Annotations.summary }}
          {{ end }}

  # --- PagerDuty: SLO alerts ---
  - name: pagerduty-slo
    pagerduty_configs:
      - routing_key_file: "/etc/alertmanager/secrets/pagerduty-slo-key"
        severity: '{{ .GroupLabels.severity | default "critical" }}'
        description: '{{ .GroupLabels.alertname }}: {{ (index .Alerts 0).Annotations.summary }}'
        details:
          firing: '{{ template "pagerduty.default.description" . }}'
          num_firing: '{{ .Alerts.Firing | len }}'
          service: '{{ .GroupLabels.service }}'
          cluster: '{{ .GroupLabels.cluster }}'
        links:
          - href: '{{ (index .Alerts 0).Annotations.runbook_url }}'
            text: "Runbook"
          - href: '{{ (index .Alerts 0).Annotations.dashboard_url }}'
            text: "Dashboard"

  # --- PagerDuty: Infrastructure alerts ---
  - name: pagerduty-infra
    pagerduty_configs:
      - routing_key_file: "/etc/alertmanager/secrets/pagerduty-infra-key"
        severity: '{{ .GroupLabels.severity | default "critical" }}'
        description: '{{ .GroupLabels.alertname }}: {{ (index .Alerts 0).Annotations.summary }}'

  # --- Email ---
  - name: email-oncall
    email_configs:
      - to: "oncall@example.com"
        send_resolved: true
        headers:
          Subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} — {{ .GroupLabels.service }}'

  # --- Webhook for custom integrations ---
  - name: webhook-custom
    webhook_configs:
      - url: "https://alert-handler.internal.example.com/api/alerts"
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials_file: "/etc/alertmanager/secrets/webhook-token"

# ──────────────────────────────────────────────────────────────────────────────
# Inhibition Rules
# ──────────────────────────────────────────────────────────────────────────────

inhibit_rules:
  # Suppress warnings when critical is firing for the same alert+service
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: ["alertname", "cluster", "service"]

  # Suppress all alerts when node is down
  - source_matchers:
      - alertname = NodeDown
    target_matchers:
      - severity =~ "warning|critical"
    equal: ["instance"]

  # Suppress service alerts when the cluster is degraded
  - source_matchers:
      - alertname = ClusterDegraded
    target_matchers:
      - severity =~ "warning|info"
    equal: ["cluster"]

  # Suppress app alerts when database is down
  - source_matchers:
      - alertname = DatabaseDown
    target_matchers:
      - alertname =~ "HighErrorRate|HighLatency|SLOErrorBudgetBurn.*"
    equal: ["cluster"]

# ──────────────────────────────────────────────────────────────────────────────
# Time-based muting (business hours routing)
# ──────────────────────────────────────────────────────────────────────────────

time_intervals:
  - name: business-hours
    time_intervals:
      - weekdays: ["monday:friday"]
        times:
          - start_time: "09:00"
            end_time: "17:00"

  - name: outside-business-hours
    time_intervals:
      - weekdays: ["monday:friday"]
        times:
          - start_time: "00:00"
            end_time: "09:00"
          - start_time: "17:00"
            end_time: "24:00"
      - weekdays: ["saturday", "sunday"]
