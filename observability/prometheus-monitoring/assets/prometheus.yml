# Production Prometheus configuration
# Docs: https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

  # Labels added to all time series and alerts from this Prometheus instance.
  # Use to identify this instance in a multi-cluster/multi-region setup.
  external_labels:
    cluster: production
    region: us-east-1
    environment: production

# Rule files to load
rule_files:
  - "rules/recording-rules.yml"
  - "rules/alerting-rules.yml"

# Alertmanager configuration
alerting:
  alertmanagers:
    - scheme: http
      timeout: 10s
      api_version: v2
      static_configs:
        - targets:
            - "alertmanager-01:9093"
            - "alertmanager-02:9093"
            - "alertmanager-03:9093"

# Remote write for long-term storage (Thanos/Mimir/Cortex/VictoriaMetrics)
remote_write:
  - url: "https://mimir.internal.example.com/api/v1/push"
    queue_config:
      capacity: 10000
      max_shards: 30
      min_shards: 1
      max_samples_per_send: 5000
      batch_send_deadline: 5s
      min_backoff: 30ms
      max_backoff: 5s
      retry_on_http_429: true
    headers:
      X-Scope-OrgID: "production"
    write_relabel_configs:
      # Only send important metrics to remote storage
      - source_labels: [__name__]
        regex: "go_.*|promhttp_.*"
        action: drop

remote_read:
  - url: "https://mimir.internal.example.com/prometheus/api/v1/read"
    read_recent: false

# ──────────────────────────────────────────────────────────────────────────────
# Scrape Configs
# ──────────────────────────────────────────────────────────────────────────────

scrape_configs:
  # --- Self-monitoring ---
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          component: prometheus

  # --- Node Exporter (system metrics) ---
  - job_name: "node-exporter"
    file_sd_configs:
      - files:
          - "/etc/prometheus/file_sd/node-exporter.json"
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        regex: "(.*):(.*)"
        target_label: instance
        replacement: "${1}"

  # --- Application metrics ---
  - job_name: "app"
    metrics_path: /metrics
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/tls/ca.pem
      cert_file: /etc/prometheus/tls/client.pem
      key_file: /etc/prometheus/tls/client-key.pem
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/app-token
    file_sd_configs:
      - files:
          - "/etc/prometheus/file_sd/app-targets.json"
        refresh_interval: 30s
    metric_relabel_configs:
      # Drop high-cardinality debug metrics
      - source_labels: [__name__]
        regex: "debug_.*|test_.*"
        action: drop
      # Drop trace_id / request_id labels
      - regex: "trace_id|request_id|span_id"
        action: labeldrop

  # --- Kubernetes pods (annotation-based discovery) ---
  - job_name: "kubernetes-pods"
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      # Only scrape pods with prometheus.io/scrape=true annotation
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      # Use custom metrics path if annotated
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      # Use custom port if annotated
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: "${1}:${2}"
        target_label: __address__
      # Set namespace label
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: namespace
      # Set pod label
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: pod
      # Set app label from k8s label
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: replace
        target_label: app
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "go_gc_.*|go_memstats_.*"
        action: drop

  # --- Blackbox Exporter (probing) ---
  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    file_sd_configs:
      - files:
          - "/etc/prometheus/file_sd/blackbox-targets.json"
        refresh_interval: 60s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: "blackbox-exporter:9115"

  # --- cAdvisor (container metrics) ---
  - job_name: "cadvisor"
    scheme: https
    tls_config:
      ca_file: /etc/prometheus/tls/ca.pem
    authorization:
      type: Bearer
      credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: "kubernetes.default.svc:443"
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: "/api/v1/nodes/${1}/proxy/metrics/cadvisor"
    metric_relabel_configs:
      # Keep only useful container metrics
      - source_labels: [__name__]
        regex: "container_(cpu|memory|network|fs)_.*"
        action: keep

