# OpenTelemetry Full Observability Stack
#
# Services:
#   - OTel Collector (contrib) — receives and routes telemetry
#   - Jaeger — distributed tracing backend + UI
#   - Prometheus — metrics storage + querying
#   - Grafana — unified dashboards
#
# Ports:
#   4317  — OTLP gRPC (send traces/metrics/logs here)
#   4318  — OTLP HTTP
#   16686 — Jaeger UI
#   9090  — Prometheus UI
#   3000  — Grafana UI (admin/admin)
#
# Usage:
#   docker compose up -d
#   export OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "8889:8889"     # Prometheus metrics export
      - "8888:8888"     # Collector self-metrics
      - "13133:13133"   # Health check
      - "55679:55679"   # zpages
    environment:
      - DEPLOYMENT_ENV=development
      - TRACES_BACKEND_ENDPOINT=jaeger:4317
      - TRACES_TLS_INSECURE=true
      - LOGS_BACKEND_ENDPOINT=jaeger:4317
      - LOGS_TLS_INSECURE=true
    depends_on:
      jaeger:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

  jaeger:
    image: jaegertracing/all-in-one:1.64
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # Jaeger HTTP collector (legacy)
    volumes:
      - jaeger-data:/badger
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_DEFAULT_THEME=dark
      - GF_EXPLORE_ENABLED=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  jaeger-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
