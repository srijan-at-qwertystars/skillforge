# =============================================================================
# Logstash Multi-Pipeline Configuration
# =============================================================================
# This pipeline handles multiple input sources, applies conditional processing,
# enriches events with geoip/useragent data, and routes to typed ES indices.
# =============================================================================

# =============================================================================
# INPUT SECTION
# =============================================================================
# Multiple input sources, each tagged for downstream conditional processing.

input {

  # ---------------------------------------------------------------------------
  # Beats input (Filebeat, Metricbeat, etc.)
  # ---------------------------------------------------------------------------
  # Primary input for structured data from Elastic Beats agents.
  beats {
    port => 5044
    tags => ["beats"]
    # TLS for encrypted beat communication (uncomment for production)
    # ssl => true
    # ssl_certificate => "/etc/logstash/certs/logstash.crt"
    # ssl_key => "/etc/logstash/certs/logstash.key"
  }

  # ---------------------------------------------------------------------------
  # TCP Syslog input
  # ---------------------------------------------------------------------------
  # Receives RFC3164/RFC5424 syslog messages from network devices, servers, etc.
  tcp {
    port => 5514
    type => "syslog"
    tags => ["syslog", "tcp"]
  }

  # ---------------------------------------------------------------------------
  # HTTP Webhook input
  # ---------------------------------------------------------------------------
  # Accepts JSON payloads from external services (CI/CD, alerting, custom apps).
  http {
    port => 8080
    type => "webhook"
    tags => ["webhook", "http"]
    # Optional: restrict to specific content types
    additional_codecs => {
      "application/json" => "json"
    }
    # Basic auth for webhook security (set via environment variables)
    user => "${WEBHOOK_USER:webhook}"
    password => "${WEBHOOK_PASSWORD:changeme}"
  }
}

# =============================================================================
# FILTER SECTION
# =============================================================================
# Conditional processing based on type, tags, and content.

filter {

  # ---------------------------------------------------------------------------
  # SYSLOG PROCESSING
  # ---------------------------------------------------------------------------
  if [type] == "syslog" {

    # Parse standard syslog format (RFC3164)
    grok {
      match => {
        "message" => [
          # Standard syslog: <priority>timestamp hostname program[pid]: message
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid:int}\])?: %{GREEDYDATA:syslog_message}",
          # RFC5424 syslog
          "%{TIMESTAMP_ISO8601:syslog_timestamp} %{SYSLOGHOST:syslog_host} %{DATA:syslog_program} %{POSINT:syslog_pid:int} %{DATA:syslog_msgid} %{GREEDYDATA:syslog_message}"
        ]
      }
      tag_on_failure => ["_grok_syslog_failure"]
    }

    # Normalize syslog timestamp to @timestamp
    date {
      match => [
        "syslog_timestamp",
        "MMM  d HH:mm:ss",
        "MMM dd HH:mm:ss",
        "ISO8601"
      ]
      target => "@timestamp"
      timezone => "UTC"
    }

    # Move parsed message to top level and remove original
    mutate {
      rename => { "syslog_message" => "message" }
      add_field => { "[@metadata][index_prefix]" => "syslog" }
    }
  }

  # ---------------------------------------------------------------------------
  # APACHE / NGINX ACCESS LOG PROCESSING
  # ---------------------------------------------------------------------------
  if [fileset][name] == "access" or "apache" in [tags] or "nginx" in [tags] {

    # Parse combined log format used by Apache and Nginx
    grok {
      match => {
        "message" => [
          # Combined log format
          "%{IPORHOST:source.address} - %{DATA:user.name} \[%{HTTPDATE:apache_timestamp}\] \"%{WORD:http.request.method} %{URIPATHPARAM:url.path} HTTP/%{NUMBER:http.version}\" %{NUMBER:http.response.status_code:int} %{NUMBER:http.response.body.bytes:int} \"%{DATA:http.request.referrer}\" \"%{DATA:user_agent.original}\"",
          # Common log format (no referrer/UA)
          "%{IPORHOST:source.address} - %{DATA:user.name} \[%{HTTPDATE:apache_timestamp}\] \"%{WORD:http.request.method} %{URIPATHPARAM:url.path} HTTP/%{NUMBER:http.version}\" %{NUMBER:http.response.status_code:int} %{NUMBER:http.response.body.bytes:int}"
        ]
      }
      tag_on_failure => ["_grok_access_log_failure"]
    }

    # Parse Apache/Nginx date format
    date {
      match => ["apache_timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }

    # GeoIP lookup on client IP for geographic dashboards
    geoip {
      source => "source.address"
      target => "source.geo"
      # Use the bundled GeoLite2 database or mount a custom one
      # database => "/etc/logstash/GeoLite2-City.mmdb"
      tag_on_failure => ["_geoip_lookup_failure"]
    }

    # Parse the User-Agent string into structured fields
    useragent {
      source => "user_agent.original"
      target => "user_agent"
      # Keep the original UA string alongside parsed fields
    }

    # Type conversions and field cleanup
    mutate {
      convert => {
        "http.response.status_code" => "integer"
        "http.response.body.bytes" => "integer"
      }
      remove_field => ["apache_timestamp"]
      add_field => { "[@metadata][index_prefix]" => "webaccess" }
    }

    # Drop health check requests to reduce noise
    if [url.path] =~ /^\/(healthz?|readyz?|status|ping)$/ {
      drop { }
    }
  }

  # ---------------------------------------------------------------------------
  # APPLICATION LOG PROCESSING
  # ---------------------------------------------------------------------------
  if [fields][log_type] == "application" or "app" in [tags] {

    # Parse structured application logs (JSON or key=value)
    grok {
      match => {
        "message" => [
          # JSON-structured app log line with log level
          "%{TIMESTAMP_ISO8601:app_timestamp}\s+%{LOGLEVEL:log.level}\s+\[%{DATA:app.thread}\]\s+%{DATA:app.logger}\s+-\s+%{GREEDYDATA:app.message}",
          # Key-value style logs
          "%{TIMESTAMP_ISO8601:app_timestamp}\s+%{LOGLEVEL:log.level}\s+%{GREEDYDATA:app.message}"
        ]
      }
      tag_on_failure => ["_grok_app_failure"]
    }

    # Handle multiple application timestamp formats
    date {
      match => [
        "app_timestamp",
        "ISO8601",
        "yyyy-MM-dd HH:mm:ss.SSS",
        "yyyy-MM-dd HH:mm:ss,SSS",
        "yyyy-MM-dd'T'HH:mm:ss.SSSZ"
      ]
      target => "@timestamp"
    }

    # Normalize log level to lowercase for consistent querying
    mutate {
      lowercase => ["log.level"]
      remove_field => ["app_timestamp"]
      add_field => { "[@metadata][index_prefix]" => "application" }
    }

    # Custom Ruby filter: calculate request duration percentile bucket
    ruby {
      code => '
        duration = event.get("[app][duration_ms]")
        if duration.is_a?(Numeric)
          bucket = case duration
                   when 0..100   then "fast"
                   when 101..500 then "normal"
                   when 501..2000 then "slow"
                   else "critical"
                   end
          event.set("[app][performance_bucket]", bucket)
        end
      '
      tag_on_exception => "_ruby_duration_error"
    }
  }

  # ---------------------------------------------------------------------------
  # WEBHOOK EVENT PROCESSING
  # ---------------------------------------------------------------------------
  if [type] == "webhook" {

    # Webhook payloads arrive as JSON — ensure they are parsed
    if ![json_parsed] {
      json {
        source => "message"
        target => "webhook"
        tag_on_failure => ["_json_parse_failure"]
      }
    }

    # Add metadata about the webhook source
    mutate {
      add_field => {
        "[@metadata][index_prefix]" => "webhook"
        "event.kind" => "event"
      }
    }
  }

  # ---------------------------------------------------------------------------
  # COMMON PROCESSING (applied to all events)
  # ---------------------------------------------------------------------------

  # Fingerprint for deduplication: generate a hash from key fields
  # Events with the same fingerprint within the same ES index will be deduped
  fingerprint {
    source => ["message", "@timestamp", "host.name"]
    target => "[@metadata][fingerprint]"
    method => "SHA256"
    concatenate_sources => true
  }

  # Drop events that failed all grok parsing (likely garbage)
  if "_grok_syslog_failure" in [tags] and "_grok_access_log_failure" in [tags] and "_grok_app_failure" in [tags] {
    drop {
      percentage => 50
    }
  }

  # Field cleanup: remove internal Logstash fields before sending to ES
  mutate {
    remove_field => ["@version", "agent.ephemeral_id"]
    # Rename fields to align with Elastic Common Schema (ECS)
    rename => {
      "hostname" => "[host][name]"
      "ip"       => "[host][ip]"
    }
  }

  # Set a default index prefix if none was assigned by type-specific processing
  if ![@metadata][index_prefix] {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "logstash" }
    }
  }
}

# =============================================================================
# OUTPUT SECTION
# =============================================================================
# Route events to appropriate Elasticsearch indices based on type/tags.

output {

  # ---------------------------------------------------------------------------
  # Primary output: Elasticsearch
  # ---------------------------------------------------------------------------
  elasticsearch {
    # Connect to all ES nodes for load balancing and HA
    hosts => [
      "http://es01:9200",
      "http://es02:9200",
      "http://es03:9200"
    ]

    # Authentication
    user => "${ES_USER:elastic}"
    password => "${ES_PASSWORD:changeme}"

    # TLS settings (uncomment for HTTPS)
    # ssl => true
    # cacert => "/etc/logstash/certs/ca.crt"
    # ssl_certificate_verification => true

    # Index routing: use metadata set in the filter section
    # Results in indices like: syslog-2025.01.15, webaccess-2025.01.15, etc.
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"

    # ILM (Index Lifecycle Management) integration
    ilm_enabled => true
    ilm_rollover_alias => "%{[@metadata][index_prefix]}"
    ilm_pattern => "000001"
    ilm_policy => "elk-lifecycle-policy"

    # Use the fingerprint for document ID to enable deduplication
    document_id => "%{[@metadata][fingerprint]}"

    # Pipeline: optionally run an ES ingest pipeline for final enrichment
    # pipeline => "final-enrichment"

    # Dead letter queue: failed events go to DLQ instead of being dropped
    # DLQ is managed at the Logstash level (logstash.yml: dead_letter_queue.enable)
  }

  # ---------------------------------------------------------------------------
  # Debug output: stdout (enable via LOGSTASH_DEBUG environment variable)
  # ---------------------------------------------------------------------------
  if [@metadata][index_prefix] == "webhook" or "${LOGSTASH_DEBUG:false}" == "true" {
    stdout {
      codec => rubydebug {
        metadata => true
      }
    }
  }
}
