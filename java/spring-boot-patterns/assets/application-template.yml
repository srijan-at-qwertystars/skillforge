# =============================================================================
# Spring Boot Application Configuration Template
# =============================================================================
# Comprehensive application.yml with common configurations.
# Copy relevant sections to your project's src/main/resources/application.yml.
# Use environment variables for secrets: ${ENV_VAR:default_value}
# =============================================================================

spring:
  application:
    name: ${APP_NAME:myapp}

  # ---------------------------------------------------------------------------
  # Profiles
  # ---------------------------------------------------------------------------
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
    group:
      dev: local,debug
      prod: cloud,monitoring

  # ---------------------------------------------------------------------------
  # DataSource & JPA
  # ---------------------------------------------------------------------------
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/mydb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      pool-name: HikariPool-Primary

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 25
          fetch_size: 100
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 16
        query:
          in_clause_parameter_padding: true

  # ---------------------------------------------------------------------------
  # Flyway Migration
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # ---------------------------------------------------------------------------
  # Redis / Cache
  # ---------------------------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false
      key-prefix: "${spring.application.name}:cache:"

  # ---------------------------------------------------------------------------
  # Jackson JSON
  # ---------------------------------------------------------------------------
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSSZ

  # ---------------------------------------------------------------------------
  # Mail
  # ---------------------------------------------------------------------------
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp:
        auth: true
        starttls.enable: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

  # ---------------------------------------------------------------------------
  # Kafka
  # ---------------------------------------------------------------------------
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

  # ---------------------------------------------------------------------------
  # Virtual Threads (Spring Boot 3.2+)
  # ---------------------------------------------------------------------------
  threads:
    virtual:
      enabled: ${VIRTUAL_THREADS:true}

  # ---------------------------------------------------------------------------
  # Security — OAuth2 Resource Server
  # ---------------------------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH_ISSUER:https://auth.example.com}

  # ---------------------------------------------------------------------------
  # Docker Compose (Spring Boot 3.1+)
  # ---------------------------------------------------------------------------
  docker:
    compose:
      enabled: true
      lifecycle-management: start-and-stop
      file: docker-compose.yml

# =============================================================================
# Server Configuration
# =============================================================================
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024
  tomcat:
    max-threads: ${TOMCAT_MAX_THREADS:200}
    accept-count: 100
    connection-timeout: 5000
    max-http-form-post-size: 10MB
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false
  servlet:
    session:
      timeout: 30m
      cookie:
        secure: true
        http-only: true
        same-site: lax

# =============================================================================
# Actuator & Monitoring
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,conditions
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis
  info:
    env:
      enabled: true
    git:
      mode: full
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

# =============================================================================
# Logging
# =============================================================================
logging:
  level:
    root: INFO
    com.example: ${LOG_LEVEL:INFO}
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/${spring.application.name}.log}
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
      total-size-cap: 1GB

# =============================================================================
# Application-Specific Properties
# =============================================================================
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
    max-age: 3600
  rate-limit:
    enabled: true
    requests-per-minute: 60
  feature-flags:
    new-pricing: false
    beta-features: false

---
# =============================================================================
# Dev Profile
# =============================================================================
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

logging:
  level:
    com.example: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

---
# =============================================================================
# Prod Profile
# =============================================================================
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

server:
  tomcat:
    max-threads: 400
  compression:
    enabled: true
