# =============================================================================
# GitHub Actions — OpenAPI CI/CD Pipeline
#
# Validates the spec, checks for breaking changes, generates client SDK,
# publishes documentation, and optionally publishes SDK to npm.
#
# Copy to .github/workflows/openapi.yml in your repository.
#
# Required secrets:
#   NPM_TOKEN — npm access token (for SDK publishing)
#
# Required variables:
#   SPEC_FILE — path to OpenAPI spec (default: openapi.yaml)
# =============================================================================
name: OpenAPI CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'openapi.yaml'
      - 'openapi/**'
      - 'specs/**'
      - '.spectral.yaml'
      - 'redocly.yaml'
  pull_request:
    paths:
      - 'openapi.yaml'
      - 'openapi/**'
      - 'specs/**'
      - '.spectral.yaml'
      - 'redocly.yaml'
  workflow_dispatch:
    inputs:
      publish_sdk:
        description: 'Publish SDK to npm'
        required: false
        type: boolean
        default: false

env:
  SPEC_FILE: ${{ vars.SPEC_FILE || 'openapi.yaml' }}
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  # ── Validate ───────────────────────────────────────────────────────────────
  validate:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install validation tools
        run: |
          npm install -g @stoplight/spectral-cli @redocly/cli @apidevtools/swagger-cli

      - name: Validate with swagger-cli
        run: swagger-cli validate ${{ env.SPEC_FILE }}

      - name: Lint with Spectral
        run: spectral lint ${{ env.SPEC_FILE }} --fail-severity error

      - name: Lint with Redocly
        run: redocly lint ${{ env.SPEC_FILE }}

      - name: Bundle spec
        run: |
          redocly bundle ${{ env.SPEC_FILE }} -o bundled-openapi.yaml
          echo "Bundled spec size: $(wc -l < bundled-openapi.yaml) lines"

      - name: Upload bundled spec
        uses: actions/upload-artifact@v4
        with:
          name: bundled-spec
          path: bundled-openapi.yaml
          retention-days: 30

  # ── Breaking change detection ──────────────────────────────────────────────
  breaking-changes:
    name: Check Breaking Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get base spec from target branch
        run: |
          git show origin/${{ github.base_ref }}:${{ env.SPEC_FILE }} > base-spec.yaml 2>/dev/null || {
            echo "No spec file in base branch; skipping breaking change check"
            echo "SKIP_CHECK=true" >> $GITHUB_ENV
          }

      - name: Install oasdiff
        if: env.SKIP_CHECK != 'true'
        run: |
          go install github.com/tufin/oasdiff@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Check for breaking changes
        if: env.SKIP_CHECK != 'true'
        run: |
          echo "## API Breaking Change Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if oasdiff breaking base-spec.yaml ${{ env.SPEC_FILE }} --fail-on ERR; then
            echo "✅ No breaking changes detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Breaking changes detected!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            oasdiff breaking base-spec.yaml ${{ env.SPEC_FILE }} 2>&1 >> $GITHUB_STEP_SUMMARY || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Generate changelog
        if: env.SKIP_CHECK != 'true'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Changelog" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          oasdiff changelog base-spec.yaml ${{ env.SPEC_FILE }} 2>&1 >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Generate Client SDK ────────────────────────────────────────────────────
  generate-sdk:
    name: Generate TypeScript SDK
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Install openapi-generator
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Download bundled spec
        uses: actions/download-artifact@v4
        with:
          name: bundled-spec

      - name: Generate TypeScript client
        run: |
          openapi-generator-cli generate \
            -i bundled-openapi.yaml \
            -g typescript-axios \
            -o ./sdk \
            --additional-properties=\
          supportsES6=true,\
          npmName=@myorg/api-client,\
          npmVersion=0.0.0-${{ github.sha }},\
          withInterfaces=true,\
          useSingleRequestParameter=true

      - name: Build SDK
        working-directory: ./sdk
        run: |
          npm install
          npm run build

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: typescript-sdk
          path: ./sdk
          retention-days: 30

  # ── Build Documentation ────────────────────────────────────────────────────
  build-docs:
    name: Build API Documentation
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Redocly
        run: npm install -g @redocly/cli

      - name: Download bundled spec
        uses: actions/download-artifact@v4
        with:
          name: bundled-spec

      - name: Build documentation
        run: |
          redocly build-docs bundled-openapi.yaml \
            -o docs/index.html \
            --title "API Documentation"

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/
          retention-days: 30

  # ── Publish Documentation (GitHub Pages) ───────────────────────────────────
  publish-docs:
    name: Publish to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: api-docs
          path: docs/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Publish SDK to npm ─────────────────────────────────────────────────────
  publish-sdk:
    name: Publish SDK to npm
    runs-on: ubuntu-latest
    needs: generate-sdk
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || inputs.publish_sdk == true)
    steps:
      - name: Download SDK artifact
        uses: actions/download-artifact@v4
        with:
          name: typescript-sdk
          path: sdk/

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org/

      - name: Publish to npm
        working-directory: sdk/
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
