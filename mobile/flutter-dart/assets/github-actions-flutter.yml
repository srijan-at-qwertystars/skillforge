# ============================================================================
# GitHub Actions — Flutter CI/CD Pipeline
# Copy to .github/workflows/flutter.yml
# ============================================================================

name: Flutter CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.x'
  JAVA_VERSION: '17'
  MIN_COVERAGE: 80

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Analyze, Format, Test
  # ──────────────────────────────────────────────────────────────────────────
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool/
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Run analyzer
        run: dart analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage --reporter=expanded

      - name: Process coverage
        run: |
          sudo apt-get install -y lcov > /dev/null 2>&1
          lcov --remove coverage/lcov.info \
            '**/*.g.dart' \
            '**/*.freezed.dart' \
            '**/*.gr.dart' \
            '**/*.gen.dart' \
            '**/*.mocks.dart' \
            '**/generated/**' \
            -o coverage/lcov_filtered.info \
            --quiet
          genhtml coverage/lcov_filtered.info \
            -o coverage/html \
            --quiet

      - name: Enforce coverage threshold
        run: |
          COVERAGE=$(lcov --summary coverage/lcov_filtered.info 2>&1 | \
            grep -oP 'lines\.*: \K[0-9.]+' || echo "0")
          echo "### Code Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          if (( $(echo "$COVERAGE < ${{ env.MIN_COVERAGE }}" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below ${{ env.MIN_COVERAGE }}% threshold"
            exit 1
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/html/
          retention-days: 7

      - name: Upload to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov_filtered.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # Build Android (APK + AAB)
  # ──────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Analyze APK size
        run: |
          APK_SIZE=$(du -sh build/app/outputs/flutter-apk/app-arm64-v8a-release.apk | cut -f1)
          echo "### Android APK size: ${APK_SIZE}" >> $GITHUB_STEP_SUMMARY

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Build iOS (no codesign for CI)
  # ──────────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.app
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Build Web
  # ──────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release --web-renderer canvaskit

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web/
          retention-days: 14

  # ──────────────────────────────────────────────────────────────────────────
  # Golden Tests (macOS for font consistency)
  # ──────────────────────────────────────────────────────────────────────────
  golden-tests:
    name: Golden Tests
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run golden tests
        run: flutter test test/golden/ --reporter=expanded

      - name: Upload golden failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: test/golden/failures/
          retention-days: 7
