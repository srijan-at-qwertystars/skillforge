---
# inventory/hosts.yml — Static YAML inventory example
# Usage: ansible-playbook -i inventory/hosts.yml site.yml
all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ntp_server: pool.ntp.org
    dns_servers:
      - 10.0.0.2
      - 10.0.0.3
  children:
    production:
      vars:
        env: production
      children:
        webservers:
          vars:
            ansible_user: deploy
            nginx_worker_processes: auto
          hosts:
            web1.example.com:
              ansible_host: 10.0.1.10
              http_port: 80
            web2.example.com:
              ansible_host: 10.0.1.11
              http_port: 80
            web3.example.com:
              ansible_host: 10.0.1.12
              http_port: 80

        appservers:
          vars:
            ansible_user: deploy
            app_java_opts: "-Xmx2g"
          hosts:
            app1.example.com:
              ansible_host: 10.0.2.10
              app_port: 8080
            app2.example.com:
              ansible_host: 10.0.2.11
              app_port: 8080

        dbservers:
          vars:
            ansible_user: postgres
            pg_version: "16"
          children:
            db_primary:
              hosts:
                db-primary.example.com:
                  ansible_host: 10.0.3.10
                  pg_role: primary
            db_replica:
              hosts:
                db-replica1.example.com:
                  ansible_host: 10.0.3.11
                  pg_role: replica
                db-replica2.example.com:
                  ansible_host: 10.0.3.12
                  pg_role: replica

        monitoring:
          hosts:
            prometheus.example.com:
              ansible_host: 10.0.4.10
            grafana.example.com:
              ansible_host: 10.0.4.11

    staging:
      vars:
        env: staging
      children:
        staging_webservers:
          hosts:
            staging-web1.example.com:
              ansible_host: 10.1.1.10
              http_port: 80
        staging_appservers:
          hosts:
            staging-app1.example.com:
              ansible_host: 10.1.2.10
              app_port: 8080
        staging_dbservers:
          hosts:
            staging-db1.example.com:
              ansible_host: 10.1.3.10
              pg_role: primary
