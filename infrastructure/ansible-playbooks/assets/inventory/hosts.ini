# inventory/hosts.ini — Static INI inventory example
# Usage: ansible-playbook -i inventory/hosts.ini site.yml

# --- Web Servers ---
[webservers]
web1.example.com ansible_host=10.0.1.10 http_port=80
web2.example.com ansible_host=10.0.1.11 http_port=80
web3.example.com ansible_host=10.0.1.12 http_port=80

[webservers:vars]
ansible_user=deploy
nginx_worker_processes=auto

# --- Application Servers ---
[appservers]
app1.example.com ansible_host=10.0.2.10 app_port=8080
app2.example.com ansible_host=10.0.2.11 app_port=8080

[appservers:vars]
ansible_user=deploy
app_java_opts=-Xmx2g

# --- Database Servers ---
[dbservers]
db-primary.example.com ansible_host=10.0.3.10 pg_role=primary
db-replica1.example.com ansible_host=10.0.3.11 pg_role=replica
db-replica2.example.com ansible_host=10.0.3.12 pg_role=replica

[db_primary]
db-primary.example.com

[db_replica]
db-replica1.example.com
db-replica2.example.com

[dbservers:children]
db_primary
db_replica

[dbservers:vars]
ansible_user=postgres
pg_version=16

# --- Monitoring ---
[monitoring]
prometheus.example.com ansible_host=10.0.4.10
grafana.example.com ansible_host=10.0.4.11

# --- Environment Groups ---
[production:children]
webservers
appservers
dbservers
monitoring

[production:vars]
env=production
ansible_python_interpreter=/usr/bin/python3

# --- All hosts ---
[all:vars]
ansible_python_interpreter=/usr/bin/python3
ntp_server=pool.ntp.org
dns_servers=["10.0.0.2", "10.0.0.3"]
