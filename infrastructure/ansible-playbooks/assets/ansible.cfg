# ansible.cfg — Production-ready Ansible configuration
# Place in project root or /etc/ansible/ansible.cfg
# Precedence: ANSIBLE_CONFIG env > ./ansible.cfg > ~/.ansible.cfg > /etc/ansible/ansible.cfg

[defaults]
# --- Inventory ---
inventory = ./inventory
# Enable multiple inventory plugins
enable_plugins = host_list, script, auto, yaml, ini, toml

# --- Performance ---
forks = 50
# Smart gathering caches facts and only gathers when missing
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 86400
# Pipelining reduces SSH operations (requires !requiretty in sudoers)
pipelining = True
# Internal poll interval for async tasks
internal_poll_interval = 0.001

# --- Execution ---
strategy = linear
# Retry files for failed hosts
retry_files_enabled = True
retry_files_save_path = /tmp/ansible-retry
# Timeout for connection attempts
timeout = 30

# --- Output ---
# Human-readable stdout
stdout_callback = yaml
# Enable useful callback plugins
callbacks_enabled = profile_tasks, timer

# --- Privilege escalation defaults ---
become = False
become_method = sudo
become_user = root
become_ask_pass = False

# --- Vault ---
# vault_password_file = ~/.vault_pass
# vault_identity_list = dev@~/.vault_dev, prod@~/.vault_prod

# --- Roles ---
roles_path = ./roles:~/.ansible/roles:/etc/ansible/roles

# --- Collections ---
collections_path = ./collections:~/.ansible/collections

# --- Logging ---
log_path = /var/log/ansible.log
# Suppress deprecation warnings in production
deprecation_warnings = False
# Show custom stats at end of play
show_custom_stats = True

# --- Security ---
# Avoid storing facts in shared temp
local_tmp = ~/.ansible/tmp
remote_tmp = ~/.ansible/tmp
# Don't display skipped hosts
display_skipped_hosts = False

# --- Interpreter ---
interpreter_python = auto_silent

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# Pipelining eliminates temp file transfer overhead
pipelining = True
# SSH multiplexing for connection reuse
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey -o StrictHostKeyChecking=accept-new
control_path_dir = ~/.ansible/cp
control_path = %(directory)s/%%h-%%r
# Prefer piped transfer (faster than SCP/SFTP for most files)
transfer_method = piped
# Retry on transient SSH failures
retries = 3

[persistent_connection]
connect_timeout = 30
command_timeout = 30
connect_retry_timeout = 15

[colors]
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan
