# =============================================================================
# wireguard-template.conf — WireGuard Server + Client Configuration Template
# =============================================================================
# Setup steps:
#   1. Install: apt install wireguard  /  dnf install wireguard-tools
#   2. Generate keys:
#        wg genkey | tee server_private.key | wg pubkey > server_public.key
#        wg genkey | tee client1_private.key | wg pubkey > client1_public.key
#        (optional) wg genpsk > preshared.key
#   3. Fill in keys below and copy configs:
#        Server: /etc/wireguard/wg0.conf
#        Client: share client config securely
#   4. Enable: wg-quick up wg0 && systemctl enable wg-quick@wg0
#   5. Verify: wg show
#
# Network design:
#   Server VPN IP: 10.0.0.1/24
#   Client 1:      10.0.0.2/32
#   Client 2:      10.0.0.3/32
#   VPN port:      51820/udp
# =============================================================================


# ═════════════════════════════════════════════════════════════════════════════
# SERVER CONFIGURATION — /etc/wireguard/wg0.conf
# ═════════════════════════════════════════════════════════════════════════════

# [Interface]
# # Server private key (from: wg genkey)
# PrivateKey = <SERVER_PRIVATE_KEY>
#
# # VPN address for this server
# Address = 10.0.0.1/24
#
# # Listening port
# ListenPort = 51820
#
# # Optional: DNS for the VPN interface (if server also provides DNS)
# # DNS = 10.0.0.1
#
# # Enable IP forwarding and NAT when interface comes up
# PostUp = sysctl -w net.ipv4.ip_forward=1
# PostUp = iptables -A FORWARD -i wg0 -j ACCEPT
# PostUp = iptables -A FORWARD -o wg0 -j ACCEPT
# PostUp = iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
#
# PostDown = iptables -D FORWARD -i wg0 -j ACCEPT
# PostDown = iptables -D FORWARD -o wg0 -j ACCEPT
# PostDown = iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
#
# # Optional: save config changes at runtime
# SaveConfig = false
#
# # ── Client 1 ──────────────────────────────────────────────────────────
# [Peer]
# # Client 1 public key
# PublicKey = <CLIENT1_PUBLIC_KEY>
#
# # Optional: pre-shared key for additional symmetric encryption
# PresharedKey = <PRESHARED_KEY>
#
# # IP address(es) this peer is allowed to use
# AllowedIPs = 10.0.0.2/32
#
# # Optional: keepalive for NAT traversal (25 seconds is common)
# # PersistentKeepalive = 25
#
# # ── Client 2 ──────────────────────────────────────────────────────────
# [Peer]
# PublicKey = <CLIENT2_PUBLIC_KEY>
# PresharedKey = <PRESHARED_KEY>
# AllowedIPs = 10.0.0.3/32


# ═════════════════════════════════════════════════════════════════════════════
# CLIENT 1 CONFIGURATION — Full tunnel (all traffic through VPN)
# ═════════════════════════════════════════════════════════════════════════════

# [Interface]
# # Client private key
# PrivateKey = <CLIENT1_PRIVATE_KEY>
#
# # Client VPN address
# Address = 10.0.0.2/32
#
# # DNS to use through the VPN
# DNS = 1.1.1.1, 8.8.8.8
#
# # Optional: MTU (default auto-detected, lower for tunnels-in-tunnels)
# # MTU = 1420
#
# [Peer]
# # Server public key
# PublicKey = <SERVER_PUBLIC_KEY>
#
# # Optional: pre-shared key (must match server config)
# PresharedKey = <PRESHARED_KEY>
#
# # Route ALL traffic through VPN (full tunnel)
# AllowedIPs = 0.0.0.0/0, ::/0
#
# # Server endpoint
# Endpoint = server.example.com:51820
#
# # Keep connection alive through NAT
# PersistentKeepalive = 25


# ═════════════════════════════════════════════════════════════════════════════
# CLIENT 2 CONFIGURATION — Split tunnel (only VPN subnet through VPN)
# ═════════════════════════════════════════════════════════════════════════════

# [Interface]
# PrivateKey = <CLIENT2_PRIVATE_KEY>
# Address = 10.0.0.3/32
# # No DNS override — uses system DNS for non-VPN traffic
#
# [Peer]
# PublicKey = <SERVER_PUBLIC_KEY>
# PresharedKey = <PRESHARED_KEY>
#
# # Only route VPN subnet traffic through the tunnel (split tunnel)
# AllowedIPs = 10.0.0.0/24
#
# Endpoint = server.example.com:51820
# PersistentKeepalive = 25


# ═════════════════════════════════════════════════════════════════════════════
# SITE-TO-SITE CONFIGURATION EXAMPLE
# ═════════════════════════════════════════════════════════════════════════════
#
# Site A (192.168.1.0/24) ←──WireGuard──→ Site B (192.168.2.0/24)
#
# ── Site A server (/etc/wireguard/wg0.conf) ──
# [Interface]
# PrivateKey = <SITE_A_PRIVATE_KEY>
# Address = 10.0.0.1/30
# ListenPort = 51820
# PostUp = sysctl -w net.ipv4.ip_forward=1
#
# [Peer]
# PublicKey = <SITE_B_PUBLIC_KEY>
# AllowedIPs = 10.0.0.2/32, 192.168.2.0/24
# Endpoint = site-b.example.com:51820
# PersistentKeepalive = 25
#
# ── Site B server (/etc/wireguard/wg0.conf) ──
# [Interface]
# PrivateKey = <SITE_B_PRIVATE_KEY>
# Address = 10.0.0.2/30
# ListenPort = 51820
# PostUp = sysctl -w net.ipv4.ip_forward=1
#
# [Peer]
# PublicKey = <SITE_A_PUBLIC_KEY>
# AllowedIPs = 10.0.0.1/32, 192.168.1.0/24
# Endpoint = site-a.example.com:51820
# PersistentKeepalive = 25
