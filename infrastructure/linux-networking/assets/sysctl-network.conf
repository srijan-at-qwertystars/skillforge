# =============================================================================
# sysctl-network.conf — Network-related sysctl parameters
# =============================================================================
# Install: sudo cp sysctl-network.conf /etc/sysctl.d/90-network.conf
# Apply:   sudo sysctl -p /etc/sysctl.d/90-network.conf
#
# This file covers both security hardening and performance tuning.
# Review each section and adjust values for your workload.
# =============================================================================

# ─── Security Hardening ─────────────────────────────────────────────────────

# Reverse path filtering — drop packets with spoofed source addresses
# 1 = strict (recommended for hosts), 2 = loose (for multi-homed / asymmetric routing)
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# SYN cookies — protect against SYN flood attacks
net.ipv4.tcp_syncookies = 1

# Don't accept source-routed packets (used for IP spoofing)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# Don't accept ICMP redirects (prevents MITM via gateway injection)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Don't send ICMP redirects (only routers should send these)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Ignore broadcast ICMP echo (Smurf attack prevention)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore bogus ICMP error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Log packets with impossible source addresses (martians)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Don't act as a router (disable unless this IS a router)
# net.ipv4.ip_forward = 0
# net.ipv6.conf.all.forwarding = 0

# Reduce SYN-ACK retries (limits exposure during SYN floods)
net.ipv4.tcp_synack_retries = 3

# ─── TCP Performance Tuning ─────────────────────────────────────────────────

# Listen backlog — max pending connections (default 128, raise for busy servers)
net.core.somaxconn = 4096

# Incoming packet backlog queue
net.core.netdev_max_backlog = 5000

# Max half-open (SYN_RECV) connections
net.ipv4.tcp_max_syn_backlog = 4096

# TCP keepalive — detect dead connections faster
net.ipv4.tcp_keepalive_time = 600        # idle time before keepalive (default 7200)
net.ipv4.tcp_keepalive_intvl = 30         # interval between probes
net.ipv4.tcp_keepalive_probes = 10        # probes before giving up

# TIME-WAIT management
net.ipv4.tcp_tw_reuse = 1                 # reuse TIME_WAIT sockets safely
net.ipv4.tcp_fin_timeout = 15             # FIN_WAIT2 timeout (default 60)
# NEVER use tcp_tw_recycle — removed from kernel 4.12+, broke NAT

# Ephemeral port range
net.ipv4.ip_local_port_range = 1024 65535

# ─── Buffer Sizes ────────────────────────────────────────────────────────────

# Socket buffer maximums
net.core.rmem_max = 16777216              # 16MB max receive buffer
net.core.wmem_max = 16777216              # 16MB max send buffer
net.core.rmem_default = 262144            # 256KB default receive buffer
net.core.wmem_default = 262144            # 256KB default send buffer

# TCP buffer sizes (min / default / max) in bytes
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# TCP memory limits (pages) — auto-tuned, rarely need manual setting
# net.ipv4.tcp_mem = 786432 1048576 1572864

# Enable TCP window scaling
net.ipv4.tcp_window_scaling = 1

# ─── Congestion Control ─────────────────────────────────────────────────────

# BBR congestion control (better for long-distance and lossy links)
# Requires kernel 4.9+ and fq qdisc
# net.ipv4.tcp_congestion_control = bbr
# net.core.default_qdisc = fq

# ─── Connection Tracking (conntrack) ────────────────────────────────────────

# Max tracked connections (increase for busy NAT/firewalls)
# Default is usually 65536; raise for high-connection servers
# net.netfilter.nf_conntrack_max = 262144

# Conntrack timeout tuning
# net.netfilter.nf_conntrack_tcp_timeout_established = 432000  # 5 days (default)
# net.netfilter.nf_conntrack_tcp_timeout_time_wait = 120
# net.netfilter.nf_conntrack_tcp_timeout_close_wait = 60

# ─── IPv6 ────────────────────────────────────────────────────────────────────

# Disable IPv6 entirely (if not needed)
# net.ipv6.conf.all.disable_ipv6 = 1
# net.ipv6.conf.default.disable_ipv6 = 1
# net.ipv6.conf.lo.disable_ipv6 = 1

# Accept router advertisements only if forwarding is disabled
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0
