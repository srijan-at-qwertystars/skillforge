# Rate Limiting Configuration Template
# Include zone definitions in the http{} block
# Include limit_req/limit_conn directives in server/location blocks
#
# Usage:
#   1. Copy zone definitions to your http{} block in nginx.conf
#   2. Apply limit_req/limit_conn in appropriate server/location blocks
#   3. Test with: for i in $(seq 1 50); do curl -s -o /dev/null -w "%{http_code}\n" https://example.com/; done
#
# Memory: 10m zone ≈ 160,000 unique IPs

# ============================================================
# ZONE DEFINITIONS (place in http{} block)
# ============================================================

# General request rate (10 requests/sec per IP)
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

# Login/authentication (1 request/sec per IP — strict)
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;

# API rate limiting by IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# API rate limiting by API key (for authenticated APIs)
# limit_req_zone $http_x_api_key zone=api_key:10m rate=100r/s;

# Search endpoint (prevent search abuse)
limit_req_zone $binary_remote_addr zone=search:10m rate=5r/s;

# File upload (prevent upload abuse)
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

# Connection limits per IP
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# Connection limits per server
limit_conn_zone $server_name zone=conn_per_server:10m;

# Return 429 Too Many Requests (instead of default 503)
limit_req_status 429;
limit_conn_status 429;

# Log rate limit events at warn level
limit_req_log_level warn;
limit_conn_log_level warn;

# ============================================================
# USAGE EXAMPLES (place in server/location blocks)
# ============================================================

