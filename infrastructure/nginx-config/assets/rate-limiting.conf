# ============================================================
# BURST BEHAVIOR REFERENCE
# ============================================================
#
# burst=N nodelay:
#   Process up to N excess requests immediately without delay.
#   Once burst is full, new requests get 429.
#   Best for: APIs where latency matters.
#
# burst=N (no nodelay):
#   Queue up to N excess requests and process them at the zone rate.
#   Smooths traffic but adds latency to excess requests.
#   Best for: Forms, uploads where slight delay is acceptable.
#
# burst=N delay=D:
#   Process first D requests from burst immediately, delay the rest.
#   Best for: Balanced approach between latency and smoothing.
#
# Example: rate=10r/s burst=20 nodelay
#   - Normal: 10 req/s processed immediately
#   - Burst: up to 30 req/s (10 + 20 burst) processed immediately
#   - Over burst: 429 returned
