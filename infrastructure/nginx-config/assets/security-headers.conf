# Security Headers Snippet
# Include in every server block: include /etc/nginx/snippets/security-headers.conf;
#
# IMPORTANT: add_header in a child location block REPLACES all parent add_header directives.
# If you add custom headers in a location block, you must also include this snippet there.
#
# Test headers: curl -I https://example.com
# Validate: https://securityheaders.com/

# --- Clickjacking Protection ---
# Prevents the page from being embedded in iframes on other sites
# Options: DENY (no framing), SAMEORIGIN (same origin only)
add_header X-Frame-Options "SAMEORIGIN" always;

# --- MIME Type Sniffing Protection ---
# Prevents browsers from interpreting files as a different MIME type
add_header X-Content-Type-Options "nosniff" always;

# --- Referrer Policy ---
# Controls how much referrer information is sent with requests
# strict-origin-when-cross-origin: full URL for same-origin, origin only for cross-origin
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# --- Permissions Policy ---
# Restricts which browser features can be used (camera, mic, location, etc.)
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;

# --- Content Security Policy ---
# Controls which resources the browser is allowed to load
# CUSTOMIZE THIS for your application — this is a strict baseline
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

# --- HSTS (HTTP Strict Transport Security) ---
# Forces HTTPS for all future visits (2 year max-age)
# WARNING: Only enable after confirming HTTPS works on all subdomains
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# --- Cross-Origin Policies ---
# Isolate the browsing context from cross-origin resources
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
# Note: Cross-Origin-Embedder-Policy "require-corp" may break loading
# of third-party resources (CDN scripts, fonts, images). Enable only if
# you control all resources or use crossorigin attributes.
# add_header Cross-Origin-Embedder-Policy "require-corp" always;

# --- Legacy XSS Protection ---
# Modern browsers use CSP instead, but this helps older browsers
add_header X-XSS-Protection "1; mode=block" always;

# --- DNS Prefetch Control ---
# Prevents browsers from prefetching DNS for external links
add_header X-DNS-Prefetch-Control "off" always;

# --- Download Options ---
# Prevents IE from executing downloads in the site's context
add_header X-Download-Options "noopen" always;

# --- Permitted Cross-Domain Policies ---
# Prevents Adobe Flash and PDF from loading data from this domain
add_header X-Permitted-Cross-Domain-Policies "none" always;
