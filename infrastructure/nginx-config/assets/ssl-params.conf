# SSL/TLS Configuration Snippet — Modern Security Settings
# Include in server blocks: include /etc/nginx/snippets/ssl-params.conf;
#
# Achieves A+ rating on SSL Labs (ssllabs.com)
# Compatible with: Firefox 63+, Chrome 70+, Safari 12.1+, Edge 79+, Android 10+

# --- Protocols ---
# Only TLS 1.2 and 1.3 (TLS 1.0 and 1.1 are insecure)
ssl_protocols TLSv1.2 TLSv1.3;

# --- Cipher Suites ---
# ECDHE-only for perfect forward secrecy
# Ordered by: CHACHA20 (mobile-friendly) then AES-GCM
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

# Let client choose cipher (modern recommendation for TLS 1.3)
ssl_prefer_server_ciphers off;

# ECDH curves for key exchange
ssl_ecdh_curves X25519:secp384r1:secp256r1;

# --- Session Caching ---
# Shared cache across workers (10m ≈ 40,000 sessions)
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;

# Disable session tickets (not forward-secret unless keys are rotated)
ssl_session_tickets off;

# --- DH Parameters ---
# Generate: openssl dhparam -out /etc/nginx/dhparam.pem 4096
# Uncomment after generating:
# ssl_dhparam /etc/nginx/dhparam.pem;

# --- OCSP Stapling ---
# Staple OCSP response for faster handshake and better privacy
ssl_stapling on;
ssl_stapling_verify on;

# Trust chain for OCSP verification (use CA chain, not full chain)
# ssl_trusted_certificate /etc/letsencrypt/live/DOMAIN/chain.pem;

# DNS resolver for OCSP responder lookup
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# --- HSTS ---
# Force HTTPS for 2 years, including subdomains, preload-ready
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# --- Early Data (TLS 1.3 0-RTT) ---
# Enables faster reconnections but vulnerable to replay attacks
# Only safe for idempotent (GET) requests
# ssl_early_data on;
# proxy_set_header Early-Data $ssl_early_data;
