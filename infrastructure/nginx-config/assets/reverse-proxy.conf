# Production Reverse Proxy Template
# Includes: WebSocket support, proper headers, caching, health checks
#
# Usage: Copy to /etc/nginx/sites-available/ and customize:
#   1. Replace YOUR_DOMAIN with your actual domain
#   2. Replace BACKEND_HOST:PORT with your upstream address
#   3. Adjust SSL certificate paths
#   4. Enable/disable caching as needed
#
# Test: nginx -t && nginx -s reload

# --- Upstream Definition ---
upstream app_backend {
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;  # Additional backends
    # server 127.0.0.1:3002 backup;                         # Backup server
    keepalive 32;
}

# --- Proxy Cache (optional — uncomment to enable) ---
# proxy_cache_path /var/cache/nginx/app levels=1:2
#     keys_zone=app_cache:10m max_size=1g
#     inactive=60m use_temp_path=off;

# --- HTTP → HTTPS Redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Let's Encrypt challenge support
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # --- SSL ---
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;
    include /etc/nginx/snippets/ssl-params.conf;

    # --- Security Headers ---
    include /etc/nginx/snippets/security-headers.conf;

    # --- Logging ---
    access_log /var/log/nginx/YOUR_DOMAIN.access.log;
    error_log /var/log/nginx/YOUR_DOMAIN.error.log;

    # --- Request Limits ---
    client_max_body_size 50m;

    # --- Main Reverse Proxy ---
    location / {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header Connection "";    # Required for upstream keepalive

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffers
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;

        # Cache control header for debugging
        # add_header X-Cache-Status $upstream_cache_status always;

        # Proxy cache (uncomment with cache path above)
        # proxy_cache app_cache;
        # proxy_cache_valid 200 10m;
        # proxy_cache_valid 404 1m;
        # proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        # proxy_cache_lock on;
        # proxy_cache_key "$scheme$request_method$host$request_uri";
    }

    # --- WebSocket Endpoint ---
    location /ws/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for persistent WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Static Assets (served directly if available) ---
    location /static/ {
        alias /var/www/YOUR_DOMAIN/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;

        # Include security headers (add_header in child block replaces parent)
        include /etc/nginx/snippets/security-headers.conf;
    }

    # --- Health Check Endpoint ---
    location = /health {
        proxy_pass http://app_backend;
        access_log off;
    }

    # --- Block Hidden Files ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --- Error Pages ---
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/errors;
        internal;
    }
}
