# /etc/ssh/sshd_config — Hardened SSH Server Configuration
#
# This is a security-hardened sshd_config template.
# Review and customize before deploying.
#
# IMPORTANT: Before applying, ensure you have:
#   1. An SSH key deployed for at least one non-root user
#   2. Console/out-of-band access as a fallback
#   3. Tested with: sshd -t (syntax check)
#
# After editing: sudo sshd -t && sudo systemctl restart sshd

# ═══════════════════════════════════════════
# Protocol & Listening
# ═══════════════════════════════════════════

# Use a non-standard port (optional, security through obscurity)
Port 22
# Port 2222

# Only listen on specific interfaces if needed
# ListenAddress 0.0.0.0
# ListenAddress ::

# IPv4 only (if IPv6 not needed)
AddressFamily inet

# ═══════════════════════════════════════════
# Cryptographic Settings
# ═══════════════════════════════════════════

# Host keys (Ed25519 preferred; remove DSA and weak RSA)
HostKey /etc/ssh/ssh_host_ed25519_key
# HostKey /etc/ssh/ssh_host_ecdsa_key        # Optional fallback

# Key Exchange: Curve25519 only
KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org

# Ciphers: AEAD only (ChaCha20 preferred, AES-GCM fallback)
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com

# MACs: Encrypt-then-MAC, SHA-2 only
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com

# Host key algorithms
HostKeyAlgorithms ssh-ed25519,ssh-ed25519-cert-v01@openssh.com

# ═══════════════════════════════════════════
# Authentication
# ═══════════════════════════════════════════

# Disable root login
PermitRootLogin no

# Key-based authentication only
PubkeyAuthentication yes
PasswordAuthentication no
PermitEmptyPasswords no
KbdInteractiveAuthentication no
# ChallengeResponseAuthentication no    # Deprecated alias for above

# Require both key + 2FA (uncomment if PAM 2FA configured)
# AuthenticationMethods publickey,keyboard-interactive
AuthenticationMethods publickey

# Limit authentication attempts
MaxAuthTries 3
LoginGraceTime 20

# Disable host-based authentication
HostbasedAuthentication no
IgnoreRhosts yes

# PAM (required for 2FA and account/session management)
UsePAM yes

# Accepted key types
PubkeyAcceptedKeyTypes ssh-ed25519,ssh-ed25519-cert-v01@openssh.com,sk-ssh-ed25519@openssh.com,ecdsa-sha2-nistp256,sk-ecdsa-sha2-nistp256@openssh.com

# SSH Certificates (uncomment if using CA)
# TrustedUserCAKeys /etc/ssh/ssh_user_ca.pub
# AuthorizedPrincipalsFile /etc/ssh/authorized_principals/%u

# ═══════════════════════════════════════════
# Access Control
# ═══════════════════════════════════════════

# Restrict to specific users or groups (UNCOMMENT AND CUSTOMIZE)
# AllowUsers alice bob deploy
AllowGroups ssh-users

# Deny specific users
DenyUsers root guest nobody
DenyGroups nogroup

# ═══════════════════════════════════════════
# Forwarding & Tunneling
# ═══════════════════════════════════════════

# TCP forwarding (disable unless needed; use "local" for bastion patterns)
AllowTcpForwarding local

# Agent forwarding (prefer ProxyJump over agent forwarding)
AllowAgentForwarding no

# X11 forwarding (disable unless GUI apps needed)
X11Forwarding no

# Tunnel devices (disable unless SSH VPN needed)
PermitTunnel no

# Gateway ports (don't allow remote binding to all interfaces)
GatewayPorts no

# Don't allow users to set environment variables
PermitUserEnvironment no

# Disable streaming/local/remote commands
# DisableForwarding no    # Nuclear option: disables ALL forwarding

# ═══════════════════════════════════════════
# Session Limits
# ═══════════════════════════════════════════

# Maximum concurrent sessions per connection
MaxSessions 5

# Maximum concurrent unauthenticated connections
MaxStartups 10:30:60

# Idle timeout (server-side keepalive)
ClientAliveInterval 300
ClientAliveCountMax 2

# ═══════════════════════════════════════════
# Logging & Auditing
# ═══════════════════════════════════════════

# Verbose logging (logs key fingerprints, auth details)
SyslogFacility AUTH
LogLevel VERBOSE

# Print last login info
PrintLastLog yes

# Display /etc/motd
PrintMotd no

# ═══════════════════════════════════════════
# Miscellaneous
# ═══════════════════════════════════════════

# Enable SFTP (restrict with internal-sftp if needed)
Subsystem sftp /usr/lib/openssh/sftp-server -f AUTHPRIV -l INFO
# For chroot SFTP:
# Subsystem sftp internal-sftp
# Match Group sftp-only
#     ChrootDirectory /home/%u
#     ForceCommand internal-sftp
#     AllowTcpForwarding no
#     X11Forwarding no

# Authorized keys file location
AuthorizedKeysFile .ssh/authorized_keys

# Banner (optional legal warning)
# Banner /etc/ssh/banner.txt

# DNS (disable for faster connections if not needed)
UseDNS no

# Strict modes (verify file permissions)
StrictModes yes

# ═══════════════════════════════════════════
# Per-User/Group Overrides (examples)
# ═══════════════════════════════════════════

# Admin users: allow more features
# Match Group ssh-admins
#     AllowTcpForwarding yes
#     MaxSessions 10
#     X11Forwarding yes

# Deploy service account: restricted
# Match User deploy
#     AllowTcpForwarding no
#     PermitTTY no
#     ForceCommand /usr/local/bin/deploy.sh

# SFTP-only users
# Match Group sftp-only
#     ChrootDirectory /home/%u
#     ForceCommand internal-sftp
#     AllowTcpForwarding no
#     X11Forwarding no
#     PermitTunnel no
