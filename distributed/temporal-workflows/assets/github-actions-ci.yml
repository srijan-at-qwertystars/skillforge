# GitHub Actions CI for Temporal Workflows (TypeScript)
#
# Runs: lint, type-check, unit tests (with time-skipping), replay tests
# Requires: Temporal dev server for integration tests

name: Temporal Workflow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  TEMPORAL_VERSION: "1.1.2"

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run unit tests with time-skipping
        run: npm test -- --coverage
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      temporal:
        image: temporalio/auto-setup:1.24.2
        ports:
          - 7233:7233
        env:
          DB: sqlite
          DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
        options: >-
          --health-cmd "tctl cluster health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 30s
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Wait for Temporal to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7233 > /dev/null 2>&1 || \
               npx @temporalio/client -c "new (require('@temporalio/client').Connection)({address: 'localhost:7233'})" 2>/dev/null; then
              echo "Temporal is ready"
              break
            fi
            echo "Waiting for Temporal... ($i/30)"
            sleep 5
          done

      - name: Run integration tests
        run: npm run test:integration --if-present
        env:
          TEMPORAL_ADDRESS: localhost:7233
          TEMPORAL_NAMESPACE: default

  replay-tests:
    name: Replay / Determinism Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run replay tests
        run: |
          if [ -d "test/histories" ]; then
            npm run test:replay --if-present || echo "No replay test script found"
          else
            echo "No workflow histories found in test/histories/ — skipping replay tests"
            echo "To add replay tests:"
            echo "  1. Export histories: temporal workflow show --workflow-id <id> --output json > test/histories/<name>.json"
            echo "  2. Create replay test using Worker.runReplayHistory()"
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
